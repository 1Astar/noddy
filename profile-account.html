<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title data-i18n="pageTitle">资料信息与账号绑定</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: "Noto Sans SC", -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: linear-gradient(180deg, #eee7f7 0%, #f5effb 45%, #f9f4ff 100%);
      color: #5a4a7a;
      min-height: 100vh;
      padding: 16px 14px 24px;
    }
    .top {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 14px;
    }
    .back-btn {
      border: none;
      border-radius: 999px;
      background: rgba(255,255,255,0.9);
      color: #6a56a2;
      padding: 6px 12px;
      font-size: 13px;
      cursor: pointer;
    }
    .title {
      font-size: 17px;
      font-weight: 700;
      color: #6a56a2;
    }
    .card {
      background: rgba(255,255,255,0.8);
      border: 1px solid rgba(196, 181, 224, 0.45);
      border-radius: 18px;
      padding: 14px;
      box-shadow: 0 8px 24px rgba(164, 150, 200, 0.22);
    }
    .group-title {
      font-size: 13px;
      color: #7a6a9f;
      margin-bottom: 8px;
      font-weight: 600;
    }
    .avatar-editor {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 8px 2px 12px;
      margin-bottom: 4px;
      border-bottom: 1px dashed rgba(196, 181, 224, 0.45);
    }
    .avatar-btn {
      width: 64px;
      height: 64px;
      border: none;
      border-radius: 50%;
      overflow: hidden;
      background: linear-gradient(135deg, #7c5cff, #3aa1d3);
      box-shadow: 0 6px 18px rgba(106, 86, 162, 0.25);
      display: inline-flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      color: #fff;
      font-size: 21px;
      flex: 0 0 auto;
    }
    .avatar-img { width: 100%; height: 100%; object-fit: cover; display: block; }
    .avatar-tip {
      font-size: 12px;
      color: #8576ab;
      line-height: 1.6;
    }
    .capsule {
      background: rgba(255, 255, 255, 0.95);
      border: 1px solid rgba(196, 181, 224, 0.5);
      border-radius: 999px;
      padding: 10px 12px;
      margin-bottom: 10px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
    }
    .capsule input {
      width: 100%;
      border: none;
      outline: none;
      background: transparent;
      color: #5a4a7a;
      font-size: 14px;
    }
    .capsule .label {
      white-space: nowrap;
      font-size: 14px;
      color: #5a4a7a;
    }
    .capsule .sub {
      font-size: 12px;
      color: #8576ab;
      white-space: nowrap;
    }
    .bind-btn {
      border: none;
      border-radius: 999px;
      background: #e7e0f8;
      color: #6b5ba1;
      font-size: 12px;
      padding: 6px 14px;
      cursor: pointer;
      flex: 0 0 auto;
    }
    .bind-btn.bound {
      background: #d9f3e8;
      color: #1a7f52;
    }
    .hint {
      font-size: 12px;
      color: #8a7db0;
      line-height: 1.55;
      margin: 6px 2px 10px;
    }
    .action-btn {
      width: 100%;
      border: none;
      border-radius: 999px;
      padding: 10px 12px;
      font-size: 14px;
      color: #6b5ba1;
      background: #e7dff7;
      cursor: pointer;
    }
  </style>
</head>
<body>
  <div class="top">
    <button class="back-btn" type="button" onclick="goBack()" data-i18n="backBtn">返回</button>
    <div class="title" data-i18n="pageTitle">资料信息与账号绑定</div>
  </div>

  <div class="card">
    <div class="group-title" data-i18n="profileGroup">资料信息</div>
    <div class="avatar-editor">
      <button class="avatar-btn" type="button" onclick="pickAvatar()">
        <img id="owner-avatar-preview" class="avatar-img" alt="" style="display:none" />
        <span id="owner-avatar-fallback">👤</span>
      </button>
      <div class="avatar-tip">点击头像可更换头像</div>
      <input id="owner-avatar-input" type="file" accept="image/*" style="display:none">
    </div>
    <div class="capsule">
      <span class="label" data-i18n="nicknameLabel">昵称</span>
      <input id="profile-user-nickname" type="text" maxlength="20" data-i18n-placeholder="nicknamePlaceholder" placeholder="输入你的昵称">
    </div>
    <div class="capsule">
      <span class="label" data-i18n="birthdayLabel">生日</span>
      <input id="profile-birthday" type="date">
    </div>

    <div class="group-title" style="margin-top:6px;" data-i18n="bindingGroup">其他账号绑定（可选）</div>
    <div class="capsule">
      <span class="label">Google</span>
      <button class="bind-btn" id="bind-btn-google" type="button" onclick="toggleOptionalBinding('google')">去绑定</button>
    </div>
    <div class="capsule">
      <span class="label">Apple</span>
      <button class="bind-btn" id="bind-btn-apple" type="button" onclick="toggleOptionalBinding('apple')">去绑定</button>
    </div>
    <div class="capsule">
      <span class="label" data-i18n="phoneLabel">手机号</span>
      <span class="sub" data-i18n="phoneSub">用于短信通知</span>
      <button class="bind-btn" id="bind-btn-phone" type="button" onclick="toggleOptionalBinding('phone')">去绑定</button>
    </div>
    <div class="capsule">
      <span class="label" data-i18n="emailLabel">邮箱</span>
      <span class="sub" data-i18n="emailSub">用于账号登录</span>
      <button class="bind-btn" id="bind-btn-email" type="button" onclick="toggleOptionalBinding('email')">去绑定</button>
    </div>

    <div class="hint" data-i18n="bindingHint">用户可自行决定是否绑定其他账号。若要换绑邮箱，仅需先完成手机号验证并绑定手机号。</div>
    <button class="action-btn" type="button" onclick="requestEmailRebind()" data-i18n="rebindBtn">换绑邮箱</button>
    <button class="action-btn" type="button" onclick="openChangePassword()" style="margin-top:8px;background:#dfeafc;color:#4b5c85">修改密码</button>
  </div>

  <script>
    const USER_PROFILE_KEY = "noddy_user_profile_info";
    const USER_BINDINGS_KEY = "noddy_user_bindings";
    const ACCOUNT_AUTH_SOURCE_KEY = "noddy_account_auth_source_map_v1";
    const LAST_LOGIN_PROVIDER_KEY = "noddy_last_login_provider";
    const LAST_LOGIN_ACCOUNT_KEY = "noddy_last_login_account";
    const OWNER_AVATAR_KEY = "noddy_owner_avatar_dataurl";
    const I18N = {
      zh: {
        pageTitle: "资料信息与账号绑定",
        backBtn: "返回",
        profileGroup: "资料信息",
        nicknameLabel: "昵称",
        nicknamePlaceholder: "输入你的昵称",
        birthdayLabel: "生日",
        bindingGroup: "其他账号绑定（可选）",
        phoneLabel: "手机号",
        phoneSub: "用于短信通知",
        emailLabel: "邮箱",
        emailSub: "用于账号登录",
        bindingHint: "用户可自行决定是否绑定其他账号。若要换绑邮箱，仅需先完成手机号验证并绑定手机号。",
        rebindBtn: "换绑邮箱",
        bindNow: "去绑定",
        bound: "已绑定",
        confirmUnbind: "确认解除 {provider} 绑定吗？",
        confirmBind: "要绑定 {provider} 吗？可随时取消。",
        needPhone: "换绑邮箱前仅需先完成手机号验证并绑定手机号。",
        canRebind: "已通过手机号验证，可继续换绑邮箱流程。"
      },
      ko: {
        pageTitle: "프로필 및 계정 연동",
        backBtn: "뒤로",
        profileGroup: "프로필 정보",
        nicknameLabel: "닉네임",
        nicknamePlaceholder: "닉네임을 입력하세요",
        birthdayLabel: "생일",
        bindingGroup: "다른 계정 연동(선택)",
        phoneLabel: "휴대폰 번호",
        phoneSub: "문자 알림 수신용",
        emailLabel: "이메일",
        emailSub: "계정 로그인용",
        bindingHint: "다른 계정 연동은 사용자가 선택할 수 있어요. 이메일 변경 연동 전에는 휴대폰 인증 및 연동만 필요해요.",
        rebindBtn: "이메일 변경 연동",
        bindNow: "연동하기",
        bound: "연동됨",
        confirmUnbind: "{provider} 연동을 해제할까요?",
        confirmBind: "{provider} 계정을 연동할까요? 나중에 해제할 수 있어요.",
        needPhone: "이메일 변경 연동 전, 휴대폰 인증 및 연동만 완료해 주세요.",
        canRebind: "휴대폰 인증이 확인되어 이메일 변경 연동을 진행할 수 있어요."
      },
      en: {
        pageTitle: "Profile and account linking",
        backBtn: "Back",
        profileGroup: "Profile information",
        nicknameLabel: "Nickname",
        nicknamePlaceholder: "Enter your nickname",
        birthdayLabel: "Birthday",
        bindingGroup: "Other account links (optional)",
        phoneLabel: "Phone",
        phoneSub: "For SMS notifications",
        emailLabel: "Email",
        emailSub: "For account login",
        bindingHint: "Users can choose whether to link other accounts. To rebind email, only phone verification and phone linking are required first.",
        rebindBtn: "Rebind email",
        bindNow: "Link now",
        bound: "Linked",
        confirmUnbind: "Unlink {provider}?",
        confirmBind: "Link {provider}? You can unlink later.",
        needPhone: "Before rebinding email, please complete phone verification and phone linking only.",
        canRebind: "Phone verification passed. You can continue with email rebinding."
      }
    };
    const PROVIDER_LABEL = {
      zh: { google: "Google", apple: "Apple", phone: "手机号", email: "邮箱" },
      ko: { google: "Google", apple: "Apple", phone: "휴대폰 번호", email: "이메일" },
      en: { google: "Google", apple: "Apple", phone: "Phone", email: "Email" }
    };
    let currentLang = "zh";

    function detectLang() {
      const saved = localStorage.getItem("noddy_lang");
      if (saved === "zh" || saved === "ko" || saved === "en") return saved;
      const nav = (navigator.language || "").toLowerCase();
      if (nav.indexOf("ko") === 0) return "ko";
      if (nav.indexOf("zh") === 0) return "zh";
      return "en";
    }

    function t(key) {
      const table = I18N[currentLang] || I18N.zh;
      return table[key] || key;
    }

    function applyI18n() {
      document.documentElement.lang = currentLang === "zh" ? "zh-CN" : currentLang;
      document.title = t("pageTitle");
      document.querySelectorAll("[data-i18n]").forEach(function(el) {
        const key = el.getAttribute("data-i18n");
        if (!key) return;
        el.textContent = t(key);
      });
      document.querySelectorAll("[data-i18n-placeholder]").forEach(function(el) {
        const key = el.getAttribute("data-i18n-placeholder");
        if (!key) return;
        el.setAttribute("placeholder", t(key));
      });
    }

    function goBack() {
      if (window.history.length > 1) {
        window.history.back();
        return;
      }
      window.location.href = "home.html";
    }

    function getUserProfile() {
      try {
        const raw = localStorage.getItem(USER_PROFILE_KEY);
        const parsed = raw ? JSON.parse(raw) : {};
        return parsed && typeof parsed === "object" ? parsed : {};
      } catch (_) {
        return {};
      }
    }

    function setUserProfile(profile) {
      try {
        localStorage.setItem(USER_PROFILE_KEY, JSON.stringify(profile || {}));
      } catch (_) {}
    }

    function saveUserProfileField(field, value) {
      const profile = getUserProfile();
      profile[field] = String(value || "").trim();
      setUserProfile(profile);
    }

    function applyAvatar(dataUrl) {
      const img = document.getElementById("owner-avatar-preview");
      const fallback = document.getElementById("owner-avatar-fallback");
      if (!img || !fallback) return;
      const has = !!dataUrl;
      img.style.display = has ? "block" : "none";
      fallback.style.display = has ? "none" : "inline";
      if (has) img.src = dataUrl;
    }

    function pickAvatar() {
      const input = document.getElementById("owner-avatar-input");
      if (!input) return;
      input.value = "";
      input.click();
    }

    function initAvatarPicker() {
      const input = document.getElementById("owner-avatar-input");
      if (!input) return;
      input.addEventListener("change", function() {
        const file = input.files && input.files[0];
        if (!file) return;
        if (!/^image\//i.test(file.type || "")) {
          alert("请选择图片文件");
          return;
        }
        const reader = new FileReader();
        reader.onload = function() {
          const dataUrl = String(reader.result || "");
          try { localStorage.setItem(OWNER_AVATAR_KEY, dataUrl); } catch (_) {}
          applyAvatar(dataUrl);
        };
        reader.readAsDataURL(file);
      });
    }

    function getUserBindings() {
      const base = { google: false, apple: false, phone: false, email: false };
      let saved = {};
      try {
        const raw = localStorage.getItem(USER_BINDINGS_KEY);
        const parsed = raw ? JSON.parse(raw) : {};
        saved = parsed && typeof parsed === "object" ? parsed : {};
      } catch (_) {
        saved = {};
      }
      const inferred = inferBindingsFromLoginState();
      return Object.assign(base, saved, inferred);
    }

    function setUserBindings(bindings) {
      try {
        localStorage.setItem(USER_BINDINGS_KEY, JSON.stringify(bindings));
      } catch (_) {}
    }

    function parseAuthSource(source) {
      return String(source || "")
        .split(/[+,]/)
        .map(function(item) { return item.trim().toLowerCase(); })
        .filter(Boolean);
    }

    function inferBindingsFromLoginState() {
      const inferred = { google: false, apple: false, phone: false, email: false };
      try {
        const provider = (localStorage.getItem(LAST_LOGIN_PROVIDER_KEY) || "").toLowerCase();
        const account = (localStorage.getItem(LAST_LOGIN_ACCOUNT_KEY) || "").toLowerCase();
        if (provider && Object.prototype.hasOwnProperty.call(inferred, provider)) {
          inferred[provider] = true;
        }
        if (account) {
          if (account.indexOf("@") > -1 && account.indexOf("phone_") !== 0) inferred.email = true;
          if (/\d{6,}/.test(account) || account.indexOf("phone_") === 0) inferred.phone = true;
        }
      } catch (_) {}

      try {
        const raw = localStorage.getItem(ACCOUNT_AUTH_SOURCE_KEY);
        const map = raw ? JSON.parse(raw) : {};
        if (map && typeof map === "object") {
          Object.keys(map).forEach(function(key) {
            const parts = parseAuthSource(map[key]);
            if (parts.indexOf("google") >= 0) inferred.google = true;
            if (parts.indexOf("apple") >= 0) inferred.apple = true;
            if (parts.indexOf("email") >= 0) inferred.email = true;
            if (parts.indexOf("phone") >= 0) inferred.phone = true;
            if (String(key).toLowerCase().indexOf("phone_") === 0) inferred.phone = true;
          });
        }
      } catch (_) {}
      return inferred;
    }

    function renderBindings() {
      const bindings = getUserBindings();
      setUserBindings(bindings);
      ["google", "apple", "phone", "email"].forEach(function(provider) {
        const btn = document.getElementById("bind-btn-" + provider);
        if (!btn) return;
        const bound = !!bindings[provider];
        btn.textContent = bound ? t("bound") : t("bindNow");
        btn.classList.toggle("bound", bound);
      });
    }

    function toggleOptionalBinding(provider) {
      const bindings = getUserBindings();
      const isBound = !!bindings[provider];
      const providerLabel = ((PROVIDER_LABEL[currentLang] || PROVIDER_LABEL.zh)[provider]) || provider;
      if (isBound) {
        if (!confirm(t("confirmUnbind").replace("{provider}", providerLabel))) return;
        bindings[provider] = false;
      } else {
        if (!confirm(t("confirmBind").replace("{provider}", providerLabel))) return;
        bindings[provider] = true;
      }
      setUserBindings(bindings);
      renderBindings();
    }

    function requestEmailRebind() {
      const bindings = getUserBindings();
      if (!bindings.phone) {
        alert(t("needPhone"));
        return;
      }
      alert(t("canRebind"));
    }

    function openChangePassword() {
      window.open("change-password.html", "_blank");
    }

    function init() {
      currentLang = detectLang();
      applyI18n();
      initAvatarPicker();
      const profile = getUserProfile();
      const nicknameInput = document.getElementById("profile-user-nickname");
      const birthdayInput = document.getElementById("profile-birthday");
      if (nicknameInput) nicknameInput.value = profile.nickname || "";
      if (birthdayInput) birthdayInput.value = profile.birthday || "";
      applyAvatar(localStorage.getItem(OWNER_AVATAR_KEY) || "");

      if (nicknameInput) {
        nicknameInput.addEventListener("input", function(e) {
          saveUserProfileField("nickname", e.target.value);
        });
      }
      if (birthdayInput) {
        birthdayInput.addEventListener("change", function(e) {
          saveUserProfileField("birthday", e.target.value);
        });
      }
      renderBindings();
    }

    init();
  </script>
</body>
</html>
