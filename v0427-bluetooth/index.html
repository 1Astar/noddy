<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <title>Noddy - 未登录（蓝牙版）</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body {
      font-family: Pretendard, "Apple SD Gothic Neo", system-ui, -apple-system,
        BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: radial-gradient(circle at top, #ffeef5 0, #fff7f0 40%, #ffffff 100%);
    }

    /* ---------------------------
       Boot animation (3幕)
    ---------------------------- */
    #boot-bg {
      background: radial-gradient(circle at top, #ffffff 0%, #fff7ea 35%, #ffe9f2 70%, #fff 100%);
    }

    #boot-overlay {
      opacity: 1;
      transition: opacity 0.25s ease;
    }

    #boot-overlay.boot-fadeout {
      opacity: 0;
      pointer-events: none;
    }

    #noddy-buddy {
      position: absolute;
      left: 50%;
      top: 52%;
      width: 150px;
      max-width: 45vw;
      height: auto;
      opacity: 0;
      transform: translate(-50%, 260px) scale(0.7);
      pointer-events: none;
      user-select: none;
      will-change: transform, opacity;
    }

    /* 第一幕：入场（2s）+落地后上下弹两下 */
    #boot-overlay.boot-show #noddy-buddy {
      opacity: 1;
      animation: noddyEntry 2s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
    }

    @keyframes noddyEntry {
      0% {
        transform: translate(-50%, 260px) translateX(0px) scale(0.65) rotate(-2deg);
      }
      35% {
        transform: translate(-50%, 120px) translateX(-26px) scale(1.02) rotate(2deg);
      }
      55% {
        transform: translate(-50%, 18px) translateX(-8px) scale(1.05) rotate(-1deg);
      }
      68% {
        transform: translate(-50%, 0px) translateX(0px) scale(1) rotate(0deg);
      }
      /* 落地后弹两下 */
      76% {
        transform: translate(-50%, -10px) scale(1.02);
      }
      82% {
        transform: translate(-50%, 6px) scale(0.995);
      }
      88% {
        transform: translate(-50%, -6px) scale(1.01);
      }
      94% {
        transform: translate(-50%, 3px) scale(0.998);
      }
      100% {
        transform: translate(-50%, 0px) translateX(0px) scale(1) rotate(0deg);
      }
    }

    /* 第二幕：打招呼浮动（breathing loop） */
    #boot-overlay.boot-breathe #noddy-buddy {
      animation: noddyBreath 2s ease-in-out infinite;
      opacity: 1;
    }

    @keyframes noddyBreath {
      0% {
        transform: translate(-50%, 0px) scale(1);
      }
      50% {
        transform: translate(-50%, -8px) scale(1);
      }
      100% {
        transform: translate(-50%, 0px) scale(1);
      }
    }

    /* 气泡：出现动画 */
    #talk-bubble {
      position: absolute;
      left: 50%;
      top: 28%;
      transform: translateX(-50%) scale(0.92);
      opacity: 0;
      background: rgba(255, 255, 255, 0.86);
      border: 1px solid rgba(255, 143, 163, 0.18);
      border-radius: 16px;
      padding: 40px 14px 12px;
      box-shadow: 0 18px 45px rgba(245, 132, 155, 0.18);
      max-width: min(78vw, 360px);
      transition: opacity 0.25s ease, transform 0.25s ease;
      will-change: opacity, transform;
      text-align: center;
    }

    #talk-speaker {
      position: absolute;
      left: 50%;
      top: 10px;
      transform: translateX(-50%);
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-width: 58px;
      height: 32px;
      padding: 0 14px;
      border-radius: 999px;
      background: #f7dce5;
      border: 1px solid #f2c8d6;
      color: #5b4c87;
      font-size: 16px;
      font-weight: 700;
      line-height: 1;
      pointer-events: none;
    }

    #talk-bubble.show {
      opacity: 1;
      transform: translateX(-50%) scale(1);
    }

    #talk-text {
      font-size: 16px;
      line-height: 1.45;
      color: #4a3c42;
      word-break: break-word;
      white-space: pre-wrap;
    }

    /* 命名卡：第三幕滑入 */
    #name-modal-overlay .w-full.max-w-sm {
      transform: translateY(30px);
      opacity: 0;
      transition: transform 0.35s ease, opacity 0.35s ease;
      will-change: transform, opacity;
    }

    #name-modal-overlay.boot-name-open .w-full.max-w-sm {
      transform: translateY(0px);
      opacity: 1;
    }

    /* 连接设备弹窗：欢迎页后、取名前 */
    #connect-modal-overlay .w-full.max-w-sm {
      transform: translateY(30px);
      opacity: 0;
      transition: transform 0.35s ease, opacity 0.35s ease;
      will-change: transform, opacity;
    }

    #connect-modal-overlay.connect-open .w-full.max-w-sm {
      transform: translateY(0px);
      opacity: 1;
    }

    .bt-modal {
      width: min(86vw, 560px);
      max-height: 78vh;
      overflow-y: auto;
    }

    .bt-title {
      font-size: clamp(22px, 3.2vw, 30px);
      line-height: 1.1;
      font-weight: 800;
      color: #0f172a;
    }

    .bt-sub {
      margin-top: 8px;
      font-size: clamp(13px, 1.8vw, 15px);
      color: #64748b;
      line-height: 1.6;
    }

    .bt-sub .accent {
      color: #3b82f6;
    }

    .bt-actions {
      margin-top: 14px;
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      position: sticky;
      bottom: 0;
      background: linear-gradient(to top, #fff 85%, rgba(255, 255, 255, 0));
      padding-top: 8px;
    }

    .bt-list-wrap {
      margin-top: 12px;
      display: none;
      gap: 8px;
      flex-direction: column;
    }

    .bt-list-wrap.show {
      display: flex;
    }

    .bt-list-tip {
      font-size: 12px;
      color: #64748b;
      margin-bottom: 2px;
    }

    .bt-device-item {
      width: 100%;
      text-align: left;
      border: 1px solid #cbd5e1;
      border-radius: 12px;
      background: #fff;
      padding: 10px 12px;
      font-size: 14px;
      color: #0f172a;
      cursor: pointer;
    }

    .bt-device-item:hover {
      border-color: #fda4af;
      background: #fff7f9;
    }

    .bt-connect-status {
      display: none;
      margin-top: 6px;
      border-radius: 10px;
      border: 1px solid #bbf7d0;
      background: #f0fdf4;
      color: #166534;
      font-size: 13px;
      line-height: 1.5;
      padding: 8px 10px;
    }

    .bt-connect-status.show {
      display: block;
    }

    .ble-full-overlay {
      position: fixed;
      inset: 0;
      z-index: 60;
      display: none;
      background: rgba(36, 41, 58, 0.68);
      padding: 24px;
      align-items: center;
      justify-content: center;
    }

    .ble-full-overlay.show {
      display: flex;
    }

    .ble-scan-card {
      width: min(92vw, 360px);
      border-radius: 26px;
      background: #eef0ff;
      padding: 20px 18px 18px;
      text-align: center;
      color: #334155;
    }

    .ble-ill {
      width: 190px;
      height: 130px;
      margin: 8px auto 12px;
      border-radius: 16px;
      background: linear-gradient(135deg, #dbe5ff, #cddcff);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 52px;
    }

    .ble-scan-tip {
      font-size: 15px;
      line-height: 1.5;
      text-align: left;
      margin: 0 auto 14px;
      max-width: 260px;
      color: #334155;
      font-weight: 600;
    }

    .ble-progress-track {
      width: 100%;
      height: 16px;
      border-radius: 999px;
      background: #c7d2fe;
      overflow: hidden;
      margin-top: 8px;
    }

    .ble-progress-bar {
      height: 100%;
      width: 0%;
      border-radius: inherit;
      background: linear-gradient(90deg, #38bdf8, #3b82f6);
      color: #fff;
      font-size: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: width 0.2s linear;
    }

    .ble-loading-text {
      margin-top: 10px;
      font-size: 14px;
      color: #0ea5e9;
      font-weight: 600;
    }

    .ble-cancel-btn {
      margin-top: 16px;
      width: 100%;
      border-radius: 999px;
      border: 1px solid #67e8f9;
      background: #ffffff;
      color: #0ea5e9;
      font-size: 15px;
      font-weight: 600;
      padding: 10px 12px;
      cursor: pointer;
    }

    .ble-sheet {
      width: min(92vw, 380px);
      border-radius: 36px;
      background: #fff;
      padding: 18px 14px 14px;
      box-shadow: 0 24px 45px rgba(0, 0, 0, 0.28);
      position: relative;
    }

    .ble-sheet-title {
      position: absolute;
      left: 50%;
      transform: translateX(-50%);
      top: -16px;
      border-radius: 999px;
      background: #fb5c91;
      color: #fff;
      font-size: 16px;
      font-weight: 700;
      padding: 8px 18px;
      white-space: nowrap;
    }

    .ble-device-list {
      margin-top: 24px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .ble-device-row {
      width: 100%;
      border-radius: 18px;
      border: 1px solid #e2e8f0;
      background: #fff;
      padding: 14px 14px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      cursor: pointer;
      font-size: 16px;
      color: #334155;
    }

    .ble-radio {
      width: 26px;
      height: 26px;
      border-radius: 50%;
      border: 2px solid #94a3b8;
      background: #f8fafc;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      font-size: 12px;
      color: #64748b;
      flex-shrink: 0;
    }

    .ble-device-row:hover .ble-radio {
      border-color: #fb5c91;
      color: #fb5c91;
    }

    .ble-sheet-cancel {
      margin-top: 14px;
      width: 46%;
      min-width: 120px;
      margin-left: auto;
      margin-right: auto;
      border-radius: 999px;
      border: 1px solid #a78b9b;
      background: #fff;
      color: #4b2f3f;
      font-size: 16px;
      font-weight: 600;
      padding: 10px 12px;
      cursor: pointer;
    }

    .ble-warning {
      width: min(90vw, 360px);
      border-radius: 34px;
      background: #fff;
      padding: 22px 18px 18px;
      box-shadow: 0 24px 45px rgba(0, 0, 0, 0.28);
      position: relative;
      text-align: center;
    }

    .ble-warning-title {
      position: absolute;
      left: 50%;
      transform: translateX(-50%);
      top: -16px;
      border-radius: 999px;
      background: #fb5c91;
      color: #fff;
      font-size: 18px;
      font-weight: 700;
      padding: 8px 22px;
      white-space: nowrap;
    }

    .ble-warning-text {
      margin-top: 26px;
      font-size: 18px;
      line-height: 1.7;
      color: #374151;
    }

    .ble-warning-ok {
      margin-top: 16px;
      border-radius: 999px;
      border: 1px solid #a78b9b;
      background: #fff5f7;
      color: #4b2f3f;
      font-size: 17px;
      font-weight: 700;
      padding: 10px 34px;
      cursor: pointer;
    }

    /* Noddy 开心弹跳（名字确认后） */
    #boot-overlay.boot-happy #noddy-buddy {
      animation: noddyHappy 0.6s ease-in-out both;
    }

    @keyframes noddyHappy {
      0% {
        transform: translate(-50%, 0px) scale(1);
      }
      35% {
        transform: translate(-50%, -10px) scale(1.04);
      }
      65% {
        transform: translate(-50%, 6px) scale(0.995);
      }
      100% {
        transform: translate(-50%, 0px) scale(1);
      }
    }

    /* reduced motion：降级为淡入/不跑跳 */
    @media (prefers-reduced-motion: reduce) {
      #boot-overlay {
        transition: none !important;
      }
      #boot-overlay.boot-show #noddy-buddy {
        animation: none !important;
        opacity: 1;
        transform: translate(-50%, 0px) scale(1) !important;
      }
      #boot-overlay.boot-breathe #noddy-buddy {
        animation: none !important;
      }
      #boot-overlay.boot-happy #noddy-buddy {
        animation: none !important;
      }
      #talk-bubble {
        opacity: 1 !important;
        transform: translateX(-50%) scale(1) !important;
      }
    }
  </style>
</head>
<body class="min-h-screen flex items-center justify-center px-4 py-8">
  <div
    class="w-full max-w-md bg-white/90 backdrop-blur rounded-3xl shadow-[0_18px_45px_rgba(245,132,155,0.22)] px-6 py-8 sm:px-8 sm:py-10 space-y-8"
  >
    <!-- 语言切换 -->
    <div class="flex flex-col items-end gap-2">
      <div class="flex justify-end">
        <label for="lang-select" class="sr-only">Language</label>
        <div class="relative">
          <select
            id="lang-select"
            class="rounded-full border border-slate-200 bg-white/90 px-3 py-1.5 text-xs sm:text-sm text-slate-700 shadow-sm hover:bg-white focus:outline-none focus:ring-2 focus:ring-rose-300 focus:border-rose-300"
          >
            <option value="ko">한국어</option>
            <option value="en">English</option>
            <option value="zh">中文</option>
          </select>
        </div>
      </div>
      <div class="flex justify-end">
        <a href="flows.html" class="text-xs text-rose-500/90 underline underline-offset-2 hover:text-rose-600"
          >登录与配网流程（原型说明）</a
        >
      </div>
      <div class="flex justify-end">
        <button
          type="button"
          class="text-xs rounded-full border border-rose-200 bg-white/90 text-rose-500 px-3 py-1.5 hover:bg-rose-50"
          onclick="openBluetoothEntry()"
        >
          蓝牙连接
        </button>
      </div>
    </div>

    <header class="space-y-4">
      <div class="flex items-center justify-between">
        <div class="flex items-center gap-3">
          <div
            class="inline-flex items-center justify-center w-12 h-12 rounded-2xl bg-gradient-to-br from-pink-300 via-rose-300 to-amber-200 shadow-md"
          >
            <span class="text-sm font-semibold text-white tracking-tight">N</span>
          </div>
          <div class="flex flex-col gap-0.5">
            <span class="text-base font-semibold text-slate-900">Noddy</span>
            <span class="text-[11px] text-slate-500" data-i18n="guest.subtitle"></span>
          </div>
        </div>
      </div>

      <div class="space-y-2">
        <h1 class="text-lg sm:text-xl font-semibold text-slate-900 leading-relaxed min-h-[1.2em]" id="greeting-title"></h1>
      </div>
    </header>

    <main class="space-y-4">
      <div class="space-y-3">
        <div class="w-full rounded-3xl border border-rose-100/70 bg-white/70 backdrop-blur px-5 py-4 shadow-sm text-center">
          <div class="text-base sm:text-lg font-semibold text-slate-900">
            <span aria-hidden="true" class="mr-2 inline-block">👋</span>
            <span id="greeting-typewriter"></span>
          </div>
          <div class="mt-1 text-xs sm:text-sm text-slate-500"></div>
        </div>
      </div>
    </main>

    <!-- 开屏动效 Overlay -->
    <div
      id="boot-overlay"
      class="fixed inset-0 z-40 hidden overflow-hidden"
      aria-hidden="true"
    >
      <div
        id="boot-bg"
        class="absolute inset-0"
        aria-hidden="true"
      ></div>

      <div class="relative w-full h-full">
        <!-- 注意：本版本复用 v0408 资源 -->
        <img id="noddy-buddy" src="../v0408/打招呼.png" alt="Noddy" />

        <div id="talk-bubble" aria-live="polite">
          <span id="talk-speaker">Noddy</span>
          <span id="talk-text"></span>
        </div>
      </div>
    </div>

    <!-- 蓝牙连接弹窗：欢迎页后、取名前 -->
    <div
      id="connect-modal-overlay"
      class="fixed inset-0 z-50 hidden items-center justify-center bg-slate-900/30 backdrop-blur-sm px-4"
      aria-hidden="true"
    >
      <div class="bt-modal rounded-3xl bg-white shadow-xl px-5 py-5">
        <div class="bt-title">✨ 让我认识你</div>
        <div class="bt-sub">长按 Noddy 按钮直到灯光闪烁，然后在 App 设备列表里连接你的 Noddy。</div>

        <div class="bt-actions">
          <button
            type="button"
            class="rounded-full border border-slate-300 bg-white text-sm text-slate-600 px-3 py-2.5 hover:bg-slate-50 active:scale-[0.99]"
            onclick="skipBluetoothAndGoName()"
          >
            稍后再连
          </button>
          <button
            type="button"
            class="rounded-full bg-rose-400 text-white text-sm px-3 py-2.5 hover:bg-rose-500 active:scale-[0.99]"
            onclick="goBluetoothConnect()"
          >
            开始扫描
          </button>
        </div>
      </div>
    </div>

    <!-- BLE 扫描加载 -->
    <div id="ble-scan-overlay" class="ble-full-overlay" aria-hidden="true">
      <div class="ble-scan-card">
        <div class="ble-ill">🧸</div>
        <div class="ble-scan-tip">请抬起宠物的头，将身体保持直立，稍等片刻</div>
        <div class="ble-progress-track">
          <div id="ble-progress-bar" class="ble-progress-bar">0%</div>
        </div>
        <div class="ble-loading-text">加载中…</div>
        <button type="button" class="ble-cancel-btn" onclick="cancelBleScan()">取消</button>
      </div>
    </div>

    <!-- BLE 设备选择 -->
    <div id="ble-select-overlay" class="ble-full-overlay" aria-hidden="true">
      <div class="ble-sheet">
        <div class="ble-sheet-title">请选择设备</div>
        <div class="ble-device-list">
          <button type="button" class="ble-device-row" onclick="selectBleDevice('NODDY-COAY0QPV7S', 'dev_coay0qpv7s', true)">
            <span>NODDY-COAY0QPV7S</span><span class="ble-radio">◉</span>
          </button>
          <button type="button" class="ble-device-row" onclick="selectBleDevice('NODDY-AXZ7SDETX0', 'dev_axz7sdetx0', false)">
            <span>NODDY-AXZ7SDETX0</span><span class="ble-radio">◉</span>
          </button>
          <button type="button" class="ble-device-row" onclick="selectBleDevice('NODDY-ATCSCUFKL4', 'dev_atcscufkl4', false)">
            <span>NODDY-ATCSCUFKL4</span><span class="ble-radio">◉</span>
          </button>
        </div>
        <button type="button" class="ble-sheet-cancel" onclick="closeBleSelect()">取消</button>
      </div>
    </div>

    <!-- 已绑定提醒 -->
    <div id="ble-warning-overlay" class="ble-full-overlay" aria-hidden="true">
      <div class="ble-warning">
        <div class="ble-warning-title">温馨提示</div>
        <div class="ble-warning-text">该宠物已有主人，如需要继续绑定，请将原来的进行解绑。</div>
        <button type="button" class="ble-warning-ok" onclick="closeBleWarning()">确定</button>
      </div>
    </div>

    <!-- 两步命名弹窗：先宠物名，再主人称呼 -->
    <div
      id="name-modal-overlay"
      class="fixed inset-0 z-50 hidden items-center justify-center bg-slate-900/30 backdrop-blur-sm px-4"
      aria-hidden="true"
    >
      <div class="w-full max-w-sm rounded-3xl bg-white shadow-xl px-5 py-6 space-y-4">
        <div id="name-step-pet" class="space-y-4">
          <div id="modal-pet-title" class="text-center text-base sm:text-lg font-semibold text-slate-900">
            你想叫我什么？
          </div>
          <div id="modal-pet-subtitle" class="text-center text-[11px] sm:text-xs text-slate-500">
            noddy会把这个名字记在心里
          </div>

          <div>
            <label for="petName-input-index" class="sr-only">pet name</label>
            <input
              id="petName-input-index"
              type="text"
              data-i18n-placeholder="modal.petPlaceholder"
              placeholder="例如：小团子"
              maxlength="12"
              class="w-full rounded-2xl border border-rose-100 bg-rose-50 px-4 py-3 text-sm sm:text-base text-slate-900 placeholder:text-slate-400 focus:outline-none focus:ring-2 focus:ring-rose-300 focus:border-rose-300"
            />
          </div>

          <div class="flex gap-3">
            <button
              id="btn-skip-pet-name"
              type="button"
              class="flex-1 rounded-full border border-slate-200 bg-white text-xs sm:text-sm text-slate-600 px-4 py-3 hover:bg-slate-50 active:scale-[0.99]"
              onclick="skipPetNameAndNext()"
            >
              不起也行
            </button>
            <button
              id="btn-confirm-pet-name"
              type="button"
              class="flex-1 rounded-full bg-rose-400 text-white text-xs sm:text-sm px-4 py-3 hover:bg-rose-500 active:scale-[0.99]"
              onclick="goOwnerStepFromPetName()"
            >
              好的！
            </button>
          </div>
        </div>

        <div id="name-step-owner" class="hidden space-y-4">
          <div id="modal-owner-title" class="text-center text-base sm:text-lg font-semibold text-slate-900">
            对了，你还没告诉我你的名字呢
          </div>
          <div id="modal-owner-subtitle" class="text-center text-[11px] sm:text-xs text-slate-500">
            你希望我怎么称呼你呀～
          </div>

          <div class="space-y-2">
            <label for="ownerName-input-index" class="sr-only">owner name</label>
            <input
              id="ownerName-input-index"
              type="text"
              data-i18n-placeholder="modal.ownerPlaceholder"
              placeholder="例如：小星星/妈妈/爸爸"
              maxlength="12"
              class="w-full rounded-2xl border border-rose-100 bg-rose-50 px-4 py-3 text-sm sm:text-base text-slate-900 placeholder:text-slate-400 focus:outline-none focus:ring-2 focus:ring-rose-300 focus:border-rose-300"
            />
            <div id="modal-owner-hint" class="text-[11px] sm:text-xs text-slate-500">
              昵称后续可以更改的哦~
            </div>
          </div>

          <div class="flex gap-3">
            <button
              id="btn-skip-owner-name"
              type="button"
              class="flex-1 rounded-full border border-slate-200 bg-white text-xs sm:text-sm text-slate-600 px-4 py-3 hover:bg-slate-50 active:scale-[0.99]"
              onclick="skipOwnerNameAndContinue()"
            >
              稍后再说
            </button>
            <button
              id="btn-confirm-owner-name"
              type="button"
              class="flex-1 rounded-full bg-rose-400 text-white text-xs sm:text-sm px-4 py-3 hover:bg-rose-500 active:scale-[0.99]"
              onclick="confirmNameFromIndex()"
            >
              继续
            </button>
          </div>
        </div>
      </div>
    </div>

  </div>

  <script>
    const I18N = {
      ko: {
        "guest.subtitle": "오늘도 널 기다리고 있었어 ✨",
        "guest.loginBind": "이미 계정이 있어요",
        "modal.petPlaceholder": "예: 몽실이",
        "modal.ownerPlaceholder": "예: 엄마/아빠/별이",
      },
      en: {
        "guest.subtitle": "I’ve been waiting for you all day ✨",
        "guest.loginBind": "I already have an account",
        "modal.petPlaceholder": "e.g. Mochi",
        "modal.ownerPlaceholder": "e.g. Mom / Dad / Star",
      },
      zh: {
        "guest.subtitle": "我已经在这里等你很久啦 ✨",
        "guest.loginBind": "我已有账号，去绑定",
        "modal.petPlaceholder": "例如：小团子",
        "modal.ownerPlaceholder": "例如：小星星/妈妈/爸爸",
      },
    };
    const INDEX_MODAL_TEXTS = {
      ko: {
        petTitle: "넌 나를 뭐라고 부를래?",
        petSub: "noddy가 이 이름을 마음에 담아둘게",
        skipPet: "나중에 할래",
        okPet: "좋아!",
        ownerTitle: "맞다, 네 이름을 아직 못 들었어",
        ownerSub: "어떻게 불러주면 좋을까~",
        ownerHint: "닉네임은 나중에도 바꿀 수 있어~",
        skipOwner: "나중에",
        continueOwner: "계속"
      },
      en: {
        petTitle: "What should I call myself?",
        petSub: "Noddy will keep this name in heart.",
        skipPet: "Skip for now",
        okPet: "OK!",
        ownerTitle: "By the way, I still don't know your name",
        ownerSub: "How would you like me to call you?",
        ownerHint: "You can change this nickname later.",
        skipOwner: "Later",
        continueOwner: "Continue"
      },
      zh: {
        petTitle: "你想叫我什么？",
        petSub: "noddy会把这个名字记在心里",
        skipPet: "不起也行",
        okPet: "好的！",
        ownerTitle: "对了，你还没告诉我你的名字呢",
        ownerSub: "你希望我怎么称呼你呀～",
        ownerHint: "昵称后续可以更改的哦~",
        skipOwner: "稍后再说",
        continueOwner: "继续"
      }
    };

    function detectLang() {
      const saved = localStorage.getItem("noddy_lang");
      if (saved && I18N[saved]) return saved;
      const nav = (navigator.language || "").toLowerCase();
      if (nav.startsWith("ko")) return "ko";
      if (nav.startsWith("zh")) return "zh";
      return "en";
    }

    let currentLang = detectLang();

    function t(key) {
      return (I18N[currentLang] && I18N[currentLang][key]) || (I18N.en && I18N.en[key]) || key;
    }

    function applyLang(lang) {
      if (!I18N[lang]) return;
      currentLang = lang;
      localStorage.setItem("noddy_lang", lang);
      document.documentElement.lang = lang === "ko" ? "ko" : lang === "zh" ? "zh-CN" : "en";
      document.querySelectorAll("[data-i18n]").forEach(function (el) {
        const key = el.getAttribute("data-i18n");
        if (!key) return;
        const text = t(key);
        el.innerHTML = text.replace(/\\n/g, "<br>").replace(/\n/g, "<br>");
      });
      document.querySelectorAll("[data-i18n-placeholder]").forEach(function (el) {
        const key = el.getAttribute("data-i18n-placeholder");
        if (!key) return;
        el.setAttribute("placeholder", t(key));
      });
      const copy = INDEX_MODAL_TEXTS[lang] || INDEX_MODAL_TEXTS.en;
      var setText = function(id, val) {
        var el = document.getElementById(id);
        if (el) el.textContent = val;
      };
      setText("modal-pet-title", copy.petTitle);
      setText("modal-pet-subtitle", copy.petSub);
      setText("btn-skip-pet-name", copy.skipPet);
      setText("btn-confirm-pet-name", copy.okPet);
      setText("modal-owner-title", copy.ownerTitle);
      setText("modal-owner-subtitle", copy.ownerSub);
      setText("modal-owner-hint", copy.ownerHint);
      setText("btn-skip-owner-name", copy.skipOwner);
      setText("btn-confirm-owner-name", copy.continueOwner);
    }

    const langSelect = document.getElementById("lang-select");
    if (langSelect) {
      langSelect.value = currentLang;
      langSelect.addEventListener("change", function (e) {
        applyLang(e.target.value);
      });
    }
    applyLang(currentLang);

    // ------------------------
    // Noddy boot animation timeline (3幕) + 蓝牙连接插入
    // ------------------------
    const ANON_KEY = "noddy_is_anonymous"; // "1" | "0"
    const AI_PET_STATE_KEY = "ai-pet-state"; // home/detail 都在用这个 JSON
    const ONBOARDING_KEY = "noddy_onboarding_complete"; // "1" = 已完成起名，下次启动跳过创建宠物
    const OWNER_NAME_KEY = "ownerName";
    const BT_PAIRED_KEY = "noddy_bluetooth_paired";
    const DEVICE_ID_KEY = "noddy_device_id";
    const FLOW_MODE_KEY = "noddy_flow_mode";
    let bleScanTimer = null;
    let bleProgress = 0;
    let onboardingPetNameWasCustom = false;

    function ensureAnonymousDefault() {
      const v = localStorage.getItem(ANON_KEY);
      if (v !== "0" && v !== "1") localStorage.setItem(ANON_KEY, "1");
    }

    function isBluetoothPaired() {
      try {
        if (localStorage.getItem(BT_PAIRED_KEY) === "1") return true;
      } catch (_) {}
      try {
        const params = new URLSearchParams(window.location.search || "");
        if (params.get("paired") === "1") return true;
      } catch (_) {}
      return false;
    }

    function setPetNameToLocal(name) {
      const petName = String(name || "").trim();
      if (!petName) return;
      try {
        localStorage.setItem("petName", petName);
      } catch (_) {}
      try {
        const raw = localStorage.getItem(AI_PET_STATE_KEY);
        const st = raw ? JSON.parse(raw) : {};
        const next = st && typeof st === "object" ? { ...st, name: petName } : { name: petName };
        localStorage.setItem(AI_PET_STATE_KEY, JSON.stringify(next));
      } catch (_) {}
    }

    function setOwnerNameToLocal(name) {
      const ownerName = String(name || "").trim();
      if (!ownerName) return;
      try {
        localStorage.setItem(OWNER_NAME_KEY, ownerName);
      } catch (_) {}
      try {
        const raw = localStorage.getItem(AI_PET_STATE_KEY);
        const st = raw ? JSON.parse(raw) : {};
        const next = st && typeof st === "object" ? { ...st, ownerName: ownerName } : { ownerName: ownerName };
        localStorage.setItem(AI_PET_STATE_KEY, JSON.stringify(next));
      } catch (_) {}
    }

    function getGreetingTexts(petName, ownerName, oldUser) {
      const displayOwnerName =
        String(ownerName || "").trim() ||
        (currentLang === "zh" ? "主人" : currentLang === "ko" ? "주인님" : "you");
      const displayPetName = String(petName || "").trim() || "Noddy";
      if (oldUser) {
        return {
          greet:
            currentLang === "ko"
              ? displayOwnerName + "님, 드디어 돌아왔구나!\n" + displayPetName + "가 많이 보고 싶었어~"
              : currentLang === "en"
              ? displayOwnerName + ", you're finally back!\n" + displayPetName + " missed you so much~"
              : displayOwnerName + "，你终于回来了！\n" + displayPetName + "好想你呀~",
        };
      }
      return {
        greet:
          currentLang === "ko"
            ? "오래 기다렸어! 드디어 만났네! Noddy가 너를 만나러 먼 길을 왔어~"
            : currentLang === "en"
            ? "I've been waiting for you for so long! Finally we meet. Noddy came a long way just to be with you~"
            : "已经等了你好久了！终于见到你了！Noddy可是跋山涉水才来到你身边呢～",
      };
    }

    function detectReducedMotion() {
      try {
        return window.matchMedia("(prefers-reduced-motion: reduce)").matches;
      } catch (_) {
        return false;
      }
    }

    function setTalkText(text) {
      const el = document.getElementById("talk-text");
      if (!el) return;
      el.textContent = text || "";
    }

    function showTalkBubble() {
      const el = document.getElementById("talk-bubble");
      if (!el) return;
      el.classList.add("show");
    }

    function hideTalkBubble() {
      const el = document.getElementById("talk-bubble");
      if (!el) return;
      el.classList.remove("show");
    }

    function openNameModal() {
      const el = document.getElementById("name-modal-overlay");
      if (!el) return;
      const petStep = document.getElementById("name-step-pet");
      const ownerStep = document.getElementById("name-step-owner");
      if (petStep) petStep.classList.remove("hidden");
      if (ownerStep) ownerStep.classList.add("hidden");
      el.classList.remove("hidden");
      el.classList.remove("boot-name-open");
      void el.offsetWidth;
      el.classList.add("boot-name-open");
      el.setAttribute("aria-hidden", "false");
      const input = document.getElementById("petName-input-index");
      if (input) input.focus();
      const ownerInput = document.getElementById("ownerName-input-index");
      if (ownerInput) {
        const oldOwner = (localStorage.getItem(OWNER_NAME_KEY) || "").trim();
        ownerInput.value = oldOwner;
      }
    }

    function closeNameModal() {
      const el = document.getElementById("name-modal-overlay");
      if (!el) return;
      el.classList.add("hidden");
      el.classList.remove("boot-name-open");
      el.setAttribute("aria-hidden", "true");
    }

    function openConnectModal() {
      const el = document.getElementById("connect-modal-overlay");
      if (!el) return;
      el.classList.remove("hidden");
      el.classList.remove("connect-open");
      void el.offsetWidth;
      el.classList.add("connect-open");
      el.setAttribute("aria-hidden", "false");
    }

    function closeConnectModal() {
      const el = document.getElementById("connect-modal-overlay");
      if (!el) return;
      el.classList.add("hidden");
      el.classList.remove("connect-open");
      el.setAttribute("aria-hidden", "true");
    }

    function showBleScanOverlay() {
      const el = document.getElementById("ble-scan-overlay");
      if (!el) return;
      el.classList.add("show");
      el.setAttribute("aria-hidden", "false");
    }

    function closeBleScanOverlay() {
      const el = document.getElementById("ble-scan-overlay");
      if (!el) return;
      el.classList.remove("show");
      el.setAttribute("aria-hidden", "true");
    }

    function updateBleProgress(value) {
      const bar = document.getElementById("ble-progress-bar");
      if (!bar) return;
      const pct = Math.max(0, Math.min(100, value));
      bar.style.width = pct + "%";
      bar.textContent = pct + "%";
    }

    function showBleSelect() {
      const el = document.getElementById("ble-select-overlay");
      if (!el) return;
      el.classList.add("show");
      el.setAttribute("aria-hidden", "false");
    }

    function closeBleSelect() {
      const el = document.getElementById("ble-select-overlay");
      if (!el) return;
      el.classList.remove("show");
      el.setAttribute("aria-hidden", "true");
      openConnectModal();
    }

    function showBleWarning() {
      const el = document.getElementById("ble-warning-overlay");
      if (!el) return;
      el.classList.add("show");
      el.setAttribute("aria-hidden", "false");
    }

    function closeBleWarning() {
      const el = document.getElementById("ble-warning-overlay");
      if (!el) return;
      el.classList.remove("show");
      el.setAttribute("aria-hidden", "true");
      showBleSelect();
    }

    window.openBluetoothEntry = function openBluetoothEntry() {
      try {
        localStorage.setItem(BT_PAIRED_KEY, "0");
        localStorage.removeItem(DEVICE_ID_KEY);
      } catch (_) {}
      openConnectModal();
    };

    window.skipBluetoothAndGoName = function skipBluetoothAndGoName() {
      try {
        localStorage.setItem(BT_PAIRED_KEY, "0");
        localStorage.removeItem(DEVICE_ID_KEY);
      } catch (_) {}
      closeConnectModal();
      openNameModal();
    };

    window.goBluetoothConnect = function goBluetoothConnect() {
      closeConnectModal();
      showBleScanOverlay();
      bleProgress = 0;
      updateBleProgress(bleProgress);
      if (bleScanTimer) clearInterval(bleScanTimer);
      bleScanTimer = setInterval(function () {
        bleProgress += 5;
        updateBleProgress(bleProgress);
        if (bleProgress >= 100) {
          clearInterval(bleScanTimer);
          bleScanTimer = null;
          closeBleScanOverlay();
          showBleSelect();
        }
      }, 90);
    };

    window.cancelBleScan = function cancelBleScan() {
      if (bleScanTimer) {
        clearInterval(bleScanTimer);
        bleScanTimer = null;
      }
      closeBleScanOverlay();
      openConnectModal();
    };

    window.selectBleDevice = function selectBleDevice(deviceName, deviceId, isBound) {
      closeBleSelect();
      if (isBound) {
        showBleWarning();
        return;
      }
      try {
        localStorage.setItem(BT_PAIRED_KEY, "1");
        localStorage.setItem(DEVICE_ID_KEY, String(deviceId || ""));
      } catch (_) {}
      setTimeout(function () {
        closeConnectModal();
        openNameModal();
      }, 120);
    };

    function showOwnerStepModal() {
      openNameModal();
      const petStep = document.getElementById("name-step-pet");
      const ownerStep = document.getElementById("name-step-owner");
      if (petStep) petStep.classList.add("hidden");
      if (ownerStep) ownerStep.classList.remove("hidden");
      const ownerInput = document.getElementById("ownerName-input-index");
      if (ownerInput) ownerInput.focus();
    }

    function typewriter80(text) {
      const content = String(text || "");
      setTalkText("");
      const talkEl = document.getElementById("talk-text");
      if (!talkEl) return Promise.resolve();

      return new Promise(function (resolve) {
        const reduced = detectReducedMotion();
        if (reduced) {
          setTalkText(content);
          resolve();
          return;
        }

        let i = 0;
        const tick = function () {
          i += 1;
          setTalkText(content.slice(0, i));
          if (i >= content.length) {
            resolve();
            return;
          }
          setTimeout(tick, 80);
        };
        setTimeout(tick, 40);
      });
    }

    function redirectToHome() {
      window.location.href = "home.html";
    }

    function finishOnboarding(petName, ownerName, options) {
      const hasPetCustomName = !!(options && options.hasPetCustomName);
      const hasOwnerCustomName = !!(options && options.hasOwnerCustomName);
      const skipOwnerMessage = !!(options && options.skipOwnerMessage);
      setPetNameToLocal(petName);
      setOwnerNameToLocal(ownerName);
      try {
        localStorage.setItem(ONBOARDING_KEY, "1");
      } catch (_) {}
      closeNameModal();

      const overlay = document.getElementById("boot-overlay");
      if (overlay) {
        overlay.classList.remove("boot-breathe");
        overlay.classList.remove("boot-happy");
        void overlay.offsetWidth;
        overlay.classList.add("boot-happy");
      }

      if (!skipOwnerMessage) {
        showTalkBubble();
        if (hasOwnerCustomName) {
          setTalkText(
            currentLang === "ko"
              ? ownerName + "님! 기억했어 기억했어~\n한 번 더 불러볼까? ...헤헤, 이 호칭 너무 좋아 ❤️"
              : currentLang === "en"
              ? ownerName + "! Got it, saved!\nCan I call you once more? Hehe, I love calling you this ❤️"
              : ownerName + "！记住啦记住啦～\n再叫一次试试？……嘿嘿，我好喜欢这么喊你 ❤️"
          );
        } else if (!hasPetCustomName) {
          setTalkText(
            currentLang === "ko"
              ? "(╥﹏╥) 알겠어... 다음엔 꼭 이름 지어줘! 지금은 일단 noddy라고 불러줘~"
              : currentLang === "en"
              ? "(╥﹏╥) Okay... please give me a name next time! For now, just call me noddy~"
              : "(╥﹏╥) 好吧…下次一定要给我起名字哦！现在就暂时叫我 noddy 吧~"
          );
        } else {
          setTalkText(
            currentLang === "ko"
              ? petName + "! Noddy가 이 이름 정말 좋아~"
              : currentLang === "en"
              ? petName + "! Noddy loves this name~"
              : petName + "！Noddy 喜欢这个名字～"
          );
        }
      } else {
        hideTalkBubble();
      }
      const STAY_MS = skipOwnerMessage ? 400 : 3600;
      const FADE_MS = skipOwnerMessage ? 200 : 450;
      setTimeout(function () {
        if (overlay) overlay.classList.add("boot-fadeout");
      }, Math.max(0, STAY_MS - FADE_MS));
      setTimeout(function () {
        redirectToHome();
      }, STAY_MS);
    }

    window.goOwnerStepFromPetName = function goOwnerStepFromPetName(options) {
      const input = document.getElementById("petName-input-index");
      const raw = input ? input.value : "";
      const trimmed = raw && String(raw).trim() ? String(raw).trim() : "";
      const forceSkip = !!(options && options.forceSkip);
      const hasCustomName = !forceSkip && !!trimmed;
      const name = hasCustomName ? trimmed : "noddy";
      if (input && !String(raw || "").trim()) input.value = name;
      onboardingPetNameWasCustom = hasCustomName;
      if (hasCustomName) {
        closeNameModal();
        showTalkBubble();
        setTalkText(
          currentLang === "ko"
            ? name + "! Noddy가 이 이름 정말 좋아~"
            : currentLang === "en"
            ? name + "! Noddy loves this name~"
            : name + "！Noddy 喜欢这个名字～"
        );
        setTimeout(function () {
          showOwnerStepModal();
        }, 1800);
        return;
      }
      closeNameModal();
      showTalkBubble();
      setTalkText(
        currentLang === "ko"
          ? "(╥﹏╥) 알겠어... 다음엔 꼭 이름 지어줘! 지금은 일단 noddy라고 불러줘~"
          : currentLang === "en"
          ? "(╥﹏╥) Okay... please give me a name next time! For now, just call me noddy~"
          : "(╥﹏╥) 好吧…下次一定要给我起名字哦！现在就暂时叫我 noddy 吧~"
      );
      setTimeout(function () {
        showOwnerStepModal();
      }, 1800);
    };

    window.skipPetNameAndNext = function skipPetNameAndNext() {
      const input = document.getElementById("petName-input-index");
      if (input) input.value = "noddy";
      window.goOwnerStepFromPetName({ forceSkip: true });
    };

    window.confirmNameFromIndex = function confirmNameFromIndex() {
      const petInput = document.getElementById("petName-input-index");
      const petRaw = petInput ? petInput.value : "";
      const petName = petRaw && String(petRaw).trim() ? String(petRaw).trim() : "noddy";

      const ownerInput = document.getElementById("ownerName-input-index");
      const ownerRaw = ownerInput ? ownerInput.value : "";
      const ownerName = ownerRaw && String(ownerRaw).trim() ? String(ownerRaw).trim() : "你";
      const hasOwnerCustomName = ownerName !== "你";
      const hasPetCustomName =
        onboardingPetNameWasCustom || (petName && petName !== "noddy");
      finishOnboarding(petName, ownerName, {
        hasPetCustomName: hasPetCustomName,
        hasOwnerCustomName: hasOwnerCustomName,
      });
    };

    window.skipOwnerNameAndContinue = function skipOwnerNameAndContinue() {
      const petInput = document.getElementById("petName-input-index");
      const petRaw = petInput ? petInput.value : "";
      const petName = petRaw && String(petRaw).trim() ? String(petRaw).trim() : "noddy";
      const hasPetCustomName =
        onboardingPetNameWasCustom || (petName && petName !== "noddy");
      finishOnboarding(petName, "你", {
        hasPetCustomName: hasPetCustomName,
        hasOwnerCustomName: false,
        skipOwnerMessage: true,
      });
    };

    function playBootAnimation() {
      ensureAnonymousDefault();
      try {
        localStorage.setItem(FLOW_MODE_KEY, "bluetooth_only");
      } catch (_) {}

      const reduced = detectReducedMotion();
      const overlay = document.getElementById("boot-overlay");
      if (!overlay) return;

      const noddyImg = document.getElementById("noddy-buddy");
      if (!noddyImg) return;

      const returning =
        localStorage.getItem("noddy_onboarding_complete") === "1" ||
        !!localStorage.getItem("noddy_account_id");
      const petName = (localStorage.getItem("petName") || "noddy").trim() || "noddy";
      const ownerName = (localStorage.getItem(OWNER_NAME_KEY) || "").trim();
      const greetTexts = getGreetingTexts(petName, ownerName, returning);

      overlay.classList.remove("boot-show");
      overlay.classList.remove("boot-breathe");
      overlay.classList.remove("boot-happy");
      hideTalkBubble();
      setTalkText("");

      overlay.classList.remove("hidden");
      overlay.classList.add("boot-show");

      const runStage2And3 = function () {
        showTalkBubble();

        typewriter80(greetTexts.greet)
          .then(function () {
            setTimeout(function () {
              try {
                if (localStorage.getItem(ONBOARDING_KEY) === "1") {
                  redirectToHome();
                  return;
                }
              } catch (_) {}

              openConnectModal();
            }, 1500);
          })
          .catch(function () {
            try {
              if (localStorage.getItem(ONBOARDING_KEY) === "1") {
                redirectToHome();
                return;
              }
            } catch (_) {}
            openConnectModal();
          });
      };

      if (reduced) {
        overlay.classList.add("boot-breathe");
        runStage2And3();
        return;
      }

      setTimeout(function () {
        overlay.classList.add("boot-breathe");
        runStage2And3();
      }, 2000);
    }

    playBootAnimation();
  </script>
</body>
</html>
