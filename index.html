<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <title>Noddy - 未登录</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body {
      font-family: Pretendard, "Apple SD Gothic Neo", system-ui, -apple-system,
        BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: radial-gradient(circle at top, #ffeef5 0, #fff7f0 40%, #ffffff 100%);
    }
  </style>
</head>
<body class="min-h-screen flex items-center justify-center px-4 py-8">
  <div
    class="w-full max-w-md bg-white/90 backdrop-blur rounded-3xl shadow-[0_18px_45px_rgba(245,132,155,0.22)] px-6 py-8 sm:px-8 sm:py-10 space-y-8"
  >
    <!-- 语言切换 -->
    <div class="flex justify-end">
      <label for="lang-select" class="sr-only">Language</label>
      <div class="relative">
        <select
          id="lang-select"
          class="rounded-full border border-slate-200 bg-white/90 px-3 py-1.5 text-xs sm:text-sm text-slate-700 shadow-sm hover:bg-white focus:outline-none focus:ring-2 focus:ring-rose-300 focus:border-rose-300"
        >
          <option value="ko">한국어</option>
          <option value="en">English</option>
          <option value="zh">中文</option>
        </select>
      </div>
    </div>

    <header class="space-y-4">
      <div class="flex items-center justify-between">
        <div class="flex items-center gap-3">
          <div
            class="inline-flex items-center justify-center w-12 h-12 rounded-2xl bg-gradient-to-br from-pink-300 via-rose-300 to-amber-200 shadow-md"
          >
            <span class="text-sm font-semibold text-white tracking-tight">N</span>
          </div>
          <div class="flex flex-col gap-0.5">
            <span class="text-base font-semibold text-slate-900">Noddy</span>
            <span class="text-[11px] text-slate-500" data-i18n="guest.subtitle"></span>
          </div>
        </div>
      </div>

      <div class="space-y-2">
        <h1 class="text-lg sm:text-xl font-semibold text-slate-900 leading-relaxed" data-i18n="guest.title"></h1>
        <p class="text-xs sm:text-sm text-slate-500 leading-relaxed" data-i18n="guest.desc"></p>
      </div>
    </header>

    <main class="space-y-4">
      <button
        type="button"
        onclick="window.location.href='./signup.html'"
        class="w-full inline-flex items-center justify-center gap-2 rounded-full bg-rose-400 text-white text-sm sm:text-base font-medium px-4 py-3 shadow-sm hover:bg-rose-500 active:scale-[0.99] transition"
      >
        <span data-i18n="guest.goLogin"></span>
      </button>

      <div class="pt-2 border-t border-rose-100/70 mt-2"></div>

      <div class="space-y-3">
        <p class="text-[11px] sm:text-xs text-slate-500 leading-relaxed" data-i18n="guest.afterLoginHint"></p>
        <button
          type="button"
          onclick="window.location.href='./signup.html'"
          class="w-full inline-flex items-center justify-center gap-2 rounded-full border border-rose-100 bg-rose-50 text-xs sm:text-sm text-rose-500 px-4 py-2.5 hover:bg-rose-100 active:scale-[0.99] transition"
        >
          <span data-i18n="guest.addDevice"></span>
        </button>
      </div>
    </main>

    <!-- 当前服务区：极小灰字 + 可点击切换 -->
    <div class="pt-2 text-[10px] sm:text-[11px] text-slate-400 text-center">
      <button
        type="button"
        id="region-toggle-index"
        onclick="toggleRegionIndex()"
        class="inline-flex items-center gap-1 text-slate-400 hover:text-slate-600 transition"
      >
        <span>当前服务区：</span>
        <span id="region-label-index"></span>
        <span class="ml-1 opacity-70">· 点击切换</span>
      </button>
    </div>
  </div>

  <script>
    const I18N = {
      ko: {
        "guest.subtitle": "기기 연결 전 기본 화면",
        "guest.title": "기기 추가하기 전에\n먼저 로그인해 주세요",
        "guest.desc": "소중한 기록을 위해 로그인이 필요해요",
        "guest.goLogin": "로그인하러 가기",
        "guest.afterLoginHint": "로그인 후 언제든지 기기를 추가하고, Noddy와 더 즐겁게 놀아봐요.",
        "guest.addDevice": "기기 추가하기",
      },
      en: {
        "guest.subtitle": "Default screen before connecting device",
        "guest.title": "Please log in first\nbefore adding a device",
        "guest.desc": "Log in to keep your precious records and sync across devices.",
        "guest.goLogin": "Go to login",
        "guest.afterLoginHint": "After logging in, you can add devices anytime and enjoy playing with Noddy even more.",
        "guest.addDevice": "Add device",
      },
      zh: {
        "guest.subtitle": "未登录默认页",
        "guest.title": "添加设备前\n请先登录",
        "guest.desc": "为了珍贵的记录，需要先登录账号，方便在多设备间同步。",
        "guest.goLogin": "前往登录",
        "guest.afterLoginHint": "登录后可随时添加设备，和 Noddy 更好的玩耍吧。",
        "guest.addDevice": "添加设备",
      },
    };

    function detectLang() {
      const saved = localStorage.getItem("noddy_lang");
      if (saved && I18N[saved]) return saved;
      const nav = (navigator.language || "").toLowerCase();
      if (nav.startsWith("ko")) return "ko";
      if (nav.startsWith("zh")) return "zh";
      return "en";
    }

    let currentLang = detectLang();

    function t(key) {
      return (I18N[currentLang] && I18N[currentLang][key]) || (I18N.en && I18N.en[key]) || key;
    }

    function applyLang(lang) {
      if (!I18N[lang]) return;
      currentLang = lang;
      localStorage.setItem("noddy_lang", lang);
      document.documentElement.lang = lang === "ko" ? "ko" : lang === "zh" ? "zh-CN" : "en";
      document.querySelectorAll("[data-i18n]").forEach(function (el) {
        const key = el.getAttribute("data-i18n");
        if (!key) return;
        const text = t(key);
        el.innerHTML = text.replace(/\\n/g, "<br>").replace(/\n/g, "<br>");
      });
    }

    const langSelect = document.getElementById("lang-select");
    if (langSelect) {
      langSelect.value = currentLang;
      langSelect.addEventListener("change", function (e) {
        applyLang(e.target.value);
      });
    }
    applyLang(currentLang);

    // ------------------------
    // Region indicator (index)
    // ------------------------
    const REGION_KEY = "noddy_region"; // 与 signup.html 保持一致

    function isValidRegion(v) {
      return v === "global" || v === "cn";
    }

    function getCurrentRegion() {
      const v = localStorage.getItem(REGION_KEY);
      return isValidRegion(v) ? v : "global";
    }

    function setCurrentRegion(region) {
      if (!isValidRegion(region)) return;
      localStorage.setItem(REGION_KEY, region);
      updateRegionLabelIndex();
    }

    function getRegionLabel(region) {
      // 这里直接用中文，方便在未加载 i18n 的情况下也一目了然
      return region === "cn" ? "中国服务区" : "国际服务区";
    }

    function updateRegionLabelIndex() {
      const el = document.getElementById("region-label-index");
      if (!el) return;
      el.textContent = getRegionLabel(getCurrentRegion());
    }

    function toggleRegionIndex() {
      const next = getCurrentRegion() === "cn" ? "global" : "cn";
      setCurrentRegion(next);
    }

    async function detectRegionByIPOnceIndex() {
      // 如果用户已经切过，就不再打扰
      if (localStorage.getItem(REGION_KEY)) {
        updateRegionLabelIndex();
        return;
      }
      try {
        const resp = await fetch("https://ipapi.co/json/", { cache: "no-store" });
        if (!resp.ok) throw new Error("ip lookup failed");
        const data = await resp.json();
        const cc = String(data && (data.country_code || data.country)).toUpperCase();
        if (cc === "CN") {
          setCurrentRegion("cn");
        } else {
          setCurrentRegion("global");
        }
      } catch (e) {
        // 失败则保持默认国际服
        updateRegionLabelIndex();
      }
    }

    updateRegionLabelIndex();
    detectRegionByIPOnceIndex();
  </script>
</body>
</html>
