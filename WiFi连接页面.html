<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>为设备配置网络</title>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;500;600;700&display=swap">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --purple-light: #e8dff5;
      --purple: #c4b5e0;
      --blue-light: #d4e8f7;
      --blue: #a8d4f0;
      --pink: #ff9ac4;
      --pink-light: #ffe6f2;
      --card-bg: rgba(255, 255, 255, 0.95);
      --shadow: 0 4px 20px rgba(164, 150, 200, 0.25);
      --radius: 16px;
      --radius-sm: 12px;
    }

    body {
      font-family: 'Noto Sans SC', -apple-system, sans-serif;
      min-height: 100vh;
      background: linear-gradient(180deg, var(--purple-light) 0%, var(--blue-light) 30%, #fff 55%);
      color: #333;
    }

    .status-bar {
      padding: 10px 20px 8px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 14px;
      color: #666;
    }

    .nav-row {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 8px 20px 16px;
    }

    .back-btn {
      width: 32px;
      height: 32px;
      border: none;
      background: transparent;
      font-size: 20px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #333;
    }

    .step-dots {
      display: flex;
      gap: 6px;
      margin-top: 4px;
    }

    .step-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #ddd;
    }

    .step-dot.active { background: var(--pink); }

    .page-header {
      padding: 0 20px 20px;
    }

    .page-title {
      font-size: 22px;
      font-weight: 700;
      color: #333;
      margin-bottom: 8px;
    }

    .page-desc {
      font-size: 13px;
      color: #666;
      line-height: 1.5;
    }

    .wifi-list {
      padding: 0 20px 24px;
      max-width: 400px;
      margin: 0 auto;
    }

    .wifi-item {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 14px 16px;
      background: var(--card-bg);
      border-radius: var(--radius-sm);
      margin-bottom: 10px;
      box-shadow: var(--shadow);
      cursor: pointer;
      transition: all 0.2s;
    }

    .wifi-item:hover {
      transform: translateY(-1px);
      box-shadow: 0 6px 24px rgba(164, 150, 200, 0.35);
    }

    .wifi-item.add-more {
      color: #666;
      border: 1px dashed rgba(196, 181, 224, 0.6);
      background: rgba(255, 255, 255, 0.8);
    }

    .wifi-name { font-weight: 500; color: #333; flex: 1; }
    .wifi-signal { font-size: 18px; color: #666; }
    .wifi-lock { font-size: 14px; color: #999; }

    .wifi-hint {
      margin: 6px 0 12px;
      font-size: 12px;
      color: #fb7185;
    }

    .scan-row {
      display: flex;
      align-items: center;
      gap: 10px;
      margin: 12px 0 8px;
    }

    .btn-scan {
      flex: 1;
      padding: 12px 14px;
      border: none;
      border-radius: var(--radius-sm);
      background: linear-gradient(135deg, rgba(255, 154, 196, 0.18), rgba(255, 195, 113, 0.18));
      color: #5a4a7a;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      box-shadow: var(--shadow);
    }

    .btn-scan:active { transform: scale(0.99); }

    .scan-spinner {
      width: 18px;
      height: 18px;
      border-radius: 50%;
      border: 2px solid rgba(255, 154, 196, 0.45);
      border-top-color: rgba(255, 154, 196, 1);
      animation: spin 0.8s linear infinite;
      display: none;
    }

    .scan-spinner.show { display: inline-block; }

    @keyframes spin { to { transform: rotate(360deg); } }

    /* 成功状态页 */
    .success-view {
      display: none;
      padding: 40px 20px 24px;
      text-align: center;
    }

    .success-view.show { display: block; }

    .select-view.show { display: block; }
    .select-view { display: none; }

    .success-icon-wrap {
      width: 120px;
      height: 120px;
      margin: 0 auto 20px;
      background: linear-gradient(145deg, #fff9e6, #fff5e0);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
      box-shadow: 0 8px 28px rgba(255, 200, 100, 0.3);
    }

    .success-icon-wrap .face {
      font-size: 56px;
    }

    .success-icon-wrap .check-badge {
      position: absolute;
      right: 4px;
      bottom: 4px;
      width: 36px;
      height: 36px;
      border-radius: 50%;
      background: #4caf50;
      border: 3px solid var(--pink);
      display: flex;
      align-items: center;
      justify-content: center;
      color: #fff;
      font-size: 18px;
      font-weight: bold;
    }

    .success-text {
      font-size: 16px;
      color: #333;
      margin-bottom: 28px;
    }

    .success-text .ssid { font-weight: 600; color: #5a4a7a; }

    .btn-done {
      width: 100%;
      max-width: 320px;
      margin: 0 auto;
      padding: 14px 24px;
      border: none;
      border-radius: 999px;
      background: linear-gradient(135deg, var(--pink), #ffc371);
      color: #fff;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      box-shadow: 0 8px 24px rgba(255, 154, 196, 0.4);
      font-family: inherit;
      display: block;
    }

    .btn-done:hover { opacity: 0.95; }

    /* 弹窗 */
    .overlay {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: rgba(0, 0, 0, 0.4);
      z-index: 200;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }

    .overlay.show { display: flex; }

    .modal {
      background: var(--card-bg);
      border-radius: 20px;
      padding: 20px 20px 24px;
      width: 100%;
      max-width: 340px;
      box-shadow: 0 14px 40px rgba(0, 0, 0, 0.2);
    }

    .modal-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 16px;
    }

    .modal-title { font-size: 17px; font-weight: 600; color: #333; }

    .modal-close {
      width: 28px;
      height: 28px;
      border: none;
      background: #f0f0f0;
      border-radius: 50%;
      font-size: 18px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #666;
    }

    .password-wrap {
      margin-bottom: 14px;
    }

    .password-wrap input {
      width: 100%;
      padding: 12px 44px 12px 14px;
      border: 2px solid #eee;
      border-radius: var(--radius-sm);
      font-size: 15px;
      font-family: inherit;
    }

    .password-wrap input:focus {
      outline: none;
      border-color: var(--purple);
    }

    .password-wrap .input-wrap {
      position: relative;
    }

    .password-wrap .toggle-pwd {
      position: absolute;
      right: 12px;
      top: 50%;
      transform: translateY(-50%);
      border: none;
      background: none;
      font-size: 18px;
      cursor: pointer;
      color: #999;
    }

    .remember-row {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 20px;
      font-size: 14px;
      color: #666;
      cursor: pointer;
    }

    .remember-row input { width: 18px; height: 18px; accent-color: var(--pink); cursor: pointer; }

    .btn-confirm-pwd {
      width: 100%;
      padding: 12px;
      border: none;
      border-radius: 12px;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      font-family: inherit;
      background: linear-gradient(135deg, var(--pink), #ffc371);
      color: #fff;
      box-shadow: 0 4px 14px rgba(255, 154, 196, 0.35);
    }
  </style>
</head>
<body>
  <div class="status-bar">
    <span>14:33</span>
    <span>
      <select id="lang-select" class="lang-select" aria-label="Language" style="border:none;background:transparent;font-size:14px;color:#666;cursor:pointer;margin-left:8px">
        <option value="ko">한국어</option>
        <option value="en">English</option>
        <option value="zh">中文</option>
      </select>
    </span>
  </div>

  <div class="nav-row">
    <button type="button" class="back-btn" onclick="history.back()">←</button>
    <div class="step-dots">
      <span class="step-dot active"></span>
      <span class="step-dot"></span>
      <span class="step-dot"></span>
    </div>
  </div>

  <div class="page-header">
    <h1 class="page-title" data-i18n="wifi.title"></h1>
    <p class="page-desc" data-i18n="wifi.desc"></p>
  </div>

  <div class="select-view show" id="selectView">
    <div class="wifi-list">
      <div class="wifi-item add-more" role="button" onclick="window.location.href='WiFi连接页面1.0.html'">
        <span class="wifi-name" data-i18n="wifi.addHotspot"></span>
      </div>

      <div class="scan-row">
        <button type="button" class="btn-scan" id="btnScanWifi" data-i18n="wifi.scanBtn"></button>
        <span class="scan-spinner" id="scanSpinner" aria-hidden="true"></span>
      </div>
      <p class="wifi-hint" data-i18n="wifi.tip24g"></p>

      <div id="wifi-results" style="display:none;">
        <div class="wifi-item" data-ssid="GYZNKJG">
          <span class="wifi-name">GYZNKJG</span>
          <span class="wifi-signal">▂▄▆█</span>
          <span class="wifi-lock">🔒</span>
        </div>
        <div class="wifi-item" data-ssid="TP-LINK_guodiqing">
          <span class="wifi-name">TP-LINK_guodiqing</span>
          <span class="wifi-signal">▂▄▆</span>
          <span class="wifi-lock">🔒</span>
        </div>
        <div class="wifi-item" data-ssid="FAST_2.4G_891F">
          <span class="wifi-name">FAST_2.4G_891F</span>
          <span class="wifi-signal">▂▄</span>
          <span class="wifi-lock">🔒</span>
        </div>
        <div class="wifi-item" data-ssid="DIRECT-d5-HP M254 LaserJet">
          <span class="wifi-name">DIRECT-d5-HP M254 LaserJet</span>
          <span class="wifi-signal">▂▄</span>
          <span class="wifi-lock">🔒</span>
        </div>
      </div>
    </div>
  </div>

  <div class="success-view" id="successView">
    <div class="page-header">
      <h1 class="page-title" data-i18n="wifi.title"></h1>
      <p class="page-desc" data-i18n="wifi.desc"></p>
    </div>
    <div class="success-icon-wrap">
      <span class="face">☁️</span>
      <span class="check-badge">✓</span>
    </div>
    <p class="success-text"><span data-i18n="wifi.configured"></span> <span class="ssid" id="successSsid">GYZNKJG</span></p>
    <button type="button" class="btn-done" onclick="goMain()" data-i18n="wifi.doneBtn"></button>
  </div>

  <!-- 输入密码弹窗 -->
  <div class="overlay" id="overlayPassword">
    <div class="modal">
      <div class="modal-header">
        <span class="modal-title" id="modalPasswordTitle"></span>
        <button type="button" class="modal-close" onclick="closePasswordModal()">×</button>
      </div>
      <div class="password-wrap">
        <div class="input-wrap">
          <input type="password" id="inputPassword" data-i18n-placeholder="wifi.pwdPlaceholder" />
          <button type="button" class="toggle-pwd" onclick="togglePwd()">👁</button>
        </div>
      </div>
      <label class="remember-row">
        <input type="checkbox" id="rememberPwd" checked />
        <span data-i18n="wifi.rememberPwd"></span>
      </label>
      <button type="button" class="btn-confirm-pwd" onclick="confirmPassword()" data-i18n="wifi.confirm"></button>
    </div>
  </div>

  <script>
(function() {
  var I18N = {
    ko: { "wifi.title": "기기에 네트워크 설정하기", "wifi.desc": "기기는 2.4GHz Wi‑Fi만 지원해요.", "wifi.addHotspot": "휴대폰 핫스팟/네트워크 추가…", "wifi.scanBtn": "Wi‑Fi 스캔", "wifi.tip24g": "안내: Noddy는 2.4GHz 대역 Wi‑Fi만 지원해요~", "wifi.configured": "설정된 네트워크", "wifi.doneBtn": "설정 완료", "wifi.pwdPlaceholder": "비밀번호 입력", "wifi.rememberPwd": "비밀번호 저장 허용", "wifi.confirm": "확인", "wifi.pwdTitleFormat": "{ssid} 비밀번호 입력" },
    en: { "wifi.title": "Configure device network", "wifi.desc": "Device only supports 2.4GHz Wi‑Fi.", "wifi.addHotspot": "Add hotspot/network…", "wifi.scanBtn": "Scan Wi‑Fi", "wifi.tip24g": "Friendly reminder: Noddy only supports 2.4GHz Wi‑Fi.", "wifi.configured": "Configured network", "wifi.doneBtn": "Done", "wifi.pwdPlaceholder": "Enter password", "wifi.rememberPwd": "Allow saving password", "wifi.confirm": "OK", "wifi.pwdTitleFormat": "Enter password for {ssid}" },
    zh: { "wifi.title": "为设备配置网络", "wifi.desc": "设备只支持使用 2.4GHz Wi‑Fi 连接。", "wifi.addHotspot": "添加手机热点/网络…", "wifi.scanBtn": "扫描 Wi‑Fi", "wifi.tip24g": "温馨提示：Noddy 仅支持 2.4GHz 频段的 Wi‑Fi 哦～", "wifi.configured": "已配置网络", "wifi.doneBtn": "完成配置", "wifi.pwdPlaceholder": "请输入密码", "wifi.rememberPwd": "允许记住密码", "wifi.confirm": "确定", "wifi.pwdTitleFormat": "输入 {ssid} 密码" }
  };
  function detectLang() {
    var saved = localStorage.getItem("noddy_lang");
    if (saved && I18N[saved]) return saved;
    var nav = (navigator.language || "").toLowerCase();
    if (nav.indexOf("ko") === 0) return "ko";
    if (nav.indexOf("zh") === 0) return "zh";
    return "en";
  }
  var currentLang = detectLang();
  function t(key) { return (I18N[currentLang] && I18N[currentLang][key]) || (I18N.en && I18N.en[key]) || key; }
  function applyLang(lang) {
    if (!I18N[lang]) return;
    currentLang = lang;
    localStorage.setItem("noddy_lang", lang);
    document.documentElement.lang = lang === "ko" ? "ko" : lang === "zh" ? "zh-CN" : "en";
    document.querySelectorAll("[data-i18n]").forEach(function(el) {
      var key = el.getAttribute("data-i18n");
      if (!key) return;
      el.textContent = t(key) || "";
    });
    document.querySelectorAll("[data-i18n-placeholder]").forEach(function(el) {
      var key = el.getAttribute("data-i18n-placeholder");
      if (!key) return;
      el.placeholder = t(key) || "";
    });
  }
  var sel = document.getElementById("lang-select");
  if (sel) { sel.value = currentLang; sel.addEventListener("change", function(e) { applyLang(e.target.value); }); }
  applyLang(currentLang);
  window._wifiT = t;
  window._wifiApplyLang = applyLang;
})();
    var currentSsid = '';
    var resultsWrap = document.getElementById('wifi-results');
    var scanBtn = document.getElementById('btnScanWifi');
    var scanSpinner = document.getElementById('scanSpinner');

    function openPasswordModal(ssid) {
      currentSsid = ssid;
      var titleEl = document.getElementById('modalPasswordTitle');
      titleEl.textContent = (window._wifiT ? window._wifiT('wifi.pwdTitleFormat') : ('输入 ' + currentSsid + ' 密码')).replace('{ssid}', currentSsid);
      document.getElementById('inputPassword').value = '';
      document.getElementById('overlayPassword').classList.add('show');
    }

    if (resultsWrap) {
      resultsWrap.addEventListener('click', function(e) {
        var item = e.target && e.target.closest ? e.target.closest('.wifi-item[data-ssid]') : null;
        if (!item) return;
        openPasswordModal(item.getAttribute('data-ssid'));
      });
    }

    function renderScanResults(ssids) {
      if (!resultsWrap) return;
      resultsWrap.innerHTML = '';
      (ssids || []).forEach(function(s) {
        var ssid = typeof s === 'string' ? s : (s && s.ssid) || '';
        if (!ssid) return;
        var el = document.createElement('div');
        el.className = 'wifi-item';
        el.setAttribute('data-ssid', ssid);
        el.innerHTML = '<span class="wifi-name"></span><span class="wifi-signal">▂▄▆</span><span class="wifi-lock">🔒</span>';
        el.querySelector('.wifi-name').textContent = ssid;
        resultsWrap.appendChild(el);
      });
      resultsWrap.style.display = (ssids && ssids.length) ? 'block' : 'none';
    }

    // 给 uni/原生注入用：扫描到结果后直接调用
    window.noddyWifiSetScanResults = function(list) {
      if (scanSpinner) scanSpinner.classList.remove('show');
      renderScanResults(list);
    };

    function simulateScan() {
      // 原型演示：这里用模拟数据。uni 环境下请调用 window.noddyWifiSetScanResults([...])
      renderScanResults(['GYZNKJG', 'TP-LINK_guodiqing', 'FAST_2.4G_891F', 'DIRECT-d5-HP M254 LaserJet']);
    }

    function startScan() {
      if (scanSpinner) scanSpinner.classList.add('show');
      // 如果宿主环境提供扫描能力，可在这里接入并最终调用 window.noddyWifiSetScanResults(results)
      setTimeout(function() {
        if (scanSpinner) scanSpinner.classList.remove('show');
        simulateScan();
      }, 600);
    }

    if (scanBtn) {
      scanBtn.addEventListener('click', function() {
        startScan();
      });
    }

    function togglePwd() {
      var inp = document.getElementById('inputPassword');
      var btn = document.querySelector('.toggle-pwd');
      if (inp.type === 'password') {
        inp.type = 'text';
        btn.textContent = '🙈';
      } else {
        inp.type = 'password';
        btn.textContent = '👁';
      }
    }

    function closePasswordModal() {
      document.getElementById('overlayPassword').classList.remove('show');
    }

    function confirmPassword() {
      var pwd = document.getElementById('inputPassword').value;
      if (!pwd.trim()) return;
      closePasswordModal();
      document.getElementById('selectView').classList.remove('show');
      document.getElementById('successSsid').textContent = currentSsid;
      document.getElementById('successView').classList.add('show');
    }

    function goMain() {
      window.location.href = '欢迎页面.html';
    }
  </script>
</body>
</html>
