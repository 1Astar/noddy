<!DOCTYPE html>
<html lang="zh-CN">

<head>
  <meta charset="UTF-8" />
  <title>Noddy - Login / Sign Up</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />

  <!-- Tailwind CSS CDN -->
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    :root {
      --primary-pink: #f5849b;
      --secondary-amber: #fcd34d;
      --bg-gradient: radial-gradient(circle at top, #ffeef5 0, #fff7f0 40%, #ffffff 100%);
    }

    html,
    body {
      height: 100%;
      margin: 0;
      padding: 0;
      overflow: hidden;
    }

    body {
      font-family: Pretendard, "Apple SD Gothic Neo", system-ui, -apple-system,
        BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: var(--bg-gradient) !important;
      min-height: 100dvh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1rem;
    }

    /* Adaptive container with glassmorphism */
    .adaptive-card {
      width: 100%;
      max-width: 440px;
      max-height: 92dvh;
      display: flex;
      flex-direction: column;
      background: rgba(255, 255, 255, 0.82);
      backdrop-filter: blur(24px);
      -webkit-backdrop-filter: blur(24px);
      border: 1px solid rgba(255, 255, 255, 0.6);
      border-radius: 2.5rem;
      box-shadow: 0 25px 55px rgba(245, 132, 155, 0.18);
      animation: fadeInUp 0.8s cubic-bezier(0.16, 1, 0.3, 1) both;
    }

    .card-scroll-area {
      overflow-y: auto;
      padding: 2.5rem 2rem;
      scrollbar-width: none;
      /* Hide scrollbar for Firefox */
    }

    .card-scroll-area::-webkit-scrollbar {
      display: none;
      /* Hide scrollbar for Chrome/Safari */
    }

    .signup-password-hint .hint-icon {
      font-size: 0.7em;
    }

    .signup-password-hint.passed {
      color: #22c55e;
    }

    .signup-password-hint.passed .hint-icon {
      color: #22c55e;
    }

    .field-tip {
      margin-top: 0.35rem;
      font-size: 12px;
      line-height: 1.45;
      color: #94a3b8;
      white-space: pre-wrap;
      display: none;
    }

    .field-tip.show {
      display: block;
    }

    .field-tip.error {
      color: #e75480;
    }

    .field-tip.success {
      color: #0f766e;
    }

    @keyframes fadeInUp {
      from {
        opacity: 0;
        transform: translateY(30px) scale(0.98);
      }

      to {
        opacity: 1;
        transform: translateY(0) scale(1);
      }
    }

    .btn-hover-effect:active {
      transform: scale(0.98);
      transition: transform 0.1s;
    }

    /* Region switcher: only in index.html */
  </style>
</head>

<body>
  <div class="adaptive-card">
    <!-- Mobile Drag Handle -->
    <div class="flex justify-center pt-4 sm:hidden">
      <div class="w-12 h-1.5 rounded-full bg-slate-300/40"></div>
    </div>

    <div class="card-scroll-area space-y-8">
      <!-- Logo + 标题 -->
      <header class="text-center space-y-3">
        <div
          class="inline-flex items-center justify-center w-16 h-16 rounded-3xl bg-gradient-to-br from-pink-300 via-rose-300 to-amber-200 shadow-md">
          <!-- 可爱笑脸 Logo -->
          <div class="relative w-9 h-9 rounded-3xl bg-white flex items-center justify-center">
            <div class="absolute top-[28%] left-[24%] w-1.5 h-1.5 rounded-full bg-rose-400"></div>
            <div class="absolute top-[28%] right-[24%] w-1.5 h-1.5 rounded-full bg-rose-400"></div>
            <div
              class="absolute bottom-[22%] left-[22%] right-[22%] h-[7px] rounded-full border-[3px] border-rose-300 border-t-transparent border-l-transparent border-r-transparent">
            </div>
          </div>
        </div>

        <div class="space-y-1">
          <h1 class="text-xl sm:text-2xl font-semibold tracking-tight text-slate-900">
            Noddy
          </h1>
        </div>
      </header>

      <!-- 主容器：不同页面状态 -->
      <main class="space-y-6">
        <!-- 登录首页 -->
        <section id="view-home" class="space-y-5">
          <div class="space-y-2 text-center">
            <h2 class="text-base sm:text-lg font-medium text-slate-900">
              <span data-i18n="home.title"></span>
            </h2>
            <p id="home-random-greeting" class="text-xs sm:text-sm text-slate-500 leading-relaxed"></p>
          </div>

          <div class="space-y-3 pt-2">
            <!-- 地区差异化登录方式（原型演示） -->
            <button id="btn-wechat" type="button" onclick="simulateThirdPartyLogin('wechat', event)"
              class="hidden w-full inline-flex items-center justify-center gap-2 rounded-full bg-[#07C160] text-white text-sm sm:text-base font-medium px-4 py-3 shadow-sm hover:brightness-105 active:scale-[0.99] transition">
              <span data-i18n="home.wechatLogin"></span>
            </button>

            <button id="btn-google" type="button" onclick="simulateThirdPartyLogin('google', event)"
              class="hidden w-full inline-flex items-center justify-center gap-2 rounded-full border border-slate-200 bg-white text-sm sm:text-base font-medium text-slate-800 px-4 py-3 shadow-sm hover:bg-slate-50 active:scale-[0.99] transition">
              <span data-i18n="home.googleLogin"></span>
            </button>

            <button id="btn-apple" type="button" onclick="simulateThirdPartyLogin('apple', event)"
              class="w-full inline-flex items-center justify-center gap-2 rounded-full bg-black text-white text-sm sm:text-base font-medium px-4 py-3 shadow-sm hover:bg-slate-900 active:scale-[0.99] transition">
              <span data-i18n="home.appleLogin"></span>
            </button>

            <!-- Email 登录 -->
            <button id="btn-email-login" type="button" onclick="handleEmailLoginClick()"
              class="w-full inline-flex items-center justify-center gap-2 rounded-full border border-rose-200 bg-rose-50 px-4 py-3 text-sm sm:text-base font-medium text-rose-600 shadow-sm hover:bg-rose-100 active:scale-[0.99] transition">
              <span id="email-login-spinner"
                class="hidden h-4 w-4 border-2 border-rose-300/80 border-t-transparent rounded-full animate-spin"></span>
              <span id="email-login-text" data-i18n="home.emailLogin"></span>
            </button>

            <!-- 手机登录（CN 次级入口） -->
            <button id="btn-phone-entry" type="button" onclick="switchView('phone-login')"
              class="hidden w-full inline-flex items-center justify-center gap-2 rounded-full border border-amber-200 bg-amber-50 px-4 py-3 text-sm sm:text-base font-medium text-amber-700 shadow-sm hover:bg-amber-100 active:scale-[0.99] transition">
              <span data-i18n="home.phoneLogin"></span>
            </button>
          </div>

          <div class="pt-3 text-center text-xs sm:text-sm text-slate-500 space-y-1">
            <p>
              <span data-i18n="home.noAccount"></span>
              <button type="button" onclick="switchView('signup')"
                class="text-rose-500 font-medium underline underline-offset-4 decoration-rose-200 hover:decoration-rose-400">
                <span data-i18n="home.signup"></span>
              </button>
            </p>
          </div>
        </section>

        <!-- 邮箱登录页（真正输入邮箱+密码） -->
        <section id="view-email-login" class="hidden space-y-6">
          <div class="space-y-2 text-center">
            <h2 class="text-base sm:text-lg font-medium text-slate-900">
              <span data-i18n="emailLogin.title"></span>
            </h2>
            <p class="text-xs sm:text-sm text-slate-500" data-i18n="emailLogin.desc"></p>
          </div>

          <!-- Tabs: 账号登录 / 验证码登录 -->
          <div class="flex rounded-3xl bg-white/60 p-1 border border-slate-200">
            <button id="tab-email-account" type="button" onclick="setEmailLoginTab('account')"
              class="flex-1 rounded-3xl px-3 py-2 text-xs sm:text-sm font-medium transition">
              <span data-i18n="login.tabAccount"></span>
            </button>
            <button id="tab-email-code" type="button" onclick="setEmailLoginTab('code')"
              class="flex-1 rounded-3xl px-3 py-2 text-xs sm:text-sm font-medium transition">
              <span data-i18n="login.tabCode"></span>
            </button>
          </div>

          <form class="space-y-4" onsubmit="return false;">
            <!-- 邮箱（两种模式共用） -->
            <div class="space-y-1.5">
              <label class="block text-xs sm:text-sm font-medium text-slate-700">
                <span data-i18n="common.email"></span>
              </label>
              <input id="email-input" type="email" data-email-autocomplete="true"
                data-i18n-placeholder="emailLogin.emailPlaceholder"
                class="w-full rounded-2xl border border-slate-200 bg-slate-50 px-3.5 py-2.5 text-sm sm:text-base text-slate-900 placeholder:text-slate-300 focus:outline-none focus:ring-2 focus:ring-rose-300 focus:border-rose-300" />
              <p id="tip-email-input" class="field-tip"></p>
            </div>

            <!-- 账号登录 -->
            <div id="email-panel-account" class="space-y-4">
              <div class="space-y-1.5">
                <label class="block text-xs sm:text-sm font-medium text-slate-700">
                  <span data-i18n="common.password"></span>
                </label>
                <input id="password-input" type="password" data-i18n-placeholder="common.passwordPlaceholder"
                  class="w-full rounded-2xl border border-slate-200 bg-slate-50 px-3.5 py-2.5 text-sm sm:text-base text-slate-900 placeholder:text-slate-300 focus:outline-none focus:ring-2 focus:ring-rose-300 focus:border-rose-300" />
                <p id="tip-password-input" class="field-tip"></p>
                <p class="text-[11px] sm:text-xs text-slate-400" data-i18n="common.passwordRule"></p>
                <div class="flex justify-end">
                  <button type="button" onclick="switchView('forgot')"
                    class="text-[11px] sm:text-xs text-rose-500 underline underline-offset-4 decoration-rose-200 hover:decoration-rose-400">
                    <span data-i18n="emailLogin.forgot"></span>
                  </button>
                </div>
              </div>

              <div class="space-y-1.5">
                <label class="block text-xs sm:text-sm font-medium text-slate-700">
                  <span data-i18n="common.captcha"></span>
                </label>
                <input id="captcha-input" type="text" data-i18n-placeholder="common.captchaPlaceholder"
                  class="w-full rounded-2xl border border-slate-200 bg-slate-50 px-3.5 py-2.5 text-sm sm:text-base text-slate-900 placeholder:text-slate-300 focus:outline-none focus:ring-2 focus:ring-rose-300 focus:border-rose-300" />
                <p id="tip-captcha-input" class="field-tip"></p>
              </div>
            </div>

            <!-- 验证码登录 -->
            <div id="email-panel-code" class="hidden space-y-4">
              <div class="space-y-1.5">
                <label class="block text-xs sm:text-sm font-medium text-slate-700">
                  <span data-i18n="common.code"></span>
                </label>
                <div class="flex gap-2">
                  <input id="email-otp-input" type="text" data-i18n-placeholder="emailLogin.otpPlaceholder"
                    class="flex-1 rounded-2xl border border-slate-200 bg-slate-50 px-3.5 py-2.5 text-sm sm:text-base text-slate-900 placeholder:text-slate-300 focus:outline-none focus:ring-2 focus:ring-rose-300 focus:border-rose-300" />
                  <button id="btn-send-email-code" type="button" onclick="handleSendCode()"
                    class="shrink-0 rounded-full bg-rose-100 text-rose-600 text-[11px] sm:text-xs font-medium px-3 py-2 hover:bg-rose-200 active:scale-[0.99] transition">
                    <span data-i18n="emailLogin.sendCode"></span>
                  </button>
                </div>
                <p class="text-[11px] sm:text-xs text-slate-400" data-i18n="emailLogin.otpHint"></p>
              </div>
            </div>

            <button id="btn-email-submit" type="button" onclick="handleEmailLoginSubmit()"
              class="w-full rounded-full bg-rose-400 text-white text-sm sm:text-base font-medium px-4 py-3 shadow-sm hover:bg-rose-500 active:scale-[0.99] transition">
              <span id="email-submit-spinner"
                class="hidden h-4 w-4 border-2 border-white/80 border-t-transparent rounded-full animate-spin mr-1.5"></span>
              <span id="email-submit-text" data-i18n="emailLogin.submit"></span>
            </button>
          </form>

          <div class="pt-3 flex flex-col items-center gap-1 text-xs sm:text-sm text-slate-500">
            <button type="button" onclick="switchView('signup')"
              class="text-rose-500 font-medium underline underline-offset-4 decoration-rose-200 hover:decoration-rose-400">
              <span data-i18n="emailLogin.toSignup"></span>
            </button>
            <button type="button" onclick="switchView('home')"
              class="text-[11px] sm:text-xs text-slate-400 hover:text-slate-600">
              <span data-i18n="common.backHome"></span>
            </button>
          </div>
        </section>

        <!-- 手机验证码登录页 -->
        <section id="view-phone-login" class="hidden space-y-6">
          <div class="space-y-2 text-center">
            <h2 class="text-base sm:text-lg font-medium text-slate-900">
              <span data-i18n="phoneLogin.title"></span>
            </h2>
            <p class="text-xs sm:text-sm text-slate-500 leading-relaxed" data-i18n="phoneLogin.desc"></p>
          </div>

          <!-- Tabs: 账号登录 / 验证码登录 -->
          <div class="flex rounded-3xl bg-white/60 p-1 border border-slate-200">
            <button id="tab-phone-account" type="button" onclick="setPhoneLoginTab('account')"
              class="flex-1 rounded-3xl px-3 py-2 text-xs sm:text-sm font-medium transition">
              <span data-i18n="login.tabAccount"></span>
            </button>
            <button id="tab-phone-code" type="button" onclick="setPhoneLoginTab('code')"
              class="flex-1 rounded-3xl px-3 py-2 text-xs sm:text-sm font-medium transition">
              <span data-i18n="login.tabCode"></span>
            </button>
          </div>

          <form class="space-y-4" onsubmit="return false;">
            <!-- 手机号（两种模式共用） -->
            <div class="space-y-1.5">
              <label class="block text-xs sm:text-sm font-medium text-slate-700">
                <span data-i18n="common.phone"></span>
              </label>
              <div class="flex gap-2">
                <select
                  class="w-[34%] rounded-2xl border border-slate-200 bg-slate-50 px-3 py-2 text-xs sm:text-sm text-slate-900 focus:outline-none focus:ring-2 focus:ring-rose-300 focus:border-rose-300">
                  <option data-i18n="phoneLogin.country82"></option>
                  <option data-i18n="phoneLogin.country86"></option>
                </select>
                <input id="phone-input" type="tel" data-i18n-placeholder="phoneLogin.phonePlaceholder"
                  class="flex-1 rounded-2xl border border-slate-200 bg-slate-50 px-3 py-2 text-xs sm:text-sm text-slate-900 placeholder:text-slate-300 focus:outline-none focus:ring-2 focus:ring-rose-300 focus:border-rose-300" />
              </div>
              <p id="tip-phone-input" class="field-tip"></p>
            </div>

            <!-- 账号登录 -->
            <div id="phone-panel-account" class="space-y-4">
              <div class="space-y-1.5">
                <label class="block text-xs sm:text-sm font-medium text-slate-700">
                  <span data-i18n="common.password"></span>
                </label>
                <div class="relative">
                  <input id="phone-password-input" type="password" data-i18n-placeholder="common.passwordPlaceholder"
                    class="w-full rounded-2xl border border-slate-200 bg-slate-50 px-3.5 py-2.5 text-sm sm:text-base text-slate-900 placeholder:text-slate-300 focus:outline-none focus:ring-2 focus:ring-rose-300 focus:border-rose-300" />
                </div>
                <p id="tip-phone-password-input" class="field-tip"></p>
                <p class="text-[11px] sm:text-xs text-slate-400" data-i18n="common.passwordRule"></p>
              </div>
            </div>

            <!-- 验证码登录 -->
            <div id="phone-panel-code" class="hidden space-y-4">
              <div class="space-y-1.5">
                <label class="block text-xs sm:text-sm font-medium text-slate-700">
                  <span data-i18n="common.code"></span>
                </label>
                <div class="flex gap-2">
                  <input id="code-input" type="text" data-i18n-placeholder="phoneLogin.codePlaceholder"
                    class="flex-1 rounded-2xl border border-slate-200 bg-slate-50 px-3 py-2 text-xs sm:text-sm text-slate-900 placeholder:text-slate-300 focus:outline-none focus:ring-2 focus:ring-rose-300 focus:border-rose-300" />
                  <button id="btn-send-code" type="button" onclick="handleSendCode()"
                    class="shrink-0 rounded-full bg-rose-100 text-rose-600 text-[11px] sm:text-xs font-medium px-3 py-2 hover:bg-rose-200 active:scale-[0.99] transition">
                    <span data-i18n="phoneLogin.sendCode"></span>
                  </button>
                </div>
                <p class="text-[11px] sm:text-xs text-slate-400">
                  <span data-i18n="phoneLogin.codeHint"></span>
                </p>
              </div>
            </div>

            <button id="btn-phone-submit" type="button" onclick="handlePhoneLoginSubmit()"
              class="w-full rounded-full bg-rose-400 text-white text-sm sm:text-base font-medium px-4 py-3 shadow-sm hover:bg-rose-500 active:scale-[0.99] transition">
              <span id="phone-submit-spinner"
                class="hidden h-4 w-4 border-2 border-white/80 border-t-transparent rounded-full animate-spin mr-1.5"></span>
              <span id="phone-submit-text" data-i18n="phoneLogin.submit"></span>
            </button>
          </form>

          <div class="pt-3 flex flex-col items-center gap-1 text-xs sm:text-sm text-slate-500">
            <button type="button" onclick="switchView('home')"
              class="text-[11px] sm:text-xs text-slate-400 hover:text-slate-600">
              <span data-i18n="common.backHome"></span>
            </button>
          </div>
        </section>

        <!-- 注册页 -->
        <section id="view-signup" class="hidden space-y-6">
          <div class="space-y-2 text-center">
            <h2 class="text-base sm:text-lg font-medium text-slate-900">
              <span data-i18n="signup.title"></span>
            </h2>
            <!-- 按你要求，这里去掉原来的那句“아이와 함께할 작은 순간들을…” -->
          </div>

          <form class="space-y-4" onsubmit="return false;">
            <div class="space-y-1.5">
              <label class="block text-xs sm:text-sm font-medium text-slate-700">
                <span data-i18n="common.email"></span>
              </label>
              <div class="flex gap-2">
                <input id="signup-email-input" type="email" data-email-autocomplete="true"
                  data-i18n-placeholder="signup.emailPlaceholder"
                  class="flex-1 rounded-2xl border border-slate-200 bg-slate-50 px-3.5 py-2.5 text-sm sm:text-base text-slate-900 placeholder:text-slate-300 focus:outline-none focus:ring-2 focus:ring-rose-300 focus:border-rose-300" />
                <button id="btn-signup-send-code" type="button" onclick="handleSignupSendCode(this)"
                  class="shrink-0 rounded-full bg-rose-100 text-rose-600 text-[11px] sm:text-xs font-medium px-3 py-2 hover:bg-rose-200 active:scale-[0.99] transition">
                  <span data-i18n="发送验证码"></span>
                </button>
              </div>
              <p id="tip-signup-email-input" class="field-tip"></p>
            </div>

            <div class="space-y-1.5">
              <label class="block text-xs sm:text-sm font-medium text-slate-700">
                <span data-i18n="common.code"></span>
              </label>
              <input id="signup-code-input" type="text" data-i18n-placeholder="signup.codePlaceholder"
                class="w-full rounded-2xl border border-slate-200 bg-slate-50 px-3.5 py-2.5 text-xs sm:text-sm text-slate-900 placeholder:text-slate-300 focus:outline-none focus:ring-2 focus:ring-rose-300 focus:border-rose-300" />
              <p id="tip-signup-code-input" class="field-tip"></p>
            </div>

            <div class="space-y-1.5">
              <label class="block text-xs sm:text-sm font-medium text-slate-700">
                <span data-i18n="signup.passwordSet"></span>
              </label>
              <input id="signup-password" type="password" data-i18n-placeholder="signup.passwordPlaceholder"
                class="w-full rounded-2xl border border-slate-200 bg-slate-50 px-3.5 py-2.5 text-xs sm:text-sm text-slate-900 placeholder:text-slate-300 focus:outline-none focus:ring-2 focus:ring-rose-300 focus:border-rose-300" />
              <p id="tip-signup-password" class="field-tip"></p>
              <div id="signup-password-hints" class="flex flex-wrap gap-x-4 gap-y-1.5 mt-1.5">
                <span id="hint-length"
                  class="signup-password-hint flex items-center gap-1 text-[11px] sm:text-xs text-slate-400">
                  <span class="hint-icon">○</span><span data-i18n="signup.hintLength"></span>
                </span>
                <span id="hint-letter"
                  class="signup-password-hint flex items-center gap-1 text-[11px] sm:text-xs text-slate-400">
                  <span class="hint-icon">○</span><span data-i18n="signup.hintLetter"></span>
                </span>
                <span id="hint-special"
                  class="signup-password-hint flex items-center gap-1 text-[11px] sm:text-xs text-slate-400">
                  <span class="hint-icon">○</span><span data-i18n="signup.hintSpecial"></span>
                </span>
              </div>
            </div>

            <div class="flex items-start gap-2 rounded-2xl bg-rose-50 px-3.5 py-3">
              <input id="agree" type="checkbox"
                class="mt-0.5 h-4 w-4 rounded border-rose-300 text-rose-400 focus:ring-rose-300" />
              <label for="agree" class="text-[11px] sm:text-xs text-slate-700 leading-relaxed">
                <span data-i18n="signup.agree"></span>
              </label>
            </div>
            <p id="signup-runtime-tip" class="field-tip"></p>

            <button id="btn-signup-submit" type="button" onclick="handleSignupSubmit()"
              class="w-full rounded-full bg-rose-400 text-white text-sm sm:text-base font-medium px-4 py-3 shadow-sm hover:bg-rose-500 active:scale-[0.99] transition disabled:bg-rose-200">
              <span data-i18n="signup.submit"></span>
            </button>
          </form>

          <div class="pt-3 flex flex-col items-center gap-1 text-xs sm:text-sm text-slate-500">
            <p>
              <span data-i18n="signup.hasAccount"></span>
              <button type="button" onclick="switchView('email-login')"
                class="text-rose-500 font-medium underline underline-offset-4 decoration-rose-200 hover:decoration-rose-400">
                <span data-i18n="signup.toLogin"></span>
              </button>
            </p>
            <button type="button" onclick="switchView('home')"
              class="text-[11px] sm:text-xs text-slate-400 hover:text-slate-600">
              <span data-i18n="common.backHome"></span>
            </button>
          </div>
        </section>

        <!-- 忘记密码页 -->
        <section id="view-forgot" class="hidden space-y-6">
          <div class="space-y-2 text-center">
            <h2 class="text-base sm:text-lg font-medium text-slate-900">
              <span data-i18n="forgot.title"></span>
            </h2>

    function detectLang() {
      const saved = localStorage.getItem("noddy_lang");
      if (saved && I18N[saved]) return saved;
      const nav = (navigator.language || "").toLowerCase();
      if (nav.startsWith("ko")) return "ko";
      if (nav.startsWith("zh")) return "zh";
      return "en";
    }

    let currentLang = detectLang();

    function t(key) {
      return (
        (I18N[currentLang] && I18N[currentLang][key]) ||
        (I18N.en && I18N.en[key]) ||
        key
      );
    }

    function applyLang(lang) {
      if (!I18N[lang]) return;
      currentLang = lang;
      localStorage.setItem("noddy_lang", lang);

      document.documentElement.lang =
        lang === "ko" ? "ko" : lang === "zh" ? "zh-CN" : "en";

      document.querySelectorAll("[data-i18n]").forEach((el) => {
        const key = el.getAttribute("data-i18n");
        if (!key) return;
        el.textContent = t(key);
      });

      document.querySelectorAll("[data-i18n-placeholder]").forEach((el) => {
        const key = el.getAttribute("data-i18n-placeholder");
        if (!key) return;
        el.setAttribute("placeholder", t(key));
      });

      // keep region labels in sync
      if (typeof updateRegionUI === "function") {
        updateRegionUI();
      }
    }

    function showToast(message, duration = 3000) {
      if (!toast || !toastMessage) return;
      toastMessage.textContent = message;
      toast.classList.remove("hidden");
      if (toastTimer) clearTimeout(toastTimer);
      toastTimer = setTimeout(() => {
        toast.classList.add("hidden");

      });

    function showFieldTip(id, text, type) {
      if (!id) return;
      const el = document.getElementById(id);
      if (!el) return;
      if (id !== "signup-runtime-tip") hideAllFieldTips();
      el.textContent = text || "";
      el.classList.add("show");
      el.classList.remove("error", "success");
      if (type === "error") el.classList.add("error");
      if (type === "success") el.classList.add("success");
    }

    function renderHomeRandomGreeting() {
      const el = document.getElementById("home-random-greeting");
      if (!el) return;
      const sessionKey = HOME_GREETING_SESSION_KEY_PREFIX + currentLang;
      const cached = sessionStorage.getItem(sessionKey);
      if (cached) {
        el.textContent = cached;
        return;
      }
      const owner =
        (localStorage.getItem("ownerName") || "").trim() ||
        (currentLang === "zh" ? "主人" : currentLang === "ko" ? "주인님" : "you");
      const pet = (localStorage.getItem("petName") || "").trim() || "noddy";
      const pool = getLoginHomeGreetingPool();
      const idx = Math.floor(Math.random() * pool.length);
      const text = pool[idx]
        .replaceAll("{owner}", owner)
        .replaceAll("{pet}", pet);
      el.textContent = text;
      sessionStorage.setItem(sessionKey, text);
    }

      if (codeInput) {
        const val = (codeInput.value || "").trim();
        if (!signupCodeSentAt || now - signupCodeSentAt > signupCodeTTL) {
          showToast(t("toast.codeExpired"));
          showFieldTip("signup-runtime-tip", Math.random() < 0.5 ? FIELD_HINTS.comfortA : FIELD_HINTS.comfortB, "error");
          return;
        }
        if (!val || val !== "123456") {
          // 示例：期望 6 位 123456
          showToast(t("toast.codeInvalid"));
          showFieldTip("signup-runtime-tip", Math.random() < 0.5 ? FIELD_HINTS.comfortA : FIELD_HINTS.comfortB, "error");
          return;
        }
      }
      const successPool = [FIELD_HINTS.successA, FIELD_HINTS.successB, FIELD_HINTS.successC];
      const successText = successPool[Math.floor(Math.random() * successPool.length)];
      showFieldTip("signup-runtime-tip", successText, "success");
      showToast("注册成功", 2200);
      // 记录此邮箱注册所在服务区（用于“账号不存在 404”引导切换的模拟）
      if (email) {
        upsertAccountRegionLite(email, getCurrentRegionLite());
      }
      // 这里保持在当前页，让用户有时间查看提示文案
      // 若需要也可在后续切回登录页：switchView('email-login');
    }

    // 手机验证码发送频率限制（保留原手机登录逻辑）
    const sendCodeBtn = document.getElementById("btn-send-code");
    let lastCodeSentAt = 0;

    function handleSendCode() {
      const now = Date.now();
      const cooldown = 60000; // 60s 内重复点击视为太频繁

      if (now - lastCodeSentAt < cooldown) {
        showToast(t("toast.tooFrequent"));
        return;
      }

      lastCodeSentAt = now;
      showToast(t("toast.codeSent"));
      showFieldTip("tip-captcha-input", FIELD_HINTS.codeLike);
    }

    // 注册页邮箱验证码发送 + 倒计时 & 校验
    let signupCodeSentAt = 0;
    let signupCodeTimer = null;
    const signupCodeTTL = 60000; // 60s 有效期

    function handleSignupSendCode(btn) {
      const now = Date.now();

      // 冷却：60 秒内不可重复发送
      if (now - signupCodeSentAt < signupCodeTTL) {
        showToast(t("toast.tooFrequent"));
        return;
      }

      signupCodeSentAt = now;
      showToast(t("toast.codeSent"));
      showFieldTip("tip-signup-code-input", FIELD_HINTS.codeLike);

      if (!btn) btn = document.getElementById("btn-signup-send-code");
      if (!btn) return;

      let remaining = signupCodeTTL / 1000;

      // 禁用按钮 & 开始倒计时
      btn.disabled = true;
      btn.classList.add("opacity-70", "cursor-not-allowed", "pointer-events-none");

      const baseText = t("请检查邮箱");
      btn.textContent = `${baseText} (${remaining}s)`;

      if (signupCodeTimer) clearInterval(signupCodeTimer);
      signupCodeTimer = setInterval(() => {
        remaining -= 1;
        if (remaining <= 0) {
          clearInterval(signupCodeTimer);
          signupCodeTimer = null;
          btn.disabled = false;
          btn.classList.remove("opacity-70", "cursor-not-allowed", "pointer-events-none");
          btn.textContent = baseText;
        } else {
          btn.textContent = `${baseText} (${remaining}s)`;
        }
      }, 1000);
    }

    // 重置密码：邮箱验证码发送 + 校验
    let forgotCodeSentAt = 0;
    let forgotCodeTimer = null;
    const forgotCodeTTL = 60000;

    function handleForgotSendCode(btn) {
      const now = Date.now();
      if (now - forgotCodeSentAt < forgotCodeTTL) {
        showToast(t("toast.tooFrequent"));
        return;
      }
      forgotCodeSentAt = now;
      showToast(t("toast.codeSent"));

      if (!btn) btn = document.getElementById("btn-forgot-send-code");
      if (!btn) return;

      let remaining = forgotCodeTTL / 1000;
      btn.disabled = true;
      btn.classList.add("opacity-70", "cursor-not-allowed", "pointer-events-none");

      const baseText = t("forgot.sendCode");
      btn.textContent = `${baseText} (${remaining}s)`;

      if (forgotCodeTimer) clearInterval(forgotCodeTimer);
      forgotCodeTimer = setInterval(() => {
        remaining -= 1;
        if (remaining <= 0) {
          clearInterval(forgotCodeTimer);
          forgotCodeTimer = null;
          btn.disabled = false;
          btn.classList.remove("opacity-70", "cursor-not-allowed", "pointer-events-none");
          btn.textContent = baseText;
        } else {
          btn.textContent = `${baseText} (${remaining}s)`;
        }
      }, 1000);
    }

    function handleForgotSubmit() {
      const codeInput = document.getElementById("forgot-code-input");
      const newPwdInput = document.getElementById("forgot-new-password");
      const confirmPwdInput = document.getElementById("forgot-confirm-password");
      const now = Date.now();

      if (codeInput) {
        const val = (codeInput.value || "").trim();
        if (!forgotCodeSentAt || now - forgotCodeSentAt > forgotCodeTTL) {
          showToast(t("toast.codeExpired"));
          return;
        }
        if (!val || val !== "123456") {
          showToast(t("toast.codeInvalid"));
          return;
        }
      }

      if (newPwdInput && confirmPwdInput) {
        const p1 = (newPwdInput.value || "").trim();
        const p2 = (confirmPwdInput.value || "").trim();
        if (!p1 || p1 !== p2) {
          // 简单处理：密码不一致直接提示
          showToast(t("toast.captchaError"));
          return;
        }
      }

      showToast(t("forgot.submit"));
      switchView("email-login");
    }

    // 邮箱后缀自动补全
    const emailSuggestionPanel = document.getElementById("email-suggestion-panel");
    let activeEmailInput = null;

    function hideEmailSuggestions() {
      if (emailSuggestionPanel) {
        emailSuggestionPanel.classList.add("hidden");
      }
    }

    function updateEmailSuggestions() {
      if (!activeEmailInput || !emailSuggestionPanel) return;
      const raw = activeEmailInput.value.trim();
      const parts = raw.split("@");
      const localPart = parts[0] || "";
      const domainPart = (parts[1] || "").toLowerCase();

      if (!localPart) {
        hideEmailSuggestions();
        return;
      }

      const candidates = EMAIL_DOMAINS.filter((d) => {
        if (!domainPart) return true;
        return d.domain.startsWith(domainPart);
      });

      if (!candidates.length) {
        hideEmailSuggestions();
        return;
      }

      emailSuggestionPanel.innerHTML = "";
      candidates.forEach((item) => {
        const fullEmail = `${localPart}@${item.domain}`;
        const btn = document.createElement("button");
        btn.type = "button";
        btn.className =
          "w-full flex items-center justify-between px-3 py-1.5 hover:bg-rose-50 text-left";
        btn.innerHTML = `<span>${fullEmail}</span><span class="ml-2 text-[10px] text-slate-400">${item.label}</span>`;
        btn.addEventListener("mousedown", (e) => {
          e.preventDefault();
          if (activeEmailInput) {
            activeEmailInput.value = fullEmail;
            activeEmailInput.focus();
          }
          hideEmailSuggestions();
        });
        emailSuggestionPanel.appendChild(btn);
      });

      const rect = activeEmailInput.getBoundingClientRect();
      emailSuggestionPanel.style.left = rect.left + "px";
      emailSuggestionPanel.style.top = rect.bottom + 4 + "px";
      emailSuggestionPanel.style.width = rect.width + "px";
      emailSuggestionPanel.classList.remove("hidden");
    }

    function attachEmailAutocomplete() {
      const inputs = document.querySelectorAll(
        'input[type="email"][data-email-autocomplete="true"]'
      );
      inputs.forEach((input) => {
        input.addEventListener("focus", () => {
          activeEmailInput = input;
          updateEmailSuggestions();
        });
        input.addEventListener("input", () => {
          activeEmailInput = input;
          updateEmailSuggestions();
        });
        input.addEventListener("blur", () => {
          // 延迟隐藏，允许点击选项
          setTimeout(hideEmailSuggestions, 120);
        });
      });
    }

    function bindFocusTips() {
      const pairs = [
        ["email-input", "tip-email-input", FIELD_HINTS.emailLike],
        ["phone-input", "tip-phone-input", FIELD_HINTS.emailLike],
        ["signup-email-input", "tip-signup-email-input", FIELD_HINTS.emailLike],
        ["password-input", "tip-password-input", FIELD_HINTS.passwordLike],
        ["phone-password-input", "tip-phone-password-input", FIELD_HINTS.passwordLike],
        ["signup-password", "tip-signup-password", FIELD_HINTS.passwordLike],
        ["captcha-input", "tip-captcha-input", FIELD_HINTS.codeLike],
        ["signup-code-input", "tip-signup-code-input", FIELD_HINTS.codeLike],
      ];
      pairs.forEach(([inputId, tipId, text]) => {
        const el = document.getElementById(inputId);
        if (!el) return;
        el.addEventListener("focus", () => showFieldTip(tipId, text));
      });
    }

    // Language selector
    const langSelect = document.getElementById("lang-select");
    if (langSelect) {
      langSelect.value = currentLang;
      langSelect.addEventListener("change", (e) => {
        applyLang(e.target.value);
      });
    }

    // 注册页密码规则实时校验：8~14 位、大小写字母、特殊字符
    const signupPasswordInput = document.getElementById("signup-password");
    const hintLength = document.getElementById("hint-length");
    const hintLetter = document.getElementById("hint-letter");
    const hintSpecial = document.getElementById("hint-special");
    const specialCharRe = /[!@#$%&*()_+\-=\[\]{};':"\\|,.<>\/?]/;

    function updateSignupPasswordHints() {
      const val = (signupPasswordInput && signupPasswordInput.value) || "";
      const len = val.length;
      const hasLetter = /[a-zA-Z]/.test(val);
      const hasSpecial = specialCharRe.test(val);
      const lengthOk = len >= 8 && len <= 14;

      function setHint(el, ok) {
        if (!el) return;
        const icon = el.querySelector(".hint-icon");
        if (ok) {
          el.classList.add("passed");
          if (icon) icon.textContent = "✓";
        } else {
          el.classList.remove("passed");
          if (icon) icon.textContent = "○";
        }
      }
      setHint(hintLength, lengthOk);
      setHint(hintLetter, hasLetter);
      setHint(hintSpecial, hasSpecial);
    }

    if (signupPasswordInput) {
      signupPasswordInput.addEventListener("input", updateSignupPasswordHints);
      signupPasswordInput.addEventListener("paste", updateSignupPasswordHints);
    }

    // Initial apply
    applyLang(currentLang);
    attachEmailAutocomplete();
    bindFocusTips();
    renderHomeRandomGreeting();
    setEmailLoginTab("account");
    setPhoneLoginTab("code");

    // -------------------------
    // Login method chooser (by region) + prototype auth
    // -------------------------
    const ANON_KEY = "noddy_is_anonymous"; // "1" | "0"
    const ACCOUNT_ID_KEY = "noddy_account_id";
    const MERGED_KEY = "noddy_merged_from_anonymous";
    let lastThirdPartyProvider = null;

    function getDefaultPostLoginTarget() {
      try {
        const wifiDone = localStorage.getItem("noddy_wifi_setup_done") === "1";
        return wifiDone ? "./home.html" : "./WiFi-reminder.html";
      } catch (_) {
        return "./WiFi-reminder.html";
      }
    }

    function getRedirectTarget() {
      try {
        const params = new URLSearchParams(window.location.search || "");
        const r = params.get("redirect");
        return r || getDefaultPostLoginTarget();
      } catch (_) {
        return getDefaultPostLoginTarget();
      }
    }

    function setAnonymous(v) {
      try { localStorage.setItem(ANON_KEY, v ? "1" : "0"); } catch (_) {}
    }

    function updateLoginMethodsByRegion() {
      const region = getCurrentRegionLite();
      const isCN = region === "cn";
      const wechat = document.getElementById("btn-wechat");
      const google = document.getElementById("btn-google");
      const phone = document.getElementById("btn-phone-entry");
      if (wechat) wechat.classList.toggle("hidden", !isCN);
      if (google) google.classList.toggle("hidden", isCN);
      if (phone) phone.classList.remove("hidden");
    }

    function openLoginFailedModal() {
      const modal = document.getElementById("login-failed-modal");
      if (!modal) return;
      modal.classList.remove("hidden");
      modal.classList.add("flex");
    }

    function closeLoginFailedModal() {
      const modal = document.getElementById("login-failed-modal");
      if (!modal) return;
      modal.classList.add("hidden");
      modal.classList.remove("flex");
    }

    function openBindExistingModal() {
      const modal = document.getElementById("bind-existing-modal");
      if (!modal) return;
      modal.classList.remove("hidden");
      modal.classList.add("flex");
    }

    function closeBindExistingModal() {
      const modal = document.getElementById("bind-existing-modal");
      if (!modal) return;
      modal.classList.add("hidden");
      modal.classList.remove("flex");
    }

    function finalizeLoginAndRedirect(provider) {
      try {
        const existing = localStorage.getItem(ACCOUNT_ID_KEY);
        const accountId = existing || (provider + "_" + Date.now());
        localStorage.setItem(ACCOUNT_ID_KEY, accountId);
      } catch (_) {}
      // 合并：不删除匿名数据，只做“绑定/同步”标记 + 关键字段对齐
      (function mergeAnonymousToAccount() {
        try {
          const backupKey = "noddy_anonymous_backup_v1";
          if (!localStorage.getItem(backupKey)) {
            const snapshot = {
              petName: localStorage.getItem("petName") || "",
              aiPetState: localStorage.getItem("ai-pet-state") || "",
              interactionCount: localStorage.getItem("noddy_interaction_count") || "0",
              at: Date.now(),
            };
            localStorage.setItem(backupKey, JSON.stringify(snapshot));
          }
        } catch (_) {}

        // 尽量让 home/detail 的“名字”一致
        try {
          const petName = (localStorage.getItem("petName") || "").trim();
          const key = "ai-pet-state";
          const raw = localStorage.getItem(key);
          let st = {};
          try { st = raw ? JSON.parse(raw) : {}; } catch { st = {}; }
          if (petName && (!st || typeof st !== "object" || !String(st.name || "").trim())) {
            const next = st && typeof st === "object" ? { ...st, name: petName } : { name: petName };
            localStorage.setItem(key, JSON.stringify(next));
          } else if (!petName && st && typeof st === "object" && String(st.name || "").trim()) {
            localStorage.setItem("petName", String(st.name).trim());
          }
        } catch (_) {}

        try { localStorage.setItem(MERGED_KEY, "1"); } catch (_) {}
      })();

      setAnonymous(false);
      showToast(getLoginSuccessMessage(), 1600);
      setTimeout(() => {
        window.location.href = getRedirectTarget();
      }, 2200);
    }

    function shouldAskBindExisting() {
      try {
        const hasExistingAccount = !!localStorage.getItem(ACCOUNT_ID_KEY);
        const isAnon = localStorage.getItem(ANON_KEY) !== "0";
        const merged = localStorage.getItem(MERGED_KEY) === "1";
        return hasExistingAccount && isAnon && !merged;
      } catch (_) {
        return false;
      }
    }

    window.simulateThirdPartyLogin = function(provider, ev) {
      lastThirdPartyProvider = provider;
      // 原型：按住 Alt 点击 = 模拟失败
      const shouldFail = !!(ev && ev.altKey);
      if (shouldFail) {
        openLoginFailedModal();
        return;
      }

      if (shouldAskBindExisting()) {
        openBindExistingModal();
        return;
      }

      finalizeLoginAndRedirect(provider);
    };

    window.retryLastLogin = function() {
      closeLoginFailedModal();
      if (lastThirdPartyProvider) {
        finalizeLoginAndRedirect(lastThirdPartyProvider);
        return;
      }
      // 没有 provider 就回到首页视图
      switchView("home");
    };

    window.closeLoginFailedModal = closeLoginFailedModal;
    window.closeBindExistingModal = closeBindExistingModal;

    window.confirmBindExistingAccount = function() {
      closeBindExistingModal();
      finalizeLoginAndRedirect(lastThirdPartyProvider || "account");
    };

    window.useAccountDataInstead = function() {
      closeBindExistingModal();
      // 原型：不清理本地数据，只是认为账号态已登录
      setAnonymous(false);
      window.location.href = getRedirectTarget();
    };

    // -------------------------
    // Region mismatch (lite, no switch UI here)
    // -------------------------
    const REGION_KEY = "noddy_region"; // "global" | "cn"（由 index.html 负责切换）
    const ACCOUNT_REGION_KEY = "noddy_account_region_map_v1"; // { [email]: "global" | "cn" }

    function isValidRegionLite(v) {
      return v === "global" || v === "cn";
    }

    function getCurrentRegionLite() {
      const v = localStorage.getItem(REGION_KEY);
      return isValidRegionLite(v) ? v : "global";
    }

    function setCurrentRegionLite(region) {
      if (!isValidRegionLite(region)) return;
      try { localStorage.setItem(REGION_KEY, region); } catch (_) {}
    }

    function inferRegionFromLocaleLite() {
      try {
        const lang = (navigator.language || "").toLowerCase();
        if (lang.startsWith("zh-cn")) return "cn";
      } catch (_) {}
      return "global";
    }

    async function detectRegionByIpLite() {
      // 通过公开 IP 定位接口做轻量判断：CN=中国大陆，其它=global
      const urls = [
        "https://ipapi.co/json/",
        "https://ipwho.is/"
      ];
      for (const url of urls) {
        try {
          const res = await fetch(url, { cache: "no-store" });
          if (!res.ok) continue;
          const data = await res.json();
          const code = String(
            (data && (data.country_code || data.country || data.countryCode)) || ""
          ).toUpperCase();
          if (code === "CN") return "cn";
          if (code) return "global";
        } catch (_) {}
      }
      return inferRegionFromLocaleLite();
    }

    async function initLoginRegionAndMethods() {
      try {
        const params = new URLSearchParams(window.location.search || "");
        const forceRegion = params.get("forceRegion");
        if (isValidRegionLite(forceRegion)) {
          setCurrentRegionLite(forceRegion);
        } else if (params.get("redetectRegion") === "1") {
          localStorage.removeItem(REGION_KEY);
        }
      } catch (_) {}
      const hasSaved = isValidRegionLite(localStorage.getItem(REGION_KEY));
      if (!hasSaved) {
        const detected = await detectRegionByIpLite();
        setCurrentRegionLite(detected);
      }
      updateLoginMethodsByRegion();
    }

    function getAccountRegionMapLite() {
      try {
        const raw = localStorage.getItem(ACCOUNT_REGION_KEY);
        const obj = raw ? JSON.parse(raw) : {};
        return obj && typeof obj === "object" ? obj : {};
      } catch {
        return {};
      }
    }

    function upsertAccountRegionLite(email, region) {
      if (!email || !isValidRegionLite(region)) return;
      const map = getAccountRegionMapLite();
      map[email] = region;
      localStorage.setItem(ACCOUNT_REGION_KEY, JSON.stringify(map));
    }

    function getAccountRegionByEmailLite(email) {
      if (!email) return null;
      const map = getAccountRegionMapLite();
      const v = map[email];
      return isValidRegionLite(v) ? v : null;
    }

    // 兜底演示账号：noddy@gmail.com 只在国际服存在（无需注册即可演示）
    (function seedDemoAccountLite() {
      const map = getAccountRegionMapLite();
      if (!map["noddy@gmail.com"]) {
        map["noddy@gmail.com"] = "global";
        localStorage.setItem(ACCOUNT_REGION_KEY, JSON.stringify(map));
      }
    })();

    let pendingMismatchTargetRegion = null;
    let pendingMismatchEmail = "";

    function openRegionMismatchModal(targetRegion, email) {
      pendingMismatchTargetRegion = isValidRegionLite(targetRegion) ? targetRegion : null;
      pendingMismatchEmail = email || "";
      const modal = document.getElementById("region-mismatch-modal");
      if (!modal) return;
      modal.classList.remove("hidden");
      modal.classList.add("flex");
    }

    function closeRegionMismatchModal() {
      const modal = document.getElementById("region-mismatch-modal");
      if (!modal) return;
      modal.classList.add("hidden");
      modal.classList.remove("flex");
      pendingMismatchTargetRegion = null;
      pendingMismatchEmail = "";
    }

    function handleRegionMismatchSwitch() {
      const target = pendingMismatchTargetRegion || "global";
      const url =
        "./index.html?setRegion=" +
        encodeURIComponent(target) +
        "&redirect=" +
        encodeURIComponent("./signup.html#email-login") +
        (pendingMismatchEmail ? "&email=" + encodeURIComponent(pendingMismatchEmail) : "");
      closeRegionMismatchModal();
      window.location.href = url;
    }

    function handleRegionMismatchContinueSignup() {
      closeRegionMismatchModal();
      switchView("signup");
      const signupEmailEl = document.getElementById("signup-email-input");
      if (signupEmailEl && pendingMismatchEmail) {
        signupEmailEl.value = pendingMismatchEmail;
        signupEmailEl.focus();
      }
    }

    // 支持从 index.html 回跳：自动进入邮箱登录页并填入邮箱
    (function restoreFromRedirect() {
      try {
        const params = new URLSearchParams(window.location.search || "");
        const email = (params.get("email") || "").trim();
        if (email) {
          const emailInput = document.getElementById("email-input");
          if (emailInput) emailInput.value = email;
        }
        if ((window.location.hash || "") === "#email-login") {
          switchView("email-login");
        }
      } catch {
        // ignore
      }
    })();

    initLoginRegionAndMethods();
  </script>
</body>

</html>
