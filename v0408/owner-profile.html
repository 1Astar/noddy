<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>编辑主人信息</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: "Noto Sans SC", -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: linear-gradient(180deg, #eee7f7 0%, #f5effb 45%, #f9f4ff 100%);
      color: #5a4a7a;
      min-height: 100vh;
      padding: 16px 14px 24px;
    }
    .top {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 14px;
    }
    .back-btn {
      border: none;
      border-radius: 999px;
      background: rgba(255,255,255,0.9);
      color: #6a56a2;
      padding: 6px 12px;
      font-size: 13px;
      cursor: pointer;
    }
    .title { font-size: 17px; font-weight: 800; color: #6a56a2; }
    .card {
      background: rgba(255,255,255,0.82);
      border: 1px solid rgba(196, 181, 224, 0.45);
      border-radius: 18px;
      padding: 14px;
      box-shadow: 0 8px 24px rgba(164, 150, 200, 0.22);
    }
    .avatar-editor {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 10px;
      padding-bottom: 10px;
      border-bottom: 1px dashed rgba(196, 181, 224, 0.55);
    }
    .avatar-btn {
      width: 68px;
      height: 68px;
      border: none;
      border-radius: 50%;
      overflow: hidden;
      background: linear-gradient(135deg, #7c5cff, #3aa1d3);
      box-shadow: 0 6px 18px rgba(106, 86, 162, 0.25);
      display: inline-flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      color: #fff;
      font-size: 22px;
      flex: 0 0 auto;
    }
    .avatar-img { width: 100%; height: 100%; object-fit: cover; display: block; }
    .avatar-tip { font-size: 12px; color: #8576ab; line-height: 1.6; }
    .group-title {
      font-size: 13px;
      color: #7a6a9f;
      margin-bottom: 10px;
      font-weight: 700;
    }
    .capsule {
      background: rgba(255, 255, 255, 0.96);
      border: 1px solid rgba(196, 181, 224, 0.5);
      border-radius: 999px;
      padding: 10px 12px;
      margin-bottom: 10px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
    }
    .label { white-space: nowrap; font-size: 14px; color: #5a4a7a; font-weight: 650; }
    .capsule input {
      width: 100%;
      border: none;
      outline: none;
      background: transparent;
      color: #5a4a7a;
      font-size: 14px;
      text-align: right;
    }
    .hint { font-size: 12px; color: #8576ab; margin-top: 6px; line-height: 1.6; }
    .actions { display: flex; gap: 10px; justify-content: flex-end; margin-top: 12px; }
    .btn {
      border: none;
      border-radius: 999px;
      padding: 10px 14px;
      cursor: pointer;
      font-weight: 700;
      font-size: 13px;
    }
    .btn-primary { background: linear-gradient(135deg, #7c5cff, #3aa1d3); color: #fff; }
    .btn-ghost { background: rgba(255,255,255,0.85); color: #6a56a2; }
  </style>
</head>
<body>
  <div class="top">
    <button class="back-btn" type="button" onclick="goBack()">← 返回</button>
    <div class="title">编辑主人信息</div>
  </div>

  <div class="card">
    <div class="group-title">主人资料</div>
    <div class="avatar-editor">
      <button class="avatar-btn" type="button" onclick="pickAvatar()" aria-label="编辑头像">
        <img id="owner-avatar-preview" class="avatar-img" alt="" style="display:none" />
        <span id="owner-avatar-fallback">👤</span>
      </button>
      <div class="avatar-tip">点击头像可更换头像<br />保存后同步到主页展示</div>
      <input id="owner-avatar-input" type="file" accept="image/*" style="display:none" />
    </div>
    <div class="capsule">
      <div class="label">主人的名称</div>
      <input id="owner-name" type="text" maxlength="12" placeholder="请输入" />
    </div>
    <div class="capsule">
      <div class="label">生日</div>
      <input id="owner-birthday" type="date" />
    </div>
    <div class="hint">保存后会同步到主页「我的」里显示。</div>
    <div class="actions">
      <button type="button" class="btn btn-ghost" onclick="resetFields()">重置</button>
      <button type="button" class="btn btn-primary" onclick="saveOwner()">保存</button>
    </div>
  </div>

  <script>
    const OWNER_BIRTHDAY_KEY = 'noddy_owner_birthday';
    const OWNER_AVATAR_KEY = 'noddy_owner_avatar_dataurl';

    function goBack() {
      if (document.referrer) history.back();
      else location.href = 'home.html';
    }

    function loadOwner() {
      const name = (localStorage.getItem('ownerName') || '').trim() || '主人';
      const bd = (localStorage.getItem(OWNER_BIRTHDAY_KEY) || '').trim();
      const avatar = (localStorage.getItem(OWNER_AVATAR_KEY) || '').trim();
      document.getElementById('owner-name').value = name;
      document.getElementById('owner-birthday').value = bd;
      applyAvatar(avatar);
    }

    function applyAvatar(dataUrl) {
      const img = document.getElementById('owner-avatar-preview');
      const fallback = document.getElementById('owner-avatar-fallback');
      const has = !!dataUrl;
      img.style.display = has ? 'block' : 'none';
      fallback.style.display = has ? 'none' : 'inline';
      if (has) img.src = dataUrl;
    }

    function pickAvatar() {
      const input = document.getElementById('owner-avatar-input');
      input.value = '';
      input.click();
    }

    function initAvatarPicker() {
      const input = document.getElementById('owner-avatar-input');
      input.addEventListener('change', function() {
        const file = input.files && input.files[0];
        if (!file) return;
        if (!/^image\//i.test(file.type || '')) {
          alert('请选择图片文件');
          return;
        }
        const reader = new FileReader();
        reader.onload = function() {
          const dataUrl = String(reader.result || '');
          try { localStorage.setItem(OWNER_AVATAR_KEY, dataUrl); } catch (_) {}
          applyAvatar(dataUrl);
        };
        reader.readAsDataURL(file);
      });
    }

    function resetFields() {
      loadOwner();
    }

    function saveOwner() {
      const name = (document.getElementById('owner-name').value || '').trim() || '主人';
      const bd = (document.getElementById('owner-birthday').value || '').trim();
      try { localStorage.setItem('ownerName', name); } catch (_) {}
      try { localStorage.setItem(OWNER_BIRTHDAY_KEY, bd); } catch (_) {}
      alert('已保存');
      goBack();
    }

    initAvatarPicker();
    loadOwner();
  </script>
</body>
</html>
