<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>账号注销</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: "Noto Sans SC", -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: linear-gradient(180deg, #eee7f7 0%, #f5effb 45%, #f9f4ff 100%);
      color: #5a4a7a;
      min-height: 100vh;
      padding: 16px 14px 24px;
    }
    .top {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 14px;
    }
    .back-btn {
      border: none;
      border-radius: 999px;
      background: rgba(255,255,255,0.9);
      color: #6a56a2;
      padding: 6px 12px;
      font-size: 13px;
      cursor: pointer;
    }
    .title { font-size: 18px; font-weight: 800; color: #6a56a2; }
    .card {
      background: rgba(255,255,255,0.86);
      border: 1px solid rgba(196, 181, 224, 0.45);
      border-radius: 18px;
      padding: 14px;
      box-shadow: 0 8px 24px rgba(164, 150, 200, 0.22);
      margin-bottom: 12px;
    }
    .warn {
      border: 1px solid rgba(244,63,94,0.35);
      background: rgba(244,63,94,0.08);
    }
    .card-title {
      font-size: 15px;
      font-weight: 800;
      margin-bottom: 10px;
      color: #5a4a7a;
    }
    .desc, .li {
      font-size: 13px;
      line-height: 1.7;
      color: #745f98;
    }
    .ul { display: grid; gap: 6px; margin-top: 6px; }
    .row {
      display: flex;
      align-items: center;
      gap: 8px;
      margin: 10px 0;
    }
    .row input[type="checkbox"] {
      width: 16px;
      height: 16px;
      accent-color: #7c5cff;
    }
    .confirm-input {
      width: 100%;
      border: 1px solid rgba(196, 181, 224, 0.7);
      border-radius: 12px;
      padding: 10px 12px;
      font-size: 14px;
      color: #5a4a7a;
      margin-top: 8px;
      background: #fff;
    }
    .tip { margin-top: 6px; font-size: 12px; color: #8576ab; }
    .actions {
      display: flex;
      gap: 10px;
      justify-content: flex-end;
      margin-top: 12px;
    }
    .btn {
      border: none;
      border-radius: 999px;
      padding: 10px 14px;
      font-size: 13px;
      font-weight: 700;
      cursor: pointer;
    }
    .btn-ghost { background: rgba(255,255,255,0.95); color: #6a56a2; border: 1px solid rgba(196, 181, 224, 0.55); }
    .btn-danger { background: linear-gradient(135deg, #f43f5e, #dc2626); color: #fff; }
    .btn-danger:disabled {
      opacity: 0.55;
      cursor: not-allowed;
    }
  </style>
</head>
<body>
  <div class="top">
    <button type="button" class="back-btn" onclick="goBack()">← 返回</button>
    <div class="title">账号注销</div>
  </div>

  <div class="card warn">
    <div class="card-title">注销前请确认</div>
    <div class="ul">
      <div class="li">1. 注销后将清除本地账号信息、绑定信息和个人资料。</div>
      <div class="li">2. 当前设备中的历史登录状态会失效，需重新登录使用账号能力。</div>
      <div class="li">3. 本操作不可撤销，请谨慎操作。</div>
    </div>
  </div>

  <div class="card">
    <div class="card-title">身份确认</div>
    <div class="desc">已登录账号：<span id="account-label">未登录</span></div>
    <label class="row">
      <input id="confirm-check" type="checkbox" />
      <span class="desc">我已阅读并理解以上风险</span>
    </label>
    <div class="desc">请输入“注销”以确认：</div>
    <input id="confirm-input" class="confirm-input" type="text" placeholder="请输入：注销" />
    <div class="tip">仅当勾选并正确输入后，才可执行账号注销。</div>
    <div class="actions">
      <button type="button" class="btn btn-ghost" onclick="goBack()">取消</button>
      <button id="submit-btn" type="button" class="btn btn-danger" disabled onclick="handleDelete()">确认注销</button>
    </div>
  </div>

  <script>
    const DELETE_KEYS = [
      "noddy_account_id",
      "noddy_last_login_provider",
      "noddy_last_login_account",
      "noddy_user_bindings",
      "noddy_user_profile_info",
      "noddy_account_auth_source_map_v1",
      "noddy_google_bound_emails_v1"
    ];

    function goBack() {
      if (document.referrer) history.back();
      else location.href = "home.html";
    }

    function readAccountLabel() {
      const account = (localStorage.getItem("noddy_last_login_account") || "").trim();
      const provider = (localStorage.getItem("noddy_last_login_provider") || "").trim();
      if (account) return provider ? (provider + " · " + account) : account;
      return "未登录";
    }

    function toggleSubmit() {
      const checked = document.getElementById("confirm-check").checked;
      const value = (document.getElementById("confirm-input").value || "").trim();
      const ok = checked && value === "注销";
      document.getElementById("submit-btn").disabled = !ok;
    }

    function handleDelete() {
      const btn = document.getElementById("submit-btn");
      if (btn.disabled) return;
      if (!confirm("请再次确认：确定执行账号注销？")) return;

      try {
        DELETE_KEYS.forEach(function(k) { localStorage.removeItem(k); });
        localStorage.setItem("noddy_is_anonymous", "1");
      } catch (_) {}

      alert("账号已注销，本地账号信息已清除。");
      location.href = "home.html";
    }

    function init() {
      document.getElementById("account-label").textContent = readAccountLabel();
      document.getElementById("confirm-check").addEventListener("change", toggleSubmit);
      document.getElementById("confirm-input").addEventListener("input", toggleSubmit);
      toggleSubmit();
    }

    init();
  </script>
</body>
</html>
