<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>修改密码</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: "Noto Sans SC", -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: linear-gradient(180deg, #eee7f7 0%, #f5effb 45%, #f9f4ff 100%);
      color: #5a4a7a;
      min-height: 100vh;
      padding: 16px 14px 24px;
    }
    .top { display:flex; align-items:center; gap:10px; margin-bottom:14px; }
    .back-btn {
      border:none; border-radius:999px; background:rgba(255,255,255,0.9);
      color:#6a56a2; padding:6px 12px; font-size:13px; cursor:pointer;
    }
    .title { font-size:17px; font-weight:800; color:#6a56a2; }
    .card {
      background: rgba(255,255,255,0.84);
      border: 1px solid rgba(196,181,224,0.45);
      border-radius: 18px;
      padding: 14px;
      box-shadow: 0 8px 24px rgba(164, 150, 200, 0.22);
    }
    .label { font-size:12px; color:#7a6a9f; margin:10px 2px 6px; display:block; }
    .input {
      width: 100%;
      border: 1px solid rgba(196,181,224,0.65);
      border-radius: 12px;
      padding: 10px 12px;
      background: #fff;
      color: #5a4a7a;
      font-size: 14px;
    }
    .hint { font-size:12px; color:#8576ab; line-height:1.6; margin-top:8px; }
    .actions { display:flex; justify-content:flex-end; gap:10px; margin-top:14px; }
    .btn {
      border:none; border-radius:999px; padding:10px 14px; font-size:13px;
      font-weight:700; cursor:pointer;
    }
    .btn-ghost { background: rgba(255,255,255,0.9); color:#6a56a2; border:1px solid rgba(196,181,224,0.55); }
    .btn-primary { background: linear-gradient(135deg,#7c5cff,#3aa1d3); color:#fff; }
  </style>
</head>
<body>
  <div class="top">
    <button class="back-btn" type="button" onclick="goBack()">← 返回</button>
    <div class="title">修改密码</div>
  </div>

  <div class="card">
    <label class="label">当前账号</label>
    <input id="account-view" class="input" type="text" readonly />

    <label class="label">当前密码</label>
    <input id="old-password" class="input" type="password" placeholder="请输入当前密码" />

    <label class="label">新密码</label>
    <input id="new-password" class="input" type="password" placeholder="8~14位，含大小写与特殊字符" />

    <label class="label">确认新密码</label>
    <input id="confirm-password" class="input" type="password" placeholder="再次输入新密码" />

    <div class="hint">修改后，登录页会使用新密码校验。</div>
    <div class="actions">
      <button class="btn btn-ghost" type="button" onclick="goBack()">取消</button>
      <button class="btn btn-primary" type="button" onclick="submitChange()">确认修改</button>
    </div>
  </div>

  <script>
    const LAST_LOGIN_PROVIDER_KEY = "noddy_last_login_provider";
    const LAST_LOGIN_ACCOUNT_KEY = "noddy_last_login_account";
    const ACCOUNT_PASSWORD_MAP_KEY = "noddy_account_password_map_v1";
    const DEFAULT_PASSWORD = "Noddy@123!";

    function goBack() {
      if (document.referrer) history.back();
      else location.href = "profile-account.html";
    }

    function getLoginContext() {
      const provider = (localStorage.getItem(LAST_LOGIN_PROVIDER_KEY) || "").toLowerCase();
      const account = (localStorage.getItem(LAST_LOGIN_ACCOUNT_KEY) || "").toLowerCase();
      return { provider: provider || "email", account };
    }

    function getPwdKey(provider, account) {
      const acct = String(account || "").trim().toLowerCase();
      return String(provider || "account") + ":" + acct;
    }

    function getPwdMap() {
      try {
        const raw = localStorage.getItem(ACCOUNT_PASSWORD_MAP_KEY);
        const parsed = raw ? JSON.parse(raw) : {};
        return parsed && typeof parsed === "object" ? parsed : {};
      } catch (_) { return {}; }
    }

    function setPwdMap(map) {
      try { localStorage.setItem(ACCOUNT_PASSWORD_MAP_KEY, JSON.stringify(map || {})); } catch (_) {}
    }

    function readStoredPassword(provider, account) {
      const map = getPwdMap();
      return String(map[getPwdKey(provider, account)] || DEFAULT_PASSWORD);
    }

    function writeStoredPassword(provider, account, password) {
      const key = getPwdKey(provider, account);
      const map = getPwdMap();
      map[key] = String(password || "");
      setPwdMap(map);
    }

    function validPassword(pwd) {
      return /^(?=.*[a-z])(?=.*[A-Z])(?=.*[^A-Za-z0-9]).{8,14}$/.test(pwd || "");
    }

    function submitChange() {
      const ctx = getLoginContext();
      if (!ctx.account) {
        alert("当前无登录账号，请先登录后再修改密码。");
        return;
      }
      const oldPwd = (document.getElementById("old-password").value || "").trim();
      const p1 = (document.getElementById("new-password").value || "").trim();
      const p2 = (document.getElementById("confirm-password").value || "").trim();

      if (oldPwd !== readStoredPassword(ctx.provider, ctx.account)) {
        alert("当前密码错误");
        return;
      }
      if (!validPassword(p1)) {
        alert("新密码需为8~14位，包含大小写字母与特殊字符");
        return;
      }
      if (p1 !== p2) {
        alert("两次输入的新密码不一致");
        return;
      }
      writeStoredPassword(ctx.provider, ctx.account, p1);
      alert("密码修改成功");
      goBack();
    }

    (function init() {
      const ctx = getLoginContext();
      const view = document.getElementById("account-view");
      if (ctx.account) {
        view.value = ctx.account;
      } else {
        const fallback = (localStorage.getItem("noddy_account_id") || "").trim();
        view.value = fallback || "未登录（请先登录后修改）";
      }
    })();
  </script>
</body>
</html>
