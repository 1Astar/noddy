<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>为设备配置网络</title>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;500;600;700&display=swap">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --purple-light: #e8dff5;
      --purple: #c4b5e0;
      --blue-light: #d4e8f7;
      --blue: #a8d4f0;
      --pink: #ff9ac4;
      --pink-light: #ffe6f2;
      --card-bg: rgba(255, 255, 255, 0.95);
      --shadow: 0 4px 20px rgba(164, 150, 200, 0.25);
      --radius: 16px;
      --radius-sm: 12px;
    }

    body {
      font-family: 'Noto Sans SC', -apple-system, sans-serif;
      min-height: 100vh;
      background: linear-gradient(180deg, var(--purple-light) 0%, var(--blue-light) 30%, #fff 55%);
      color: #333;
    }

    .status-bar {
      padding: 10px 20px 8px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 14px;
      color: #666;
    }

    .nav-row {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 8px 20px 16px;
    }

    .back-btn {
      width: 32px;
      height: 32px;
      border: none;
      background: transparent;
      font-size: 20px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #333;
    }

    .step-dots {
      display: flex;
      gap: 6px;
      margin-top: 4px;
    }

    .step-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #ddd;
    }

    .step-dot.active { background: var(--pink); }

    .page-header {
      padding: 0 20px 20px;
    }

    .page-title {
      font-size: 22px;
      font-weight: 700;
      color: #333;
      margin-bottom: 8px;
    }

    .page-desc {
      font-size: 13px;
      color: #666;
      line-height: 1.5;
    }

    .wifi-list {
      padding: 0 20px 24px;
      max-width: 400px;
      margin: 0 auto;
    }

    .wifi-item {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 14px 16px;
      background: var(--card-bg);
      border-radius: var(--radius-sm);
      margin-bottom: 10px;
      box-shadow: var(--shadow);
      cursor: pointer;
      transition: all 0.2s;
    }

    .wifi-item:hover {
      transform: translateY(-1px);
      box-shadow: 0 6px 24px rgba(164, 150, 200, 0.35);
    }

    .wifi-item.add-more {
      color: #666;
      border: 1px dashed rgba(196, 181, 224, 0.6);
      background: rgba(255, 255, 255, 0.8);
    }

    .wifi-name { font-weight: 500; color: #333; flex: 1; }
    .wifi-signal { font-size: 18px; color: #666; }
    .wifi-lock { font-size: 14px; color: #999; }

    .wifi-form-label {
      display: block;
      font-size: 14px;
      font-weight: 500;
      margin-bottom: 6px;
      color: #374151;
    }

    .wifi-input {
      width: 100%;
      padding: 10px 12px;
      border-radius: var(--radius-sm);
      border: 2px solid #e5e7eb;
      font-size: 14px;
      font-family: inherit;
    }

    .wifi-input:focus {
      outline: none;
      border-color: var(--purple);
      box-shadow: 0 0 0 1px rgba(196, 181, 224, 0.6);
      background: #fff;
    }

    .wifi-hint {
      margin-top: 6px;
      font-size: 12px;
      color: #fb7185;
    }

    /* 成功状态页 */
    .success-view {
      display: none;
      padding: 40px 20px 24px;
      text-align: center;
    }

    .success-view.show { display: block; }

    .select-view.show { display: block; }
    .select-view { display: none; }

    .success-icon-wrap {
      width: 120px;
      height: 120px;
      margin: 0 auto 20px;
      background: linear-gradient(145deg, #fff9e6, #fff5e0);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
      box-shadow: 0 8px 28px rgba(255, 200, 100, 0.3);
    }

    .success-icon-wrap .face {
      font-size: 56px;
    }

    .success-icon-wrap .check-badge {
      position: absolute;
      right: 4px;
      bottom: 4px;
      width: 36px;
      height: 36px;
      border-radius: 50%;
      background: #4caf50;
      border: 3px solid var(--pink);
      display: flex;
      align-items: center;
      justify-content: center;
      color: #fff;
      font-size: 18px;
      font-weight: bold;
    }

    .success-text {
      font-size: 16px;
      color: #333;
      margin-bottom: 28px;
    }

    .success-text .ssid { font-weight: 600; color: #5a4a7a; }

    .btn-done {
      width: 100%;
      max-width: 320px;
      margin: 0 auto;
      padding: 14px 24px;
      border: none;
      border-radius: 999px;
      background: linear-gradient(135deg, var(--pink), #ffc371);
      color: #fff;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      box-shadow: 0 8px 24px rgba(255, 154, 196, 0.4);
      font-family: inherit;
      display: block;
    }

    .btn-done:hover { opacity: 0.95; }

    /* 弹窗 */
    .overlay {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: rgba(0, 0, 0, 0.4);
      z-index: 200;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }

    .overlay.show { display: flex; }

    .modal {
      background: var(--card-bg);
      border-radius: 20px;
      padding: 20px 20px 24px;
      width: 100%;
      max-width: 340px;
      box-shadow: 0 14px 40px rgba(0, 0, 0, 0.2);
    }

    .modal-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 16px;
    }

    .modal-title { font-size: 17px; font-weight: 600; color: #333; }

    .modal-close {
      width: 28px;
      height: 28px;
      border: none;
      background: #f0f0f0;
      border-radius: 50%;
      font-size: 18px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #666;
    }

    .password-wrap {
      margin-bottom: 14px;
    }

    .password-wrap input {
      width: 100%;
      padding: 12px 44px 12px 14px;
      border: 2px solid #eee;
      border-radius: var(--radius-sm);
      font-size: 15px;
      font-family: inherit;
    }

    .password-wrap input:focus {
      outline: none;
      border-color: var(--purple);
    }

    .password-wrap .input-wrap {
      position: relative;
    }

    .password-wrap .toggle-pwd {
      position: absolute;
      right: 12px;
      top: 50%;
      transform: translateY(-50%);
      border: none;
      background: none;
      font-size: 18px;
      cursor: pointer;
      color: #999;
    }

    .remember-row {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 20px;
      font-size: 14px;
      color: #666;
      cursor: pointer;
    }

    .remember-row input { width: 18px; height: 18px; accent-color: var(--pink); cursor: pointer; }

    .btn-confirm-pwd {
      width: 100%;
      padding: 12px;
      border: none;
      border-radius: 12px;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      font-family: inherit;
      background: linear-gradient(135deg, var(--pink), #ffc371);
      color: #fff;
      box-shadow: 0 4px 14px rgba(255, 154, 196, 0.35);
    }
  </style>
</head>
<body>
  <div class="status-bar">
    <span>14:33</span>
    <span></span>
  </div>

  <div class="nav-row">
    <button type="button" class="back-btn" onclick="history.back()">←</button>
    <div class="step-dots">
      <span class="step-dot active"></span>
      <span class="step-dot"></span>
      <span class="step-dot"></span>
    </div>
  </div>

  <div class="page-header">
    <h1 class="page-title" data-i18n="wifi.title"></h1>
    <p class="page-desc" data-i18n="wifi.desc"></p>
  </div>

  <div class="select-view show" id="selectView">
    <div class="wifi-list">
      <div style="margin-bottom: 14px;">
        <label for="ssidInput" class="wifi-form-label" data-i18n="wifi.ssidLabel"></label>
        <input
          id="ssidInput"
          type="text"
          class="wifi-input"
          placeholder="Home_WiFi_2.4G"
        />
        <p class="wifi-hint" data-i18n="wifi.manualHint"></p>
      </div>

      <div style="margin-top: 10px; margin-bottom: 10px;">
        <label for="inputPassword" class="wifi-form-label" data-i18n="wifi.pwdLabel"></label>
        <div class="password-wrap">
          <div class="input-wrap">
            <input type="password" id="inputPassword" class="wifi-input" data-i18n-placeholder="wifi.pwdPlaceholder" />
            <button type="button" class="toggle-pwd" onclick="togglePwd()">👁</button>
          </div>
        </div>
      </div>

      <label class="remember-row">
        <input type="checkbox" id="rememberPwd" checked />
        <span data-i18n="wifi.rememberPwd"></span>
      </label>

      <button type="button" class="btn-confirm-pwd" onclick="submitWifi()" data-i18n="wifi.confirm"></button>
    </div>
  </div>

  <div class="success-view" id="successView">
    <div class="page-header">
      <h1 class="page-title" data-i18n="wifi.title"></h1>
      <p class="page-desc" data-i18n="wifi.desc"></p>
    </div>
    <div class="success-icon-wrap">
      <span class="face">☁️</span>
      <span class="check-badge">✓</span>
    </div>
    <p class="success-text"><span data-i18n="wifi.configured"></span> <span class="ssid" id="successSsid">GYZNKJG</span></p>
    <button type="button" class="btn-done" onclick="goMain()" data-i18n="wifi.doneBtn"></button>
  </div>

  <script>
(function() {
  var I18N = {
    ko: {
      "wifi.title": "기기에 네트워크 설정하기",
      "wifi.desc": "현재 연결 중인 Wi‑Fi 이름을 확인하고 비밀번호를 입력해 주세요.",
      "wifi.ssidLabel": "현재 Wi‑Fi 이름",
      "wifi.manualHint": "안내: Noddy는 2.4GHz 대역 Wi‑Fi만 지원해요~",
      "wifi.pwdLabel": "Wi‑Fi 비밀번호",
      "wifi.configured": "설정된 네트워크",
      "wifi.doneBtn": "설정 완료",
      "wifi.pwdPlaceholder": "비밀번호 입력",
      "wifi.rememberPwd": "비밀번호 저장 허용",
      "wifi.confirm": "확인"
    },
    en: {
      "wifi.title": "Configure device network",
      "wifi.desc": "Check the Wi‑Fi name you’re currently connected to and enter the password.",
      "wifi.ssidLabel": "Current Wi‑Fi name",
      "wifi.manualHint": "Friendly reminder: Noddy only supports 2.4GHz Wi‑Fi.",
      "wifi.pwdLabel": "Wi‑Fi password",
      "wifi.configured": "Configured network",
      "wifi.doneBtn": "Done",
      "wifi.pwdPlaceholder": "Enter password",
      "wifi.rememberPwd": "Allow saving password",
      "wifi.confirm": "OK"
    },
    zh: {
      "wifi.title": "为设备配置网络",
      "wifi.desc": "App 会自动读取当前连接的 Wi‑Fi 名称，也可以手动修改。",
      "wifi.ssidLabel": "当前 Wi‑Fi 名称",
      "wifi.manualHint": "温馨提示：Noddy 仅支持 2.4GHz 频段的 Wi‑Fi 哦～",
      "wifi.pwdLabel": "Wi‑Fi 密码",
      "wifi.configured": "已配置网络",
      "wifi.doneBtn": "完成配置",
      "wifi.pwdPlaceholder": "请输入密码",
      "wifi.rememberPwd": "允许记住密码",
      "wifi.confirm": "确定"
    }
  };
  function detectLang() {
    var saved = localStorage.getItem("noddy_lang");
    if (saved && I18N[saved]) return saved;
    var nav = (navigator.language || "").toLowerCase();
    if (nav.indexOf("ko") === 0) return "ko";
    if (nav.indexOf("zh") === 0) return "zh";
    return "en";
  }
  var currentLang = detectLang();
  function t(key) { return (I18N[currentLang] && I18N[currentLang][key]) || (I18N.en && I18N.en[key]) || key; }
  function applyLang(lang) {
    if (!I18N[lang]) return;
    currentLang = lang;
    localStorage.setItem("noddy_lang", lang);
    document.documentElement.lang = lang === "ko" ? "ko" : lang === "zh" ? "zh-CN" : "en";
    document.querySelectorAll("[data-i18n]").forEach(function(el) {
      var key = el.getAttribute("data-i18n");
      if (!key) return;
      el.textContent = t(key) || "";
    });
    document.querySelectorAll("[data-i18n-placeholder]").forEach(function(el) {
      var key = el.getAttribute("data-i18n-placeholder");
      if (!key) return;
      el.placeholder = t(key) || "";
    });
  }
  var sel = document.getElementById("lang-select");
  if (sel) { sel.value = currentLang; sel.addEventListener("change", function(e) { applyLang(e.target.value); }); }
  applyLang(currentLang);
  window._wifiT = t;
  window._wifiApplyLang = applyLang;
})();
    var currentSsid = window.__CURRENT_WIFI_SSID__ || '';
    var ssidInput = document.getElementById('ssidInput');
    var pwdInput = document.getElementById('inputPassword');

    // 如果宿主环境（uni）注入了当前 Wi‑Fi 名称，则自动填入；否则留空让用户手动填
    if (ssidInput && currentSsid) {
      ssidInput.value = currentSsid;
    }

    function togglePwd() {
      var btn = document.querySelector('.toggle-pwd');
      if (!pwdInput || !btn) return;
      if (pwdInput.type === 'password') {
        pwdInput.type = 'text';
        btn.textContent = '🙈';
      } else {
        pwdInput.type = 'password';
        btn.textContent = '👁';
      }
    }

    function submitWifi() {
      var ssid = ssidInput ? ssidInput.value.trim() : '';
      var pwd = pwdInput ? pwdInput.value.trim() : '';
      if (!ssid || !pwd) return;
      document.getElementById('successSsid').textContent = ssid;
      document.getElementById('selectView').classList.remove('show');
      document.getElementById('successView').classList.add('show');
    }

    function goMain() {
      window.location.href = 'welcome.html';
    }
  </script>
</body>
</html>
