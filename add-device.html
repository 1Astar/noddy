<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>手机正在连接设备</title>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;500;600;700&display=swap">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --purple-light: #e8dff5;
      --purple: #c4b5e0;
      --blue-light: #d4e8f7;
      --blue: #a8d4f0;
      --pink: #ff9ac4;
      --pink-light: #ffe6f2;
      --card-bg: rgba(255, 255, 255, 0.95);
      --shadow: 0 4px 20px rgba(164, 150, 200, 0.25);
      --radius: 16px;
      --radius-sm: 12px;
    }

    body {
      font-family: 'Noto Sans SC', -apple-system, sans-serif;
      min-height: 100vh;
      background: linear-gradient(180deg, var(--purple-light) 0%, var(--blue-light) 35%, #fff 60%);
      color: #333;
    }

    /* 顶部状态栏区域 */
    .status-bar {
      padding: 10px 20px 8px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 14px;
      color: #666;
    }

    .nav-row {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 8px 20px 16px;
    }

    .back-btn {
      width: 32px;
      height: 32px;
      border: none;
      background: transparent;
      font-size: 20px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #333;
    }

    .step-dots {
      display: flex;
      gap: 6px;
      margin-top: 4px;
    }

    .step-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #ddd;
      transition: background 0.3s;
    }

    .step-dot.active {
      background: var(--pink);
    }

    .page-header {
      padding: 0 20px 20px;
    }

    .page-title {
      font-size: 22px;
      font-weight: 700;
      color: #333;
      margin-bottom: 8px;
    }

    .page-desc {
      font-size: 13px;
      color: #666;
      line-height: 1.5;
    }

    /* 进程时间线 */
    .progress-list {
      padding: 0 20px 24px;
      max-width: 400px;
      margin: 0 auto;
    }

    .progress-item {
      display: flex;
      align-items: flex-start;
      gap: 14px;
      position: relative;
      padding-bottom: 4px;
    }

    .progress-item:not(:last-child) .progress-item-content::after {
      content: '';
      position: absolute;
      left: 11px;
      top: 28px;
      bottom: -8px;
      width: 2px;
      background: #e0e0e0;
    }

    .progress-item.done .progress-item-content::after {
      background: #4caf50;
    }

    .progress-icon-wrap {
      flex-shrink: 0;
      width: 24px;
      height: 24px;
      border-radius: 50%;
      background: #e0e0e0;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
      z-index: 1;
      transition: background 0.3s;
    }

    .progress-item.done .progress-icon-wrap {
      background: #4caf50;
    }

    .progress-item.done .progress-icon-wrap::before {
      content: '✓';
      color: #fff;
      font-size: 12px;
      font-weight: bold;
    }

    .progress-item.loading .progress-icon-wrap {
      background: #4caf50;
    }

    .progress-item.loading .progress-icon-wrap::before {
      content: '';
      width: 10px;
      height: 10px;
      border: 2px solid rgba(255,255,255,0.6);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    .progress-item-content {
      flex: 1;
      position: relative;
    }

    .progress-item-label {
      font-size: 15px;
      color: #333;
      font-weight: 500;
    }

    .progress-item-sublabel {
      font-size: 13px;
      color: #999;
      margin-top: 2px;
    }

    /* 下一步按钮 */
    .bottom-actions {
      padding: 20px 20px 32px;
      max-width: 400px;
      margin: 0 auto;
    }

    .btn-next {
      width: 100%;
      padding: 14px 24px;
      border: none;
      border-radius: 999px;
      background: linear-gradient(135deg, var(--pink), #ffc371);
      color: #fff;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      box-shadow: 0 8px 24px rgba(255, 154, 196, 0.4);
      font-family: inherit;
      transition: transform 0.2s, box-shadow 0.2s;
    }

    .btn-next:hover {
      transform: translateY(-1px);
      box-shadow: 0 10px 28px rgba(255, 154, 196, 0.5);
    }

    .btn-next:disabled {
      opacity: 0.6;
      cursor: not-allowed;
      transform: none;
    }

    /* 权限弹窗 / 设备选择弹窗 通用 */
    .overlay {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: rgba(0, 0, 0, 0.4);
      z-index: 200;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }

    .overlay.show {
      display: flex;
    }

    .modal {
      background: var(--card-bg);
      border-radius: 20px;
      padding: 20px 20px 24px;
      width: 100%;
      max-width: 340px;
      box-shadow: 0 14px 40px rgba(0, 0, 0, 0.2);
    }

    .modal-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 16px;
    }

    .modal-title {
      font-size: 17px;
      font-weight: 600;
      color: #333;
    }

    .modal-close {
      width: 28px;
      height: 28px;
      border: none;
      background: #f0f0f0;
      border-radius: 50%;
      font-size: 18px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #666;
    }

    .modal-body {
      font-size: 14px;
      color: #666;
      line-height: 1.6;
      margin-bottom: 20px;
    }

    .modal-body.dual-lang {
      margin-bottom: 8px;
    }

    .modal-body.dual-lang .primary { color: #333; font-weight: 500; }
    .modal-body.dual-lang .secondary { color: #999; font-size: 13px; margin-top: 4px; }

    .modal-actions {
      display: flex;
      gap: 12px;
    }

    .modal-actions .btn {
      flex: 1;
      padding: 12px 16px;
      border: none;
      border-radius: 12px;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      font-family: inherit;
    }

    .btn-cancel {
      background: #f0f0f0;
      color: #666;
    }

    .btn-confirm {
      background: linear-gradient(135deg, var(--pink), #ffc371);
      color: #fff;
      box-shadow: 0 4px 14px rgba(255, 154, 196, 0.35);
    }

    /* 设备选择弹窗 */
    .device-select-row {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 12px 14px;
      background: #f8f8f8;
      border-radius: var(--radius-sm);
      margin-bottom: 16px;
      cursor: pointer;
      border: 2px solid transparent;
      transition: border-color 0.2s, background 0.2s;
    }

    .device-select-row:hover,
    .device-select-row.selected {
      background: #fff;
      border-color: var(--pink);
    }

    .device-radio {
      width: 20px;
      height: 20px;
      border-radius: 50%;
      border: 2px solid #ccc;
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .device-select-row.selected .device-radio {
      border-color: var(--pink);
      background: var(--pink);
    }

    .device-select-row.selected .device-radio::after {
      content: '✓';
      color: #fff;
      font-size: 12px;
    }

    .device-name { font-weight: 500; color: #333; }
    .device-arrow { margin-left: auto; color: #999; font-size: 14px; }

    .modal-tip {
      font-size: 12px;
      color: #999;
      margin-top: 12px;
    }

    .btn-choose-device {
      width: 100%;
      padding: 12px;
      border: none;
      border-radius: 12px;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      font-family: inherit;
      margin-top: 8px;
      background: #e0e0e0;
      color: #999;
      transition: background 0.2s, color 0.2s;
    }

    .btn-choose-device.allow {
      background: linear-gradient(135deg, var(--pink), #ffc371);
      color: #fff;
      box-shadow: 0 4px 14px rgba(255, 154, 196, 0.35);
    }
  </style>
</head>
<body>
  <div class="status-bar">
    <span>14:33</span>
    <span></span>
  </div>

  <div class="nav-row">
    <button type="button" class="back-btn" onclick="history.back()">←</button>
    <div class="step-dots">
      <span class="step-dot active"></span>
      <span class="step-dot active"></span>
      <span class="step-dot"></span>
    </div>
  </div>

  <div class="page-header">
    <h1 class="page-title" data-i18n="progress.title"></h1>
    <p class="page-desc" data-i18n="progress.desc"></p>
  </div>

  <div class="progress-list">
    <div class="progress-item done" data-step="wifi">
      <div class="progress-icon-wrap"></div>
      <div class="progress-item-content">
        <div class="progress-item-label" data-i18n="progress.wifi"></div>
      </div>
    </div>
    <div class="progress-item" data-step="location">
      <div class="progress-icon-wrap"></div>
      <div class="progress-item-content">
        <div class="progress-item-label" data-i18n="progress.location"></div>
      </div>
    </div>
    <div class="progress-item" data-step="bluetooth">
      <div class="progress-icon-wrap"></div>
      <div class="progress-item-content">
        <div class="progress-item-label" data-i18n="progress.bluetooth"></div>
      </div>
    </div>
    <div class="progress-item" data-step="scan">
      <div class="progress-icon-wrap"></div>
      <div class="progress-item-content">
        <div class="progress-item-label" data-i18n="progress.scan"></div>
      </div>
    </div>
    <div class="progress-item" data-step="select">
      <div class="progress-icon-wrap"></div>
      <div class="progress-item-content">
        <div class="progress-item-label" data-i18n="progress.select"></div>
        <div class="progress-item-sublabel selected-device-name" style="display:none;"></div>
      </div>
    </div>
    <div class="progress-item" data-step="connect">
      <div class="progress-icon-wrap"></div>
      <div class="progress-item-content">
        <div class="progress-item-label" data-i18n="progress.connect"></div>
      </div>
    </div>
  </div>

  <div class="bottom-actions">
    <button type="button" class="btn-next" id="btnNext" disabled data-i18n="progress.nextBtn">下一步</button>
  </div>

  <!-- 蓝牙权限弹窗 -->
  <div class="overlay" id="overlayBluetooth">
    <div class="modal">
      <div class="modal-header">
        <span class="modal-title" data-i18n="progress.btTitle"></span>
        <button type="button" class="modal-close" onclick="closeBluetoothModal()">×</button>
      </div>
      <div class="modal-body">
        <div data-i18n="progress.btDesc"></div>
      </div>
      <div class="modal-actions">
        <button type="button" class="btn btn-cancel" onclick="closeBluetoothModal()" data-i18n="progress.cancel"></button>
        <button type="button" class="btn btn-confirm" onclick="grantBluetooth()" data-i18n="progress.open"></button>
      </div>
    </div>
  </div>

  <!-- 定位权限弹窗 -->
  <div class="overlay" id="overlayLocation">
    <div class="modal">
      <div class="modal-header">
        <span class="modal-title" data-i18n="progress.locTitle"></span>
        <button type="button" class="modal-close" onclick="closeLocationModal()">×</button>
      </div>
      <div class="modal-body">
        <div data-i18n="progress.locDesc"></div>
      </div>
      <div class="modal-actions">
        <button type="button" class="btn btn-cancel" onclick="closeLocationModal()" data-i18n="progress.cancel"></button>
        <button type="button" class="btn btn-confirm" onclick="grantLocation()" data-i18n="progress.open"></button>
      </div>
    </div>
  </div>

  <!-- 选择设备弹窗 -->
  <div class="overlay" id="overlayDevice">
    <div class="modal">
      <div class="modal-header">
        <span class="modal-title" data-i18n="progress.deviceTitle"></span>
        <button type="button" class="modal-close" onclick="closeDeviceModal()">×</button>
      </div>
      <div class="device-select-row selected" data-device="Noddy">
        <span class="device-radio"></span>
        <span class="device-name">Noddy</span>
        <span class="device-arrow">▼</span>
      </div>
      <p class="modal-tip" data-i18n="progress.deviceTip"></p>
      <button type="button" class="btn-choose-device allow" id="btnConfirmDevice" onclick="confirmDevice()" data-i18n="progress.confirmBtn"></button>
    </div>
  </div>

  <script>
(function() {
  var I18N = {
    ko: { "progress.title": "휴대폰이 기기에 연결 중", "progress.desc": "휴대폰 권한을 확인하고 기기와 연결합니다. 기기를 배선 상태로 두세요.", "progress.wifi": "Wi‑Fi 켜짐", "progress.location": "위치 권한 켜짐", "progress.bluetooth": "블루투스 켜짐", "progress.scan": "블루투스 기기 검색", "progress.select": "배선할 기기 선택", "progress.connect": "휴대폰이 Noddy에 연결됨", "progress.nextBtn": "다음", "progress.btTitle": "블루투스 권한 필요", "progress.btDesc": "주변 기기를 찾기 위해 블루투스 권한이 필요합니다.", "progress.locTitle": "위치 권한 필요", "progress.locDesc": "Wi‑Fi 검색을 위해 위치 권한이 필요합니다.", "progress.deviceTitle": "Noddy 기기를 선택해 주세요", "progress.deviceTip": "잘못 선택하면 연결을 다시 시작해야 해요.", "progress.cancel": "취소", "progress.open": "열기", "progress.confirmBtn": "선택 완료" },
    en: { "progress.title": "Connecting phone to device", "progress.desc": "Checking permissions and connecting to device. Keep the device in pairing mode.", "progress.wifi": "Wi‑Fi on", "progress.location": "Location on", "progress.bluetooth": "Bluetooth on", "progress.scan": "Scan for Bluetooth devices", "progress.select": "Select device to configure", "progress.connect": "Phone connected to Noddy", "progress.nextBtn": "Next", "progress.btTitle": "Bluetooth permission needed", "progress.btDesc": "Bluetooth permission is needed to find nearby devices.", "progress.locTitle": "Location permission needed", "progress.locDesc": "Location permission is needed to search for Wi‑Fi.", "progress.deviceTitle": "Select your Noddy device", "progress.deviceTip": "Wrong selection will require reconnecting.", "progress.cancel": "Cancel", "progress.open": "Open", "progress.confirmBtn": "Confirm" },
    zh: { "progress.title": "手机正在连接设备", "progress.desc": "正在检测手机系统权限，与设备进行连接，请让设备保持配网状态。", "progress.wifi": "已开启 Wi‑Fi", "progress.location": "已开启手机定位", "progress.bluetooth": "已开启手机蓝牙", "progress.scan": "扫描蓝牙设备", "progress.select": "选择需要配网的设备", "progress.connect": "手机连接到 Noddy", "progress.nextBtn": "下一步", "progress.btTitle": "需要蓝牙权限", "progress.btDesc": "需要蓝牙权限以寻找周边设备。", "progress.locTitle": "需要定位权限", "progress.locDesc": "为了搜索 Wi‑Fi，需要位置权限。", "progress.deviceTitle": "选择你的 Noddy 设备", "progress.deviceTip": "选择错误需要重新开启连接。", "progress.cancel": "取消", "progress.open": "去开启", "progress.confirmBtn": "确定选择" }
  };
  function detectLang() {
    var saved = localStorage.getItem("noddy_lang");
    if (saved && I18N[saved]) return saved;
    var nav = (navigator.language || "").toLowerCase();
    if (nav.indexOf("ko") === 0) return "ko";
    if (nav.indexOf("zh") === 0) return "zh";
    return "en";
  }
  var currentLang = detectLang();
  function t(key) { return (I18N[currentLang] && I18N[currentLang][key]) || (I18N.en && I18N.en[key]) || key; }
  function applyLang(lang) {
    if (!I18N[lang]) return;
    currentLang = lang;
    localStorage.setItem("noddy_lang", lang);
    document.documentElement.lang = lang === "ko" ? "ko" : lang === "zh" ? "zh-CN" : "en";
    document.querySelectorAll("[data-i18n]").forEach(function(el) {
      var key = el.getAttribute("data-i18n");
      if (!key) return;
      el.textContent = t(key) || "";
    });
  }
  var sel = document.getElementById("lang-select");
  if (sel) { sel.value = currentLang; sel.addEventListener("change", function(e) { applyLang(e.target.value); }); }
  applyLang(currentLang);
})();
  </script>
  <script>
    var stepOrder = ['wifi', 'location', 'bluetooth', 'scan', 'select', 'connect'];
    var currentStepIndex = 0;
    var locationGranted = false;
    var bluetoothGranted = false;
    var deviceSelected = false;
    var selectedDeviceName = '';

    function getItem(step) {
      return document.querySelector('.progress-item[data-step="' + step + '"]');
    }

    function setStepDone(step) {
      var el = getItem(step);
      if (el) {
        el.classList.remove('loading');
        el.classList.add('done');
      }
    }

    function setStepLoading(step) {
      var el = getItem(step);
      if (el) {
        el.classList.remove('done');
        el.classList.add('loading');
      }
    }

    function showBluetoothModal() {
      document.getElementById('overlayBluetooth').classList.add('show');
    }

    function closeBluetoothModal() {
      document.getElementById('overlayBluetooth').classList.remove('show');
    }

    function showLocationModal() {
      document.getElementById('overlayLocation').classList.add('show');
    }

    function closeLocationModal() {
      document.getElementById('overlayLocation').classList.remove('show');
    }

    function grantBluetooth() {
      closeBluetoothModal();
      bluetoothGranted = true;
      setStepDone('bluetooth');
      setStepLoading('scan');
      setTimeout(function() {
        setStepDone('scan');
        document.getElementById('overlayDevice').classList.add('show');
      }, 1500);
    }

    function grantLocation() {
      closeLocationModal();
      locationGranted = true;
      setStepDone('location');
      showBluetoothModal();
    }

    function runNextStep() {
      if (!locationGranted) {
        showLocationModal();
        return;
      }
      if (!bluetoothGranted) {
        showBluetoothModal();
        return;
      }
    }

    function showDeviceModal() {
      document.getElementById('overlayDevice').classList.add('show');
    }

    function closeDeviceModal() {
      document.getElementById('overlayDevice').classList.remove('show');
    }

    function confirmDevice() {
      selectedDeviceName = 'Noddy';
      deviceSelected = true;
      closeDeviceModal();
      setStepDone('select');
      var sub = document.querySelector('.progress-item[data-step="select"] .progress-item-sublabel');
      if (sub) {
        sub.textContent = selectedDeviceName;
        sub.style.display = 'block';
      }
      setStepDone('connect');
      document.getElementById('btnNext').disabled = false;
    }

    document.getElementById('btnNext').addEventListener('click', function() {
      window.location.href = 'WiFi-connect.html';
    });

    // 进入页面时先请求定位权限，再蓝牙，再扫描与设备选择
    setTimeout(function() {
      showLocationModal();
    }, 400);
  </script>
</body>
</html>
