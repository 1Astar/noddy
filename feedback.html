<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>意见反馈</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: "Noto Sans SC", -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: linear-gradient(180deg, #eee7f7 0%, #f5effb 45%, #f9f4ff 100%);
      color: #5a4a7a;
      min-height: 100vh;
      padding: 16px 14px 24px;
    }
    .top {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      margin-bottom: 14px;
    }
    .back-btn {
      border: none;
      border-radius: 999px;
      background: rgba(255,255,255,0.9);
      color: #6a56a2;
      padding: 6px 12px;
      font-size: 13px;
      cursor: pointer;
    }
    .title { font-size: 17px; font-weight: 800; color: #6a56a2; }

    .card {
      background: rgba(255,255,255,0.82);
      border: 1px solid rgba(196, 181, 224, 0.45);
      border-radius: 18px;
      padding: 16px 14px;
      box-shadow: 0 10px 26px rgba(164, 150, 200, 0.22);
    }
    .headline {
      font-size: 16px;
      font-weight: 850;
      color: #5a4a7a;
      margin-bottom: 10px;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .desc {
      font-size: 13px;
      color: #7d6ea5;
      line-height: 1.7;
      margin-bottom: 14px;
    }
    .btn {
      border: none;
      border-radius: 999px;
      padding: 11px 14px;
      cursor: pointer;
      font-weight: 800;
      font-size: 13px;
      width: 100%;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }
    .btn-primary { background: linear-gradient(135deg, #7c5cff, #3aa1d3); color: #fff; }
    .btn-ghost { background: rgba(255,255,255,0.9); color: #6a56a2; border: 1px solid rgba(196, 181, 224, 0.55); }
    .link-row { margin-top: 10px; display: grid; gap: 10px; }

    .divider {
      margin: 14px 0;
      height: 1px;
      background: rgba(196, 181, 224, 0.35);
    }

    .meta {
      font-size: 12px;
      color: #8576ab;
      line-height: 1.7;
    }
    .mono {
      font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, "Liberation Mono", monospace;
      font-size: 12px;
      color: #5a4a7a;
      word-break: break-all;
    }
    .pill {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 6px 10px;
      border-radius: 999px;
      background: rgba(124, 92, 255, 0.10);
      border: 1px solid rgba(124, 92, 255, 0.25);
      color: #6a56a2;
      font-weight: 750;
      font-size: 12px;
      margin-bottom: 10px;
    }
  </style>
</head>
<body>
  <div class="top">
    <button class="back-btn" type="button" onclick="goBack()">← 返回</button>
    <div class="title">意见反馈</div>
    <div style="width:56px"></div>
  </div>

  <div class="card">
    <div class="headline">我们很在意你的想法 <span aria-hidden="true">💡</span></div>
    <div class="pill" id="region-pill">服务区：识别中…</div>
    <div class="desc">你可以填写反馈问卷，或通过邮件联系我们（我们会在 24 小时内回复）。</div>

    <div class="link-row">
      <button class="btn btn-primary" type="button" id="btn-form">填写反馈问卷</button>
      <button class="btn btn-ghost" type="button" id="btn-copy">复制问卷链接</button>
    </div>

    <div class="divider"></div>
    <div class="meta">或发送邮件至：</div>
    <div style="margin-top:6px">
      <a class="mono" id="mailto" href="mailto:noddysupport@guanyingis.com?subject=Noddy%20Feedback">noddysupport@guanyingis.com</a>
      <div class="meta">（我们会在24小时内回复）</div>
    </div>

    <div class="divider"></div>
    <div class="meta">当前将使用的问卷链接：</div>
    <div class="mono" id="link-preview"></div>
  </div>

  <script>
    const REGION_KEY = "noddy_region"; // "cn" | "global"

    // 国内区问卷星模板（保留 user_id 参数）
    const WJX_TEMPLATE = "https://wj.qq.com/s2/xxx?source=noddy_app&user_id={userId}";
    // 海外区按语言使用不同 Google Form
    const GOOGLE_FORM_BY_LANG = {
      zh: "https://docs.google.com/forms/d/e/1FAIpQLSeXfeudvGXrmPI8730K6IPn7-XBG9jlruzX2kyBTXl__45PHw/viewform?usp=header",
      en: "https://docs.google.com/forms/d/e/1FAIpQLSeY7rz6WqA41M_xL7M30lycshY-FsP7uZ5BBaV2ZoWhk4iqEg/viewform?usp=publish-editor",
      ko: "https://docs.google.com/forms/d/e/1FAIpQLSdJ4g9nyIdazm9MVBllptP-fsIagiXMCPUyRfmbv8WRiJx_rQ/viewform?usp=publish-editor"
    };

    function goBack() {
      if (document.referrer) history.back();
      else location.href = "home.html";
    }

    function detectRegion() {
      try {
        const v = (localStorage.getItem(REGION_KEY) || "").toLowerCase();
        return v === "cn" ? "cn" : "global";
      } catch (_) {
        return "global";
      }
    }

    function detectLang() {
      try {
        const saved = (localStorage.getItem("noddy_lang") || "").toLowerCase();
        if (saved === "zh" || saved === "en" || saved === "ko") return saved;
      } catch (_) {}
      const nav = (navigator.language || "").toLowerCase();
      if (nav.startsWith("ko")) return "ko";
      if (nav.startsWith("zh")) return "zh";
      return "en";
    }

    function getUserId() {
      try {
        const id = (localStorage.getItem("noddy_account_id") || "").trim();
        if (id) return id;
      } catch (_) {}
      try {
        const acct = (localStorage.getItem("noddy_last_login_account") || "").trim();
        if (acct) return acct;
      } catch (_) {}
      return "anonymous";
    }

    function buildLink(template, userId) {
      return template.replace("{userId}", encodeURIComponent(userId));
    }

    function buildGoogleFormLink(base, userId) {
      try {
        const u = new URL(base);
        u.searchParams.set("noddy_uid", userId);
        return u.toString();
      } catch (_) {
        return base;
      }
    }

    function updateUI() {
      const region = detectRegion();
      const lang = detectLang();
      const userId = getUserId();
      const isCN = region === "cn";
      const googleBase = GOOGLE_FORM_BY_LANG[lang] || GOOGLE_FORM_BY_LANG.en;
      const link = isCN
        ? buildLink(WJX_TEMPLATE, userId)
        : buildGoogleFormLink(googleBase, userId);

      const pill = document.getElementById("region-pill");
      if (pill) {
        const langLabel = lang === "zh" ? "中文" : lang === "ko" ? "韩文" : "英文";
        pill.textContent = "服务区：" + (isCN ? "国内（CN）" : "海外（Global）") + " · 表单语言：" + langLabel;
      }

      const preview = document.getElementById("link-preview");
      if (preview) preview.textContent = link;

      const btn = document.getElementById("btn-form");
      if (btn) btn.onclick = function() { window.open(link, "_blank"); };

      const copyBtn = document.getElementById("btn-copy");
      if (copyBtn) copyBtn.onclick = async function() {
        try {
          await navigator.clipboard.writeText(link);
          alert("已复制");
        } catch (_) {
          // fallback
          const ta = document.createElement("textarea");
          ta.value = link;
          document.body.appendChild(ta);
          ta.select();
          try { document.execCommand("copy"); alert("已复制"); } catch (e) { alert("复制失败，请手动复制"); }
          ta.remove();
        }
      };
    }

    updateUI();
  </script>
</body>
</html>
