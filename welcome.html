<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <title>欢迎来到 Noddy</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      font-family: Pretendard, "Apple SD Gothic Neo", -apple-system, BlinkMacSystemFont,
        "Segoe UI", system-ui, sans-serif;
    }
    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: radial-gradient(circle at top, #ffeef5 0, #fff7f0 40%, #ffffff 100%);
    }
    .shell {
      width: 100%;
      max-width: 440px;
      border-radius: 26px;
      background: rgba(255, 255, 255, 0.96);
      box-shadow:
        0 22px 45px rgba(248, 187, 208, 0.5),
        0 0 0 1px rgba(248, 187, 208, 0.7);
      padding: 22px 20px 20px;
    }
    .header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 12px;
    }
    .logo-row {
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .logo {
      width: 40px;
      height: 40px;
      border-radius: 18px;
      background: linear-gradient(135deg, #fb7185, #fb923c);
      display: flex;
      align-items: center;
      justify-content: center;
      color: #fff;
      font-weight: 600;
      box-shadow: 0 10px 26px rgba(248, 113, 113, 0.65);
    }
    .title {
      display: flex;
      flex-direction: column;
      gap: 2px;
    }
    .title h1 {
      font-size: 17px;
      font-weight: 600;
      color: #0f172a;
    }
    .title span {
      font-size: 11px;
      color: #94a3b8;
    }
    .badge {
      font-size: 10px;
      padding: 4px 9px;
      border-radius: 999px;
      background: rgba(248, 187, 208, 0.2);
      color: #fb7185;
      border: 1px solid rgba(248, 187, 208, 0.7);
    }
    .body {
      margin-top: 8px;
      padding: 16px 14px 18px;
      border-radius: 20px;
      background: linear-gradient(135deg, #fefce8, #fff7f0);
    }
    .body h2 {
      font-size: 16px;
      font-weight: 600;
      color: #0f172a;
      line-height: 1.7;
      margin-bottom: 6px;
    }
    .body p {
      font-size: 11px;
      color: #64748b;
      line-height: 1.6;
    }
    .btn {
      width: 100%;
      margin-top: 16px;
      padding: 10px 0;
      border-radius: 999px;
      border: none;
      background: linear-gradient(135deg, #fb7185, #fb923c);
      color: white;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      box-shadow:
        0 12px 24px rgba(248, 113, 113, 0.45),
        0 0 0 1px rgba(248, 187, 208, 0.7);
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      transition: transform 0.1s ease, box-shadow 0.1s ease, filter 0.1s ease;
    }
    .btn:hover {
      filter: brightness(1.03);
      transform: translateY(-1px);
    }
    .btn:active {
      transform: translateY(0);
      box-shadow:
        0 8px 18px rgba(248, 113, 113, 0.5),
        0 0 0 1px rgba(248, 187, 208, 0.7);
    }
    .btn span {
      font-size: 13px;
    }
    .lang-wrap {
      display: flex;
      justify-content: flex-end;
      margin-bottom: 12px;
    }
    .lang-select {
      padding: 6px 12px;
      border-radius: 999px;
      border: 1px solid #e2e8f0;
      background: rgba(255,255,255,0.9);
      font-size: 12px;
      color: #334155;
      cursor: pointer;
    }
    .lang-select:focus { outline: none; border-color: #fda4af; box-shadow: 0 0 0 2px rgba(253,164,175,0.3); }

    /* 未成年人使用确认弹窗 */
    .overlay {
      position: fixed;
      inset: 0;
      background: rgba(15, 23, 42, 0.32);
      display: none;
      align-items: center;
      justify-content: center;
      padding: 20px;
      z-index: 999;
    }
    .overlay.show {
      display: flex;
    }
    .modal {
      width: 100%;
      max-width: 420px;
      border-radius: 22px;
      background: rgba(255, 255, 255, 0.98);
      box-shadow:
        0 30px 60px rgba(15, 23, 42, 0.22),
        0 0 0 1px rgba(248, 187, 208, 0.65);
      padding: 18px 18px 16px;
      backdrop-filter: blur(10px);
    }
    .modal-header {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 8px;
    }
    .modal-icon {
      width: 42px;
      height: 42px;
      border-radius: 16px;
      background: linear-gradient(135deg, rgba(251, 113, 133, 0.18), rgba(251, 146, 60, 0.18));
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 20px;
    }
    .modal-title {
      font-size: 14px;
      font-weight: 700;
      color: #0f172a;
      line-height: 1.4;
    }
    .modal-text {
      font-size: 12px;
      color: #475569;
      line-height: 1.7;
      margin: 6px 0 12px;
    }
    .modal-actions {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    .modal-btn-primary,
    .modal-btn-secondary {
      width: 100%;
      border: none;
      border-radius: 999px;
      padding: 10px 14px;
      font-size: 13px;
      font-weight: 700;
      cursor: pointer;
      transition: transform 0.1s ease, filter 0.1s ease, box-shadow 0.1s ease;
    }
    .modal-btn-primary {
      background: linear-gradient(135deg, #fb7185, #fb923c);
      color: #fff;
      box-shadow:
        0 12px 24px rgba(248, 113, 113, 0.32),
        0 0 0 1px rgba(248, 187, 208, 0.7);
    }
    .modal-btn-secondary {
      background: #f9fafb;
      color: #475569;
      border: 1px solid #e2e8f0;
      box-shadow: 0 10px 20px rgba(15, 23, 42, 0.06);
    }
    .modal-btn-primary:hover,
    .modal-btn-secondary:hover {
      filter: brightness(1.02);
      transform: translateY(-1px);
    }
    .modal-btn-primary:active,
    .modal-btn-secondary:active {
      transform: translateY(0);
    }
  </style>
</head>
<body>
  <div class="shell">
    <div class="header">
      <div class="logo-row">
        <div class="logo">N</div>
        <div class="title">
          <h1>Noddy</h1>
          <span data-i18n="welcome.subtitle"></span>
        </div>
      </div>
      <div class="badge">Step 2 / 3</div>
    </div>
    <div class="body">
      <h2 data-i18n="welcome.title"></h2>
      <p data-i18n="welcome.desc"></p>
      <button
        class="btn"
        type="button"
        onclick="window.location.href='./name.html'"
      >
        <span data-i18n="welcome.nextBtn"></span>
      </button>
    </div>
  </div>

  <!-- 未成年人使用确认弹窗 -->
  <div id="minorOverlay" class="overlay" aria-modal="true" role="dialog">
    <div class="modal">
      <div class="modal-header">
        <div class="modal-icon">👶</div>
        <div class="modal-title" data-i18n="welcome.minorTitle"></div>
      </div>
      <div class="modal-text" data-i18n="welcome.minorDesc"></div>
      <div class="modal-actions">
        <button class="modal-btn-primary" type="button" onclick="handleMinorAnswer(true)" data-i18n="welcome.minorYes"></button>
        <button class="modal-btn-secondary" type="button" onclick="handleMinorAnswer(false)" data-i18n="welcome.minorNo"></button>
      </div>
    </div>
  </div>
  <script>
(function() {
  var I18N = {
    ko: {
      "welcome.subtitle": "연결이 완료되었어요",
      "welcome.title": "첫 연결을 축하드려요 🌷<br>이제 우리만의 작은 친구에게 이름을 지어볼까요?",
      "welcome.desc": "Wi‑Fi 설정이 끝났어요. 다음으로 기기에 이름을 지어주고, 미성년자 사용 여부를 확인해 더 안전한 동반 경험을 시작해 보세요.",
      "welcome.nextBtn": "다음: 이름 지어주기",
      "welcome.minorTitle": "이 기기는 미성년자가 사용할 예정인가요?",
      "welcome.minorDesc": "미성년자가 사용하는 경우, 보호자 동의와 함께 기기에서 자녀 보호/스크린 타임 기능을 켜두시면 더 안전하게 이용할 수 있어요.",
      "welcome.minorYes": "네, 미성년자가 사용할 거예요",
      "welcome.minorNo": "아니요, 모두 성인만 사용할게요"
    },
    en: {
      "welcome.subtitle": "Connection complete",
      "welcome.title": "Congratulations on your first connection 🌷<br>Shall we give our little friend a name?",
      "welcome.desc": "Wi‑Fi setup is done. Next we'll name your device and confirm if it's for a minor, so you can start a safer companion experience.",
      "welcome.nextBtn": "Next: Name your device",
      "welcome.minorTitle": "Will this device be used by a minor?",
      "welcome.minorDesc": "If so, please enable parental controls / screen time on the device for a safer experience.",
      "welcome.minorYes": "Yes, for a minor",
      "welcome.minorNo": "No, adults only"
    },
    zh: {
      "welcome.subtitle": "连接已完成",
      "welcome.title": "恭喜完成首次连接 🌷<br>来给我们的设备取个名字吧？",
      "welcome.desc": "Wi‑Fi 已配置完成。接下来我们会带你给设备取一个可爱的名字，并确认是否由未成年人使用，开启更安全、更温柔的陪伴体验。",
      "welcome.nextBtn": "下一步：取名",
      "welcome.minorTitle": "此设备是否由未成年人使用？",
      "welcome.minorDesc": "如果是未成年人使用，请在系统中开启家长控制/屏幕使用时间等功能，以获得更安全的体验。",
      "welcome.minorYes": "是的，为未成年人使用",
      "welcome.minorNo": "不是，仅由成年人使用"
    }
  };
  function detectLang() {
    var saved = localStorage.getItem("noddy_lang");
    if (saved && I18N[saved]) return saved;
    var nav = (navigator.language || "").toLowerCase();
    if (nav.indexOf("ko") === 0) return "ko";
    if (nav.indexOf("zh") === 0) return "zh";
    return "en";
  }
  var currentLang = detectLang();
  function t(key) { return (I18N[currentLang] && I18N[currentLang][key]) || (I18N.en && I18N.en[key]) || key; }
  function applyLang(lang) {
    if (!I18N[lang]) return;
    currentLang = lang;
    localStorage.setItem("noddy_lang", lang);
    document.documentElement.lang = lang === "ko" ? "ko" : lang === "zh" ? "zh-CN" : "en";
    document.querySelectorAll("[data-i18n]").forEach(function(el) {
      var key = el.getAttribute("data-i18n");
      if (!key) return;
      var text = t(key);
      el.innerHTML = text.replace(/\\n/g, "<br>").replace(/\n/g, "<br>");
    });
  }
  var sel = document.getElementById("lang-select");
  if (sel) { sel.value = currentLang; sel.addEventListener("change", function(e) { applyLang(e.target.value); }); }
  applyLang(currentLang);
})();

    const overlay = document.getElementById("minorOverlay");
    let hasAskedMinor = localStorage.getItem("noddy_minor_checked") === "1";
    function showMinorDialogIfNeeded() {
      if (hasAskedMinor) return;
      if (overlay) overlay.classList.add("show");
    }
    function handleMinorAnswer(isMinor) {
      hasAskedMinor = true;
      localStorage.setItem("noddy_minor_checked", "1");
      localStorage.setItem("noddy_is_minor_device", isMinor ? "1" : "0");
      if (overlay) overlay.classList.remove("show");
    }
    window.handleMinorAnswer = handleMinorAnswer;
    showMinorDialogIfNeeded();
  </script>
</body>
</html>
