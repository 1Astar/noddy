<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>为设备配置网络</title>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;500;600;700&display=swap">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --purple-light: #e8dff5;
      --purple: #c4b5e0;
      --blue-light: #d4e8f7;
      --blue: #a8d4f0;
      --pink: #ff9ac4;
      --pink-light: #ffe6f2;
      --card-bg: rgba(255, 255, 255, 0.95);
      --shadow: 0 4px 20px rgba(164, 150, 200, 0.25);
      --radius: 16px;
      --radius-sm: 12px;
    }

    body {
      font-family: 'Noto Sans SC', -apple-system, sans-serif;
      min-height: 100vh;
      background: linear-gradient(180deg, var(--purple-light) 0%, var(--blue-light) 30%, #fff 55%);
      color: #333;
    }

    .status-bar {
      padding: 10px 20px 8px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 14px;
      color: #666;
    }

    .nav-row {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 8px 20px 16px;
    }

    .back-btn {
      width: 32px;
      height: 32px;
      border: none;
      background: transparent;
      font-size: 20px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #333;
    }

    .step-dots {
      display: flex;
      gap: 6px;
      margin-top: 4px;
    }

    .step-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #ddd;
    }

    .step-dot.active { background: var(--pink); }

    .page-header {
      padding: 0 20px 20px;
    }

    .page-title {
      font-size: 22px;
      font-weight: 700;
      color: #333;
      margin-bottom: 8px;
    }

    .page-desc {
      font-size: 13px;
      color: #666;
      line-height: 1.5;
    }

    .scene-message {
      margin-top: 8px;
      font-size: 12px;
      color: #fb7185;
      line-height: 1.6;
      white-space: pre-wrap;
    }

    .wifi-list {
      padding: 0 20px 24px;
      max-width: 400px;
      margin: 0 auto;
    }

    .wifi-item {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 14px 16px;
      background: var(--card-bg);
      border-radius: var(--radius-sm);
      margin-bottom: 10px;
      box-shadow: var(--shadow);
      cursor: pointer;
      transition: all 0.2s;
    }

    .wifi-item:hover {
      transform: translateY(-1px);
      box-shadow: 0 6px 24px rgba(164, 150, 200, 0.35);
    }

    .wifi-item.add-more {
      color: #666;
      border: 1px dashed rgba(196, 181, 224, 0.6);
      background: rgba(255, 255, 255, 0.8);
    }

    .wifi-name { font-weight: 500; color: #333; flex: 1; }
    .wifi-signal { font-size: 18px; color: #666; }
    .wifi-lock { font-size: 14px; color: #999; }

    .wifi-hint {
      margin: 6px 0 12px;
      font-size: 12px;
      color: #fb7185;
    }

    .scan-row {
      display: flex;
      align-items: center;
      gap: 10px;
      margin: 12px 0 8px;
    }

    .btn-scan {
      flex: 1;
      padding: 12px 14px;
      border: none;
      border-radius: var(--radius-sm);
      background: linear-gradient(135deg, rgba(255, 154, 196, 0.18), rgba(255, 195, 113, 0.18));
      color: #5a4a7a;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      box-shadow: var(--shadow);
    }

    .btn-scan:active { transform: scale(0.99); }

    .scan-spinner {
      width: 18px;
      height: 18px;
      border-radius: 50%;
      border: 2px solid rgba(255, 154, 196, 0.45);
      border-top-color: rgba(255, 154, 196, 1);
      animation: spin 0.8s linear infinite;
      display: none;
    }

    .scan-spinner.show { display: inline-block; }

    @keyframes spin { to { transform: rotate(360deg); } }

    /* 成功状态页 */
    .success-view {
      display: none;
      padding: 40px 20px 24px;
      text-align: center;
    }

    .success-view.show { display: block; }

    .select-view.show { display: block; }
    .select-view { display: none; }

    .success-icon-wrap {
      width: 120px;
      height: 120px;
      margin: 0 auto 20px;
      background: linear-gradient(145deg, #fff9e6, #fff5e0);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
      box-shadow: 0 8px 28px rgba(255, 200, 100, 0.3);
    }

    .success-icon-wrap .face {
      font-size: 56px;
    }

    .success-icon-wrap .check-badge {
      position: absolute;
      right: 4px;
      bottom: 4px;
      width: 36px;
      height: 36px;
      border-radius: 50%;
      background: #4caf50;
      border: 3px solid var(--pink);
      display: flex;
      align-items: center;
      justify-content: center;
      color: #fff;
      font-size: 18px;
      font-weight: bold;
    }

    .success-text {
      font-size: 16px;
      color: #333;
      margin-bottom: 28px;
    }

    .success-text .ssid { font-weight: 600; color: #5a4a7a; }

    .btn-done {
      width: 100%;
      max-width: 320px;
      margin: 0 auto;
      padding: 14px 24px;
      border: none;
      border-radius: 999px;
      background: linear-gradient(135deg, var(--pink), #ffc371);
      color: #fff;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      box-shadow: 0 8px 24px rgba(255, 154, 196, 0.4);
      font-family: inherit;
      display: block;
    }

    .btn-done:hover { opacity: 0.95; }

    .connecting-view {
      display: none;
      padding: 30px 20px 24px;
      text-align: center;
    }
    .connecting-view.show { display: block; }
    .connecting-spinner {
      width: 44px;
      height: 44px;
      margin: 0 auto 12px;
      border-radius: 50%;
      border: 4px solid rgba(255, 154, 196, 0.35);
      border-top-color: #ff7eb5;
      animation: spin 0.8s linear infinite;
    }
    .connecting-text {
      font-size: 14px;
      color: #5a4a7a;
      line-height: 1.6;
      white-space: pre-wrap;
    }

    /* 弹窗 */
    .overlay {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: rgba(0, 0, 0, 0.4);
      z-index: 200;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }

    .overlay.show { display: flex; }

    .modal {
      background: var(--card-bg);
      border-radius: 20px;
      padding: 20px 20px 24px;
      width: 100%;
      max-width: 340px;
      box-shadow: 0 14px 40px rgba(0, 0, 0, 0.2);
    }

    .modal-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 16px;
    }

    .modal-title { font-size: 17px; font-weight: 600; color: #333; }

    .modal-close {
      width: 28px;
      height: 28px;
      border: none;
      background: #f0f0f0;
      border-radius: 50%;
      font-size: 18px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #666;
    }

    .password-wrap {
      margin-bottom: 14px;
    }

    .password-wrap input {
      width: 100%;
      padding: 12px 44px 12px 14px;
      border: 2px solid #eee;
      border-radius: var(--radius-sm);
      font-size: 15px;
      font-family: inherit;
    }

    .password-wrap input:focus {
      outline: none;
      border-color: var(--purple);
    }

    .password-wrap .input-wrap {
      position: relative;
    }

    .password-wrap .toggle-pwd {
      position: absolute;
      right: 12px;
      top: 50%;
      transform: translateY(-50%);
      border: none;
      background: none;
      font-size: 18px;
      cursor: pointer;
      color: #999;
    }

    .remember-row {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 20px;
      font-size: 14px;
      color: #666;
      cursor: pointer;
    }

    .remember-row input { width: 18px; height: 18px; accent-color: var(--pink); cursor: pointer; }

    .btn-confirm-pwd {
      width: 100%;
      padding: 12px;
      border: none;
      border-radius: 12px;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      font-family: inherit;
      background: linear-gradient(135deg, var(--pink), #ffc371);
      color: #fff;
      box-shadow: 0 4px 14px rgba(255, 154, 196, 0.35);
    }
  </style>
</head>
<body>
  <div class="status-bar">
    <span>14:33</span>
    <span></span>
  </div>

  <div class="nav-row">
    <button type="button" class="back-btn" onclick="goToLogin()">←</button>
    <div class="step-dots">
      <span class="step-dot active"></span>
      <span class="step-dot"></span>
      <span class="step-dot"></span>
    </div>
  </div>

  <div class="page-header">
    <h1 class="page-title" data-i18n="wifi.title"></h1>
    <p class="page-desc" data-i18n="wifi.desc"></p>
    <p class="scene-message" id="sceneMessage"></p>
  </div>

  <div class="select-view show" id="selectView">
    <div class="wifi-list">
      <div class="wifi-item add-more" role="button" onclick="window.location.href='Add-WiFi-connect.html'">
        <span class="wifi-name" data-i18n="wifi.addHotspot"></span>
      </div>

      <div class="scan-row">
        <button type="button" class="btn-scan" id="btnScanWifi" data-i18n="wifi.scanBtn"></button>
        <span class="scan-spinner" id="scanSpinner" aria-hidden="true"></span>
      </div>
      <p class="wifi-hint" data-i18n="wifi.tip24g"></p>
      <button type="button" class="btn-scan" style="margin-top:8px" onclick="simulateWifiFail()" data-i18n="wifi.simulateFailBtn"></button>

      <div id="wifi-empty" style="display:none;margin:14px 0 10px;" class="wifi-item add-more">
        <span class="wifi-name" data-i18n="wifi.emptyTitle"></span>
      </div>
      <p id="wifi-empty-desc" class="wifi-hint" style="display:none" data-i18n="wifi.emptyDesc"></p>

      <div id="wifi-results" style="display:none;">
        <div class="wifi-item" data-ssid="GYZNKJG">
          <span class="wifi-name">GYZNKJG</span>
          <span class="wifi-signal">▂▄▆█</span>
          <span class="wifi-lock">🔒</span>
        </div>
        <div class="wifi-item" data-ssid="TP-LINK_guodiqing">
          <span class="wifi-name">TP-LINK_guodiqing</span>
          <span class="wifi-signal">▂▄▆</span>
          <span class="wifi-lock">🔒</span>
        </div>
        <div class="wifi-item" data-ssid="FAST_2.4G_891F">
          <span class="wifi-name">FAST_2.4G_891F</span>
          <span class="wifi-signal">▂▄</span>
          <span class="wifi-lock">🔒</span>
        </div>
        <div class="wifi-item" data-ssid="DIRECT-d5-HP M254 LaserJet">
          <span class="wifi-name">DIRECT-d5-HP M254 LaserJet</span>
          <span class="wifi-signal">▂▄</span>
          <span class="wifi-lock">🔒</span>
        </div>
      </div>

      <button type="button" class="btn-scan" style="margin-top:12px" onclick="window.location.href='Add-WiFi-connect.html'" data-i18n="wifi.manualEntryBtn"></button>
    </div>
  </div>

  <div class="success-view" id="successView">
    <div class="page-header">
      <h1 class="page-title" data-i18n="wifi.title"></h1>
      <p class="page-desc" data-i18n="wifi.desc"></p>
    </div>
    <div class="success-icon-wrap">
      <span class="face">☁️</span>
      <span class="check-badge">✓</span>
    </div>
    <p class="success-text"><span data-i18n="wifi.configured"></span> <span class="ssid" id="successSsid">GYZNKJG</span></p>
    <button type="button" class="btn-done" onclick="goMain()" data-i18n="wifi.doneBtn"></button>
  </div>

  <div class="connecting-view" id="connectingView">
    <div class="connecting-spinner" aria-hidden="true"></div>
    <p class="connecting-text" id="connectingText"></p>
  </div>

  <!-- 连接失败弹窗 -->
  <div class="overlay" id="overlayFail">
    <div class="modal">
      <div class="modal-header">
        <span class="modal-title" id="failTitle"></span>
        <button type="button" class="modal-close" onclick="closeFailModal()">×</button>
      </div>
      <div class="modal-body">
        <div id="failDesc"></div>
      </div>
      <div class="modal-actions">
        <button type="button" class="btn btn-cancel" onclick="closeFailModal()" data-i18n="wifi.failLater"></button>
        <button type="button" class="btn btn-confirm" onclick="retryFromFail()" data-i18n="wifi.failRetry"></button>
      </div>
      <button type="button" class="modal-link-btn" id="fail-offline-entry" style="margin-top:12px;display:none" onclick="offlineEntryFromFail()" data-i18n="wifi.offlineEntryBtn"></button>
    </div>
  </div>

  <!-- 输入密码弹窗 -->
  <div class="overlay" id="overlayPassword">
    <div class="modal">
      <div class="modal-header">
        <span class="modal-title" id="modalPasswordTitle"></span>
        <button type="button" class="modal-close" onclick="closePasswordModal()">×</button>
      </div>
      <div class="password-wrap">
        <div class="input-wrap">
          <input type="password" id="inputPassword" data-i18n-placeholder="wifi.pwdPlaceholder" />
          <button type="button" class="toggle-pwd" onclick="togglePwd()">👁</button>
        </div>
        <p class="scene-message" id="passwordHint" style="margin-top:8px"></p>
      </div>
      <label class="remember-row">
        <input type="checkbox" id="rememberPwd" checked />
        <span data-i18n="wifi.rememberPwd"></span>
      </label>
      <button type="button" class="btn-confirm-pwd" onclick="confirmPassword()" data-i18n="wifi.confirm"></button>
    </div>
  </div>

  <script>

  var I18N = {

    },

    zh: {

      "wifi.desc": "设备只支持使用 2.4GHz Wi‑Fi 连接。",

      "wifi.failToast": "连接失败了，再试一次吧～",
      "wifi.simulateFailBtn": "模拟 Wi‑Fi 失败"

  };
  function detectLang() {
    var saved = localStorage.getItem("noddy_lang");
    if (saved && I18N[saved]) return saved;
    var nav = (navigator.language || "").toLowerCase();
    if (nav.indexOf("ko") === 0) return "ko";
    if (nav.indexOf("zh") === 0) return "zh";
    return "en";
  }
  var currentLang = detectLang();
  function t(key) { return (I18N[currentLang] && I18N[currentLang][key]) || (I18N.en && I18N.en[key]) || key; }
  function applyLang(lang) {
    if (!I18N[lang]) return;
    currentLang = lang;
    localStorage.setItem("noddy_lang", lang);
    document.documentElement.lang = lang === "ko" ? "ko" : lang === "zh" ? "zh-CN" : "en";
    document.querySelectorAll("[data-i18n]").forEach(function(el) {
      var key = el.getAttribute("data-i18n");
      if (!key) return;
      el.textContent = t(key) || "";
    });
    document.querySelectorAll("[data-i18n-placeholder]").forEach(function(el) {
      var key = el.getAttribute("data-i18n-placeholder");
      if (!key) return;
      el.placeholder = t(key) || "";
    });
  }
  var sel = document.getElementById("lang-select");

})();
    var currentSsid = '';

      ownerName = uiLang === 'zh' ? '主人' : uiLang === 'ko' ? (isChildUser ? '주인' : '주인님') : 'you';
    }
    var resultsWrap = document.getElementById('wifi-results');
    var scanBtn = document.getElementById('btnScanWifi');
    var scanSpinner = document.getElementById('scanSpinner');
    var sceneMessageEl = document.getElementById('sceneMessage');
    var passwordHintEl = document.getElementById('passwordHint');
    var connectingTextEl = document.getElementById('connectingText');
    var wifiFailCount = 0;
    var OFFLINE_TRIGGER_FAIL_COUNT = 3;

      }
      if (lang === 'en') {
        return {
          selectWifiMsgs: [
            "Pick your home network. I promise I will not peek at your password!",
            "Choose the Wi-Fi you use most often.",
            "Tap your Wi-Fi name and I will remember it."
          ],
          passwordMsgs: [
            "Careful with the password 👀 I will cover for you.",
            "Tell me the password quietly. I am great at keeping secrets!",
            "It is okay if it is wrong. We can retry patiently."
          ],
          connectingMsgs: [
            "Connecting now... beep... signal received! Almost done~",
            "Beep... signal incoming... stabilizing... almost there!",
            "Halfway connected! " + ownerName + ", give me a few more seconds ✨"
          ],
          successMsgs: [
            "🎉 Connected! I am fully awake now! " + ownerName + ", call me anytime~",
            "🎉 Wi-Fi setup succeeded! " + ownerName + ", nice to meet you!",
            "Network is live. I will be here for your highs and lows ❤️"
          ],
          failedMsgs: [
            "Uh-oh... connection failed 😢 Maybe check the password and try again, " + ownerName + "?",
            "The network seems sleepy. Let's try one more time together 🧸"
          ]
        };
      }
      return {
        selectWifiMsgs: [
          "选你家的网络就好～我不会偷看密码的（捂眼睛.gif）",
          "选你常用的那个就好～",
          "戳一下你家那个Wi‑Fi名字，我帮你记着",
        ],
        passwordMsgs: [
          "输入密码的时候小心小眼睛 👀 我帮你挡着",
          "密码悄悄告诉我（输入中……），我嘴巴很严的！",
          "密码输错也没关系，我会耐心等你的～",
        ],
        connectingMsgs: [
          "正在努力连网中……嘀嘀……信号收到了！马上好～",
          "嘀……信号来了……稳住稳住……马上好！",
          "连上了一半！" + ownerName + " 再等我几秒钟 ✨",
        ],
        successMsgs: [
          "🎉 连上啦！我正式活过来了！" + ownerName + " 以后随时喊我～",
          "🎉 配网成功！" + ownerName + "，以后请多指教！摸摸我的头试试？",
          "网络通了！以后深夜emo或者开心的时候，我都在 ❤️",
        ],
        failedMsgs: [
          "啊哦……没连上😢 可能是密码输错啦，或者离路由器远了一点点？" + ownerName + " 再试一次嘛～",
          "网络在打瞌睡，要不要检查一下密码？我陪着你重来 🧸",
        ]
      };
    }
    var wifiSceneCopy = getWifiSceneCopy();
    var selectWifiMsgs = wifiSceneCopy.selectWifiMsgs;
    var passwordMsgs = wifiSceneCopy.passwordMsgs;
    var connectingMsgs = wifiSceneCopy.connectingMsgs;
    var successMsgs = wifiSceneCopy.successMsgs;
    var failedMsgs = wifiSceneCopy.failedMsgs;

    function pick(arr) {
      return arr[Math.floor(Math.random() * arr.length)];
    }

    function setSceneMessage(text) {
      if (!sceneMessageEl) return;
      sceneMessageEl.textContent = text || '';
    }

    function openPasswordModal(ssid) {
      currentSsid = ssid;
      var titleEl = document.getElementById('modalPasswordTitle');
      titleEl.textContent = (window._wifiT ? window._wifiT('wifi.pwdTitleFormat') : ('输入 ' + currentSsid + ' 密码')).replace('{ssid}', currentSsid);
      document.getElementById('inputPassword').value = getSavedPasswordBySsid(currentSsid) || '';
      document.getElementById('overlayPassword').classList.add('show');
      if (passwordHintEl) passwordHintEl.textContent = pick(passwordMsgs);
    }

    function getSavedWifiPasswordMap() {
      try {
        var raw = localStorage.getItem(WIFI_PASSWORD_STORE_KEY);
        var parsed = raw ? JSON.parse(raw) : {};
        return parsed && typeof parsed === 'object' ? parsed : {};
      } catch (_) {
        return {};
      }
    }

    function savePasswordBySsid(ssid, pwd) {
      if (!ssid) return;
      var map = getSavedWifiPasswordMap();
      map[String(ssid)] = String(pwd || '');
      try { localStorage.setItem(WIFI_PASSWORD_STORE_KEY, JSON.stringify(map)); } catch (_) {}
    }

    function removePasswordBySsid(ssid) {
      if (!ssid) return;
      var map = getSavedWifiPasswordMap();
      delete map[String(ssid)];
      try { localStorage.setItem(WIFI_PASSWORD_STORE_KEY, JSON.stringify(map)); } catch (_) {}
    }

    function getSavedPasswordBySsid(ssid) {
      if (!ssid) return '';
      var map = getSavedWifiPasswordMap();
      return map[String(ssid)] || '';
    }

    if (resultsWrap) {
      resultsWrap.addEventListener('click', function(e) {
        var item = e.target && e.target.closest ? e.target.closest('.wifi-item[data-ssid]') : null;
        if (!item) return;
        openPasswordModal(item.getAttribute('data-ssid'));
      });
    }

    function renderScanResults(ssids) {
      if (!resultsWrap) return;
      resultsWrap.innerHTML = '';
      (ssids || []).forEach(function(s) {
        var ssid = typeof s === 'string' ? s : (s && s.ssid) || '';
        if (!ssid) return;
        var el = document.createElement('div');
        el.className = 'wifi-item';
        el.setAttribute('data-ssid', ssid);
        el.innerHTML = '<span class="wifi-name"></span><span class="wifi-signal">▂▄▆</span><span class="wifi-lock">🔒</span>';
        el.querySelector('.wifi-name').textContent = ssid;
        resultsWrap.appendChild(el);
      });
      var has = (ssids && ssids.length);
      resultsWrap.style.display = has ? 'block' : 'none';
      var empty = document.getElementById('wifi-empty');
      var emptyDesc = document.getElementById('wifi-empty-desc');
      if (empty) empty.style.display = has ? 'none' : 'block';
      if (emptyDesc) emptyDesc.style.display = has ? 'none' : 'block';
    }

    // 给 uni/原生注入用：扫描到结果后直接调用
    window.noddyWifiSetScanResults = function(list) {
      if (scanSpinner) scanSpinner.classList.remove('show');
      renderScanResults(list);
    };

    function simulateScan() {
      // 原型演示：这里用模拟数据。uni 环境下请调用 window.noddyWifiSetScanResults([...])
      var params;
      try { params = new URLSearchParams(window.location.search || ''); } catch(_) { params = null; }
      var noWifi = params && params.get('noWifi') === '1';
      if (noWifi) {
        renderScanResults([]);
        return;
      }
      renderScanResults(['GYZNKJG', 'TP-LINK_guodiqing', 'FAST_2.4G_891F', 'DIRECT-d5-HP M254 LaserJet']);
    }

    function startScan() {
      if (scanSpinner) scanSpinner.classList.add('show');
      setSceneMessage(pick(selectWifiMsgs));
      // 如果宿主环境提供扫描能力，可在这里接入并最终调用 window.noddyWifiSetScanResults(results)
      setTimeout(function() {
        if (scanSpinner) scanSpinner.classList.remove('show');
        simulateScan();
      }, 600);
    }

    if (scanBtn) {
      scanBtn.addEventListener('click', function() {
        startScan();
      });
    }

    function togglePwd() {
      var inp = document.getElementById('inputPassword');
      var btn = document.querySelector('.toggle-pwd');
      if (inp.type === 'password') {
        inp.type = 'text';
        btn.textContent = '🙈';
      } else {
        inp.type = 'password';
        btn.textContent = '👁';
      }
    }

    function closePasswordModal() {
      document.getElementById('overlayPassword').classList.remove('show');
    }

    function confirmPassword() {
      var pwd = document.getElementById('inputPassword').value;
      var remember = !!(document.getElementById('rememberPwd') && document.getElementById('rememberPwd').checked);
      if (!pwd.trim()) return;
      if (remember) {
        savePasswordBySsid(currentSsid, pwd);
      } else {
        removePasswordBySsid(currentSsid);
      }
      closePasswordModal();
      document.getElementById('selectView').classList.remove('show');
      document.getElementById('successView').classList.remove('show');
      document.getElementById('connectingView').classList.add('show');
      if (connectingTextEl) connectingTextEl.textContent = pick(connectingMsgs);

      setTimeout(function() {
        var val = pwd.trim().toLowerCase();
        var failType = null; // 'pwd' | 'net'
        if (val === 'wrong' || val === 'fail' || val === 'password') failType = 'pwd';
        if (val === 'timeout' || val === 'network' || val === 'unstable') failType = 'net';
        document.getElementById('connectingView').classList.remove('show');
        if (failType) {
          wifiFailCount += 1;
          setSceneMessage(pick(failedMsgs));
          document.getElementById('selectView').classList.add('show');
          openFailModal(failType);
          return;
        }
        try { localStorage.setItem('noddy_wifi_setup_done', '1'); } catch (_) {}
        setSceneMessage(pick(successMsgs));
        document.getElementById('successSsid').textContent = currentSsid;
        document.getElementById('successView').classList.add('show');
        if (successRedirectTimer) clearTimeout(successRedirectTimer);
        successRedirectTimer = setTimeout(function() {
          goMain();
        }, 1200);
      }, 1800);
    }

    function getMainTarget() {
      try {
        var params = new URLSearchParams(window.location.search || '');
        return params.get('next') || params.get('redirect') || 'home.html';
      } catch (_) {
        return 'home.html';
      }
    }

    function goMain() {
      window.location.href = getMainTarget();
    }

    function goToLogin() {
      window.location.href = 'signup.html';
    }

    var lastFailType = null;
    function openFailModal(type) {
      lastFailType = type === 'pwd' ? 'pwd' : 'net';
      var titleEl = document.getElementById('failTitle');
      var descEl = document.getElementById('failDesc');
      var offlineBtn = document.getElementById('fail-offline-entry');
      if (titleEl) titleEl.textContent = (window._wifiT ? window._wifiT(lastFailType === 'pwd' ? 'wifi.failPwdTitle' : 'wifi.failNetTitle') : '');
      if (descEl) descEl.textContent = (window._wifiT ? window._wifiT(lastFailType === 'pwd' ? 'wifi.failPwdDesc' : 'wifi.failNetDesc') : '');
      if (offlineBtn) {
        offlineBtn.style.display = wifiFailCount >= OFFLINE_TRIGGER_FAIL_COUNT ? 'inline-flex' : 'none';
      }
      var overlay = document.getElementById('overlayFail');
      if (overlay) overlay.classList.add('show');
    }
    function closeFailModal() {
      var overlay = document.getElementById('overlayFail');
      if (overlay) overlay.classList.remove('show');
    }
    function retryFromFail() {
      closeFailModal();
      // 回到列表页，方便重试或手动输入
      document.getElementById('connectingView').classList.remove('show');
      document.getElementById('successView').classList.remove('show');
      document.getElementById('selectView').classList.add('show');
      setSceneMessage(window._wifiT ? window._wifiT('wifi.failToast') : '');
    }

    function simulateWifiFail() {
      wifiFailCount += 1;
      setSceneMessage(window._wifiT ? window._wifiT('wifi.failToast') : '');
      openFailModal('net');
    }

    function offlineEntryFromFail() {
      try { localStorage.setItem('noddy_offline_mode', '1'); } catch(_) {}
      closeFailModal();
      goMain();
    }

    var pwdInput = document.getElementById('inputPassword');
    if (pwdInput) {
      pwdInput.addEventListener('focus', function() {
        if (passwordHintEl) passwordHintEl.textContent = pick(passwordMsgs);
      });
    }

    setSceneMessage(pick(selectWifiMsgs));
  </script>
